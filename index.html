/* Brighten apple-touch-icon via canvas so the home screen icon appears
   more vivid. Uses CSS-filter-equivalent math on raw pixel data.
   brightness(1.3) clamps at 255; saturation boost via HSL conversion. */
(function(){
  var img=new Image();img.crossOrigin='anonymous';
  img.onload=function(){
    var c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    var ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    var id=ctx.getImageData(0,0,c.width,c.height),d=id.data;
    for(var i=0;i<d.length;i+=4){
      d[i]  =Math.min(255,d[i]  *1.30);
      d[i+1]=Math.min(255,d[i+1]*1.30);
      d[i+2]=Math.min(255,d[i+2]*1.30);
    }
    ctx.putImageData(id,0,0);
    var url=c.toDataURL('image/png');
    document.querySelectorAll('link[rel*="icon"]').forEach(function(l){l.href=url;});
  };
  img.src='icone-app-180.png';
})();
</script>

/* Compare any two ids (number or string) safely. This is the single source
   of truth for id comparisons across the whole app — never compare ids with
   === directly, since localStorage / form values can silently change a
   number into a string (or vice-versa) depending on which code path wrote
   the data. */
function sameId(a,b){
  if(a===undefined||a===null||b===undefined||b===null)return false;
  return String(a)===String(b);
}

/* ── LEGACY STORAGE CLEANUP ────────────────────────────────────────────────
   Earlier versions of this app used different localStorage key names for
   the same data (sk_m, sk_c, sk_creds, sk_r, sk_n, sk_jr, sk_jrs, sk_reqs,
   sk_pass_requests). The current version only ever reads/writes the
   canonical keys in SK below.

   IMPORTANT: this function only DELETES those old keys — it never merges
   their contents back into the canonical storage. An earlier version of
   this cleanup used to merge legacy data back in on every app load, which
   caused a serious bug: any record a user deleted could reappear, because
   a stray copy left under an old key name kept getting re-merged in every
   single time the app started. Deleting (and never reading) the legacy
   keys is the correct, permanent fix — once they're gone, this function
   has nothing left to do on every subsequent boot.
─────────────────────────────────────────────────────────────────────────── */
function cleanupLegacyStorageKeys(){
  const legacyKeys=['sk_m','sk_c','sk_creds','sk_r','sk_n','sk_jr','sk_jrs','sk_reqs','sk_pass_requests'];
  let removed=[];
  legacyKeys.forEach(k=>{
    if(localStorage.getItem(k)!==null){
      localStorage.removeItem(k);
      removed.push(k);
    }
  });
  if(removed.length){
    console.log('[SEEK cleanup] removed obsolete legacy keys (data was NOT merged back, by design):',removed);
  }
}

function maskPhone(raw){
  const d=(raw||'').replace(/\D/g,'').slice(0,11);
  if(!d)return'';
  if(d.length<=2)return`(${d}`;
  if(d.length<=6)return`(${d.slice(0,2)})${d.slice(2)}`;

}

/* ══════════════════════════════════════════════════════════════════
   LOGIN SCREEN — single unified login
══════════════════════════════════════════════════════════════════ */
function LoginScreen({onLogin,credentials,members,seekJrs}){
  const [phone,setPhone]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [solicitarSenha,setSolicitarSenha]=useState(false);
  const [solPhone,setSolPhone]=useState('');
  const [solErr,setSolErr]=useState('');
  const [solOk,setSolOk]=useState(false);

  function handleSubmit(e){
    e.preventDefault();setErr('');
    const digits=phone.replace(/\D/g,'');
    const pin=pass.trim();
    console.log(`[SEEK login] attempt — phoneDigits="${digits}" pinLength=${pin.length}`);
    if(!digits||!pin){setErr('Preencha telefone e senha.');console.log('[SEEK login] aborted: empty phone or pin');return;}

    // 1) MASTER — hardcoded constant, independent of any stored data.
    if(digits===ADM_PHONE&&pin===ADM_PIN){
      console.log('[SEEK login] matched MASTER');
      onLogin({role:'master'});return;
    }

    // 1.5) ADM vendedores
    for(const [k,c] of Object.entries(credentials)){
      if(!String(k).startsWith('adm_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){const admId=k.replace('adm_','');onLogin({role:'adm',admId});return;}
    }

    // 2) SEEK
    for(const [k,c] of Object.entries(credentials)){
      if(String(k).startsWith('jr_')||String(k).startsWith('adm_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){onLogin({role:'member',memberId:k});return;}
    }
    for(const mb of members){
      const wa=(mb.whatsapp||'').replace(/\D/g,'');
      if(wa!==digits)continue;
      const cred=credentials[String(mb.id)]||{pin:'0000'};
      if(cred.pin===pin){onLogin({role:'member',memberId:String(mb.id)});return;}
    }
    // 3) JR
    for(const [k,c] of Object.entries(credentials)){
      if(!String(k).startsWith('jr_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){const jrId=k.replace('jr_','');onLogin({role:'jr',jrId});return;}
    }
    for(const jr of seekJrs){
      const wa=(jr.whatsapp||'').replace(/\D/g,'');
      if(wa!==digits)continue;
      const cred=credentials[`jr_${jr.id}`]||{pin:'0000'};
      if(cred.pin===pin){onLogin({role:'jr',jrId:jr.id});return;}
    }
    setErr('Telefone ou senha incorretos.');
  }

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:'32px 22px'}}>
      <div style={{width:'100%',maxWidth:480,display:'flex',flexDirection:'column',alignItems:'center',gap:26}}>

        <SeekNetworkLogo/>

        <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:26}}>
        {/* Login form — single unified entry, phone digits only, no mode tabs.
            The system figures out automatically whether the phone+pin belongs
            to the ADM, a SEEK, or a SEEK JR. */}
        <form onSubmit={handleSubmit} style={{width:'100%',display:'flex',flexDirection:'column',gap:13}}>
          <input className="login-inp" type="tel" inputMode="numeric"
            value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,11))}
            placeholder="TELEFONE (SOMENTE NÚMEROS)" autoFocus/>
          <div style={{position:'relative'}}>
            <input className="login-inp" type={showPass?'text':'password'}
              value={pass} onChange={e=>setPass(e.target.value.replace(/\D/g,'').slice(0,4))}
              placeholder="SENHA (4 DÍGITOS)" inputMode="numeric" maxLength={4}
              style={{paddingRight:52}}/>
            <button type="button" onClick={()=>setShowPass(!showPass)}
              style={{position:'absolute',right:18,top:'50%',transform:'translateY(-50%)',
                      background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}>
              {showPass?<IcEyeOff s={17}/>:<IcEye s={17}/>}
            </button>
          </div>
          {err&&<p style={{textAlign:'center',fontSize:'.76rem',fontWeight:700,color:'var(--red)',padding:'4px 8px',borderRadius:10,background:'rgba(192,57,43,0.07)'}}>{err}</p>}
          <button type="submit" className="btn btn-dark btn-full"
            style={{padding:16,fontSize:'.84rem',letterSpacing:'.1em',borderRadius:50,marginTop:4}}>
            Entrar
          </button>
        </form>

        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:10}}>
          <button onClick={()=>{setSolicitarSenha(true);setSolPhone('');setSolErr('');setSolOk(false);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:'.78rem',fontWeight:700,color:'var(--muted)',fontFamily:'inherit',textDecoration:'underline',textUnderlineOffset:3}}>
            Esqueceu sua senha?
          </button>
        </div>
        </div>
      </div>

      {solicitarSenha&&(
        <div className="overlay" onClick={()=>setSolicitarSenha(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="handle"/>
            <div style={{fontWeight:900,fontSize:'1rem',marginBottom:16}}>🔐 Solicitar Nova Senha</div>
            {solOk?(
              <div style={{textAlign:'center',padding:'24px 0'}}>
                <div style={{fontSize:'2rem',marginBottom:12}}>✅</div>
                <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:8}}>Solicitação enviada!</div>
                <div style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:20}}>O administrador foi notificado e vai liberar seu novo acesso em breve.</div>
                <button className="btn btn-dark btn-full" onClick={()=>setSolicitarSenha(false)}>Fechar</button>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <p style={{fontSize:'.84rem',color:'var(--muted)',lineHeight:1.6}}>Digite seu telefone cadastrado (somente números). O administrador receberá a solicitação e liberará seu novo acesso.</p>
                <input className="inp" type="tel" inputMode="numeric"
                  value={solPhone} onChange={e=>setSolPhone(e.target.value.replace(/\D/g,'').slice(0,11))}
                  placeholder="TELEFONE (SOMENTE NÚMEROS)" autoFocus/>
                {solErr&&<div style={{color:'var(--red)',fontSize:'.76rem',fontWeight:700}}>{solErr}</div>}
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-full" onClick={()=>setSolicitarSenha(false)}>Cancelar</button>
                  <button className="btn btn-dark btn-full" onClick={()=>{
                    const d=solPhone.replace(/\D/g,'');
                    if(!d){setSolErr('Digite seu telefone.');return;}
                    // Save request to localStorage
                    db.from('pass_requests').insert({phone:d,type:'forgot',resolved:false})
                      .then(({error})=>{
                        if(error){setSolErr('Erro ao enviar. Tente novamente.');}
                        else{setSolOk(true);}
                      });
                  }}>Solicitar</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   SEEK JR PANEL
══════════════════════════════════════════════════════════════════ */
function SeekJrPanel({jr,referrals,seekMember,credentials,onLogout,onAddReferral,onChangePin,offers,spinRewards}){
  const now=new Date();
  const [sm,setSm]=useState(now.getMonth()+1);
  const [sy,setSy]=useState(now.getFullYear());
  const [showAdd,setShowAdd]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [showJrOffers,setShowJrOffers]=useState(false);
  const [showExtrato,setShowExtrato]=useState(false);

  const [oldPin,setOldPin]=useState('');
  const [newPin,setNewPin]=useState('');
  const [cfPin,setCfPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const credKey=`jr_${jr.id}`;
  const cred=credentials[credKey]||{pin:'0000'};
  const curY=now.getFullYear();
  const years=Array.from({length:3},(_,i)=>curY-1+i);

  const myRefs=referrals.filter(r=>sameId(r.jrId,jr.id));
  const monthRefs=myRefs.filter(r=>r.month===sm&&r.year===sy);
  const monthVol=monthRefs.reduce((s,r)=>s+r.productValue,0);
  const monthCom=monthRefs.reduce((s,r)=>s+r.commission,0);
  const totalVol=myRefs.reduce((s,r)=>s+r.productValue,0);
  const gradPct=Math.min(100,(totalVol/JR_GRADUATION)*100);
  const graduated=totalVol>=JR_GRADUATION;
  const jrLv=getJrLevel(totalVol);
  const jrLvIdx=JR_LEVELS.findIndex(l=>l.id===jrLv.id);
  const jrLvPct=jrLv.max===Infinity?100:Math.min(100,Math.round(((totalVol-jrLv.min)/(jrLv.max-jrLv.min))*100));
  const initials=jr.name.trim().slice(0,2).toUpperCase();
  const bonusRoleta=(spinRewards||[]).filter(s=>sameId(s.jrId,jr.id)).reduce((s,r)=>s+r.value,0);

  function changePin(e){
    e.preventDefault();setPinErr('');
    if(oldPin!==cred.pin){setPinErr('Senha atual incorreta.');return;}
    if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}
    if(newPin!==cfPin){setPinErr('Senhas não coincidem.');return;}
    onChangePin(credKey,newPin);setOldPin('');setNewPin('');setCfPin('');setShowPin(false);alert('Senha alterada!');
  }

  function RefForm({onClose,onSave}){
    const [cn,setCn]=useState('');
    const [wa,setWa]=useState('');
    const today=todayISO();
    function save(e){
      e.preventDefault();if(!cn.trim())return;
      const parts=today.split('-').map(Number);
      onSave({clientName:cn.trim(),whatsapp:wa,productType:'auto',productValue:0,commission:0,year:parts[0],month:parts[1],day:parts[2],isNew:true,jrId:jr.id});
      onClose();
    }
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Cliente"><input className="inp" value={cn} onChange={e=>setCn(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="WhatsApp do Cliente"><PhoneInput value={wa} onChange={setWa}/></Fld>
      <div className="nm-in" style={{padding:'12px 14px',fontSize:'.76rem',color:'var(--muted)',lineHeight:1.6,fontWeight:600}}>
        O vendedor preencherá produto e valor ao confirmar a venda. Você receberá sua chance na roleta! 🎰
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Indicar!</button></div>
    </form>;
  }

  const sorted=[...monthRefs].sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));

  return<div style={{maxWidth:640,margin:'0 auto',minHeight:'100vh'}}>
    <TopBar logo="SEEK NETWORK" right={<button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>}/>
    <div style={{padding:'4px 16px 8px',textAlign:'center'}}><span style={{fontSize:'0.55rem',fontWeight:900,color:'var(--black)',letterSpacing:'.06em'}}>SEEK JR</span></div>
    <div className="page" style={{paddingBottom:30}}>

      {/* Identity card */}
      <div className="nm" style={{padding:'22px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div className="member-avatar" style={{width:52,height:52,borderRadius:18,fontSize:'1rem'}}>{initials}</div>
          <div>
            <div style={{fontWeight:800,fontSize:'1rem'}}>{jr.name}</div>
            <div style={{fontSize:'.72rem',color:'var(--muted)',fontWeight:600,marginTop:3}}>
              ID: <b style={{color:'var(--black)'}}>{jr.id}JR</b>
            </div>
            {seekMember&&<div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>
              SEEK: <b style={{color:'var(--black)'}}>#{String(seekMember.id).padStart(3,'0')}</b> · {seekMember.name}
            </div>}
          </div>
        </div>

        {/* Period */}
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
          <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['Indicações Mês',monthRefs.length,null],['Valor Mês',fBRL(monthVol),null],['Comissão Mês',fBRL(monthCom),'var(--green)'],['Total Acumulado',fBRL(totalVol),null]].map(([l,v,c])=>(
            <div key={l} className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:6}}>{l}</div><div style={{fontWeight:800,fontSize:'.9rem',color:c||'var(--black)'}}>{v}</div></div>
          ))}
        </div>
        {bonusRoleta>0&&<div className="nm-in" style={{padding:'12px 14px',marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'.72rem',fontWeight:800,color:'var(--muted)'}}>🎰 Bônus Roleta acumulado</div>
          <div style={{fontWeight:900,fontSize:'.92rem',color:'#8833BB'}}>+ {fBRL(bonusRoleta)}</div>
        </div>}

        {/* Graduation bar */}
        {graduated&&<div style={{marginBottom:10,padding:'8px 14px',borderRadius:12,background:'rgba(29,122,58,0.1)',fontSize:'.76rem',fontWeight:800,color:'var(--green)',textAlign:'center'}}>🎓 Graduado para SEEK!</div>}
        <ProgressBar pct={gradPct} className="progress-jr" label="Progresso para SEEK" sub={`${fBRL(totalVol)} / ${fBRL(JR_GRADUATION)}`}/>

        {/* JR level bars */}
        <div style={{marginTop:14}}>
          <div style={{fontSize:'.68rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8,display:'flex',justifyContent:'space-between'}}>
            <span>Nível JR → bônus do SEEK</span>
            <span style={{color:'var(--green)',fontWeight:900}}>{jrLv.name} — {(jrLv.bonus*100).toFixed(0)}%</span>
          </div>
          <div style={{display:'flex',gap:5,marginBottom:8}}>
            {JR_LEVELS.map((lv,i)=>(
              <div key={lv.id} style={{flex:1,textAlign:'center'}}>
                <div style={{height:8,borderRadius:99,background:i<=jrLvIdx?'var(--green)':'var(--gray)',marginBottom:4,transition:'all .5s',boxShadow:i<=jrLvIdx?'0 0 6px rgba(29,122,58,.4)':'none'}}/>
                <div style={{fontSize:'.54rem',fontWeight:800,color:i<=jrLvIdx?'var(--green)':'var(--muted)'}}>{lv.name}</div>
                <div style={{fontSize:'.5rem',color:'var(--muted)'}}>{(lv.bonus*100).toFixed(0)}%</div>
              </div>
            ))}
          </div>
          <ProgressBar pct={jrLvPct} className="progress-emerald"
            label={`Progresso ${jrLv.name}`}
            sub={jrLv.max===Infinity?'Máximo!':fBRL(jrLv.max-totalVol)+' para próx.'}
          />
        </div>
      </div>

      {/* Big green opportunity button */}
      <button className="btn-green-opp" onClick={()=>setShowAdd(true)}>
        <IcPlus s={22} c="#fff"/>
        Encontrei uma Oportunidade
      </button>

      <button className="btn btn-full" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={15}/>Alterar Senha</button>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>setShowJrOffers(true)}>🏷️ Ofertas</button>

      {/* Referrals */}
      <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4}}>{MONTHS[sm-1]} {sy} — Indicações</div>
      <div className="nm" style={{padding:'6px 16px'}}>
        {sorted.length===0?<Empty text="Nenhuma indicação no período"/>:sorted.map((r,i,arr)=>(
          <div key={r.id}><div style={{padding:'13px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.87rem'}}>{r.clientName}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600}}>{fDate(r)}</div>
            </div>
            {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:4,display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            {r.status==='aguardando'
              ?<div style={{fontSize:'.72rem',color:'var(--yellow)',marginBottom:6,fontWeight:700}}>⏳ Aguardando confirmação do vendedor</div>
              :<div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>{PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name} · {fBRL(r.productValue)}</div>
            }
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              {r.status!=='aguardando'&&<div style={{fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>}
              <span style={{fontSize:'.7rem',fontWeight:700,padding:'4px 10px',borderRadius:50,background:'var(--bg)',boxShadow:'var(--nm-out)',color:r.status==='aguardando'?'var(--yellow)':r.paid?'var(--green)':'var(--muted)',marginLeft:'auto'}}>
                {r.status==='aguardando'?'Aguardando':r.paid?'Pago':'Pendente'}
              </span>
            </div>
          </div>{i<arr.length-1&&<Div/>}</div>
        ))}
      </div>
      <button className="btn btn-dark btn-full" style={{padding:14,marginTop:12}} onClick={()=>setShowExtrato(true)}>📋 Extrato</button>
    </div>
    {showAdd&&<Sheet title="Nova Indicação" onClose={()=>setShowAdd(false)}><RefForm onClose={()=>setShowAdd(false)} onSave={onAddReferral}/></Sheet>}
    {showJrOffers&&<OffersPanel offers={offers||[]} onClose={()=>setShowJrOffers(false)} isAdm={false} onAddOffer={()=>{}} onDeleteOffer={()=>{}}/>}
    {showExtrato&&<ExtratoModal role="jr" data={{jr,referrals:referrals.filter(r=>sameId(r.jrId,jr.id)),seekMember,spinRewards:(spinRewards||[]).filter(s=>sameId(s.jrId,jr.id))}} onClose={()=>setShowExtrato(false)}/>}
    {showPin&&<Sheet title="Alterar Senha" onClose={()=>setShowPin(false)}>
      <form onSubmit={changePin} style={{display:'flex',flexDirection:'column',gap:18}}>
        <Fld label="Senha Atual"><PinInput value={oldPin} onChange={setOldPin} autoFocus/></Fld>
        <Fld label="Nova Senha"><PinInput value={newPin} onChange={setNewPin}/></Fld>
        <Fld label="Confirmar"><PinInput value={cfPin} onChange={setCfPin}/></Fld>
        {pinErr&&<div style={{color:'var(--red)',fontSize:'.78rem',fontWeight:700}}>{pinErr}</div>}
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={()=>setShowPin(false)}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════════
   SEEK MEMBER PANEL
══════════════════════════════════════════════════════════════════ */
function MemberPanel({member,referrals,jrReferrals,seekJrs,credentials,onLogout,onAddReferral,onAddJr,onChangePin,levelNotifs,onDismissNotif,offers,spinRewards}){
  const now=new Date();
  const [sm,setSm]=useState(now.getMonth()+1);
  const [sy,setSy]=useState(now.getFullYear());
  const [showAdd,setShowAdd]=useState(false);
  const [showAddJr,setShowAddJr]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [showMemberOffers,setShowMemberOffers]=useState(false);
  const [showJrOffers,setShowJrOffers]=useState(false);
  const [showExtrato,setShowExtrato]=useState(false);
  const [oldPin,setOldPin]=useState('');
  const [newPin,setNewPin]=useState('');
  const [cfPin,setCfPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const cred=credentials[member.id]||credentials[String(member.id)]||{pin:'0000'};
  const curY=now.getFullYear();
  const years=Array.from({length:3},(_,i)=>curY-1+i);

  const myRefs=referrals.filter(r=>sameId(r.memberId,member.id));
  const monthRefs=myRefs.filter(r=>r.month===sm&&r.year===sy);
  const totalSales=myRefs.reduce((s,r)=>s+r.productValue,0);
  const points=calcPoints(totalSales);
  const level=getSeekLevel(points);
  const lvPct=levelProgress(points);

  const myJrs=seekJrs.filter(j=>sameId(j.seekId,member.id));
  const myJrRefs=jrReferrals.filter(r=>myJrs.some(j=>sameId(j.id,r.jrId)));

  // Per-product breakdown for month
  const prodBreakdown=PRODUCT_TYPES.map(pt=>{
    const refs=monthRefs.filter(r=>r.productType===pt.id);
    return{...pt,count:refs.length,volume:refs.reduce((s,r)=>s+r.productValue,0),commission:refs.reduce((s,r)=>s+r.commission,0)};
  });

  const monthCom=monthRefs.reduce((s,r)=>s+r.commission,0);
  const monthComPaid=monthRefs.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
  const monthComDue=monthRefs.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
  const jrBonus=myJrs.reduce((total,jr)=>{
    const jrTotalVol=myJrRefs.filter(r=>sameId(r.jrId,jr.id)).reduce((s,r)=>s+r.productValue,0);
    const jrLv=getJrLevel(jrTotalVol);
    const jrComm=myJrRefs.filter(r=>sameId(r.jrId,jr.id)&&r.month===sm&&r.year===sy).reduce((s,r)=>s+r.commission,0);
    return total+(jrComm*jrLv.bonus);
  },0);

  const initials=member.name.trim().slice(0,2).toUpperCase();
  const bonusRoleta=(spinRewards||[]).filter(s=>sameId(s.seekId,member.id)).reduce((s,r)=>s+r.value,0);
  const myLevelNotif=(levelNotifs||[]).find(n=>sameId(n.memberId,member.id)&&!n.dismissed);
  const nextLevel=level.id==='elite'?null:SEEK_LEVELS[SEEK_LEVELS.findIndex(l=>l.id===level.id)+1];

  function changePin(e){
    e.preventDefault();setPinErr('');
    if(oldPin!==cred.pin){setPinErr('Senha atual incorreta.');return;}
    if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}
    if(newPin!==cfPin){setPinErr('Senhas não coincidem.');return;}
    onChangePin(member.id,newPin);setOldPin('');setNewPin('');setCfPin('');setShowPin(false);alert('Senha alterada!');
  }

  function shareCard(){
    const msg=encodeURIComponent(`SEEK — Indicações\n\nOlá! Te convido a conhecer a Motomecânica Volkswagen.\n\nID SEEK: #${String(member.id).padStart(3,'0')}\n${member.name}\n\nJunior Soares · (51)99650-9660\n\nConecte oportunidades. Multiplique resultados.`);
    window.open(`https://wa.me/?text=${msg}`,'_blank');
  }

  function RefForm({onClose,onSave}){
    const [cn,setCn]=useState('');
    const [wa,setWa]=useState('');
    const today=todayISO();
    function save(e){
      e.preventDefault();if(!cn.trim())return;
      const parts=today.split('-').map(Number);
      onSave({clientName:cn.trim(),whatsapp:wa,productType:'auto',productValue:0,commission:0,year:parts[0],month:parts[1],day:parts[2],isNew:true});
      onClose();
    }
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Cliente"><input className="inp" value={cn} onChange={e=>setCn(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="WhatsApp do Cliente"><PhoneInput value={wa} onChange={setWa}/></Fld>
      <div className="nm-in" style={{padding:'12px 14px',fontSize:'.76rem',color:'var(--muted)',lineHeight:1.6,fontWeight:600}}>
        O vendedor preencherá produto e valor ao confirmar a venda. Você receberá sua chance na roleta! 🎰
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Indicar!</button></div>
    </form>;
  }

  function JrForm({onClose,onSave}){
    const [name,setName]=useState('');
    const [wa,setWa]=useState('');
    const [pin,setPin]=useState('0000');
    const [pe,setPe]=useState('');
    function save(e){e.preventDefault();if(!name.trim()||!wa)return;if(!/^\d{4}$/.test(pin)){setPe('Deve ter 4 dígitos.');return;}onSave({name:name.trim(),whatsapp:wa,pin,seekId:member.id});onClose();}
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do SEEK JR"><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
      <div className="nm-in" style={{padding:'14px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontWeight:700,fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)'}}>🔑 Acesso</div>
        <Fld label="Senha inicial (4 dígitos)">
          <PinInput value={pin} onChange={setPin}/>
          <span style={{fontSize:'.68rem',color:'var(--muted)',marginTop:4,display:'block'}}>Padrão: 0000. JR pode alterar.</span>
          {pe&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700}}>{pe}</span>}
        </Fld>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Cadastrar JR</button></div>
    </form>;
  }

  const sorted=[...monthRefs].sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));

  return<div style={{maxWidth:640,margin:'0 auto',minHeight:'100vh'}}>
    {myLevelNotif&&<LevelUpModal level={getSeekLevel(points)} onClose={()=>onDismissNotif(myLevelNotif.id)}/>}
    <TopBar logo="SEEK NETWORK" right={<button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>}/>
    <div style={{padding:'4px 16px 8px',textAlign:'center'}}><span style={{fontSize:'0.55rem',fontWeight:900,color:'var(--black)',letterSpacing:'.06em'}}>SEEK</span></div>
    <div className="page" style={{paddingBottom:30}}>

      {/* Identity + level */}
      <div className="nm" style={{padding:'22px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div className="member-avatar" style={{width:52,height:52,borderRadius:18,fontSize:'1rem'}}>{initials}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:'1rem'}}>{member.name}</div>
            <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>ID #<b style={{color:'var(--black)'}}>{String(member.id).padStart(3,'0')}</b></div>
          </div>
          <LevelBadge points={points}/>
        </div>

        {/* Seek progress bar */}
        <div style={{marginBottom:16}}>
          <ProgressBar
            pct={lvPct}
            className={level.progressClass}
            label={`${points} pts · ${level.name} — ${lvPct}% do nível`}
            sub={nextLevel?`${nextLevel.min-points} pts para ${nextLevel.name}`:'Nível Máximo!'}
          />
        </div>

        {/* Period filter */}
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
          <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>

        {/* Per-product breakdown */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:'.6rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Indicações por Produto — {MONTHS[sm-1]} {sy}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
            {prodBreakdown.map(p=>(
              <div key={p.id} className="nm-in" style={{padding:'10px 8px',textAlign:'center'}}>
                <div style={{fontSize:'1.1rem',marginBottom:4}}>{p.icon}</div>
                <div style={{fontSize:'.58rem',fontWeight:800,textTransform:'uppercase',color:'var(--muted)',marginBottom:5}}>{p.name.replace('Empresariais','Empresar.')}</div>
                <div style={{fontWeight:900,fontSize:'1rem',color:'var(--black)'}}>{p.count}</div>
                <div style={{fontSize:'.64rem',color:'var(--muted)',marginTop:2}}>{fBRL(p.volume)}</div>
                <div style={{fontSize:'.66rem',color:'var(--green)',fontWeight:800,marginTop:1}}>{fBRL(p.commission)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Commission summary */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['Comissão Total',fBRL(monthCom),'var(--green)'],['Bônus JR',fBRL(jrBonus),'var(--green)'],['A Receber',fBRL(monthComDue),'var(--red)'],['Recebido',fBRL(monthComPaid),'var(--green)']].map(([l,v,c])=>(
            <div key={l} className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:6}}>{l}</div><div style={{fontWeight:800,fontSize:'.9rem',color:c}}>{v}</div></div>
          ))}
        </div>
        {bonusRoleta>0&&<div className="nm-in" style={{padding:'12px 14px',marginTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'.72rem',fontWeight:800,color:'var(--muted)'}}>🎰 Bônus Roleta acumulado</div>
          <div style={{fontWeight:900,fontSize:'.92rem',color:'#8833BB'}}>+ {fBRL(bonusRoleta)}</div>
        </div>}
      </div>

      {/* Medals showcase */}
      <MedalsShowcase points={points}/>

      {/* Big green opportunity button */}
      <button className="btn-green-opp" onClick={()=>setShowAdd(true)}>
        <IcPlus s={22} c="#fff"/>
        Encontrei uma Oportunidade
      </button>

      {/* Actions */}
      <button className="btn btn-dark btn-full" style={{padding:14,marginTop:4}} onClick={()=>setShowAddJr(true)}>
        <IcPlus s={18} c="#fff"/>Cadastrar SEEK JR
      </button>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <button className="btn" style={{padding:12}} onClick={shareCard}><IcShare s={14}/>Cartão</button>
        <button className="btn" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={14}/>Senha</button>
      </div>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={14}/>Alterar Senha</button>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>setShowMemberOffers(true)}>🏷️ Ofertas</button>

      {/* My JRs */}
      {myJrs.length>0&&<div>
        <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4,marginBottom:10}}>Meus SEEK JR ({myJrs.length})</div>
        <div className="nm" style={{padding:'6px 16px'}}>
          {myJrs.map((jr,i)=>{
            const jrTotal=myJrRefs.filter(r=>sameId(r.jrId,jr.id)).reduce((s,r)=>s+r.productValue,0);
            const jrMonthRefs=myJrRefs.filter(r=>sameId(r.jrId,jr.id)&&r.month===sm&&r.year===sy);
            const jrMonthCom=jrMonthRefs.reduce((s,r)=>s+r.commission,0);
            const jrLv=getJrLevel(jrTotal);
            return<div key={jr.id}><div style={{padding:'12px 0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                <div>
                  <div style={{fontWeight:700,fontSize:'.86rem'}}>{jr.name}</div>
                  <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>ID: {jr.id}JR · {jrLv.name}</div>
                </div>
                <span className="tag-jr">JR</span>
              </div>
              <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>Mês: {fBRL(jrMonthRefs.reduce((s,r)=>s+r.productValue,0))} · Total: {fBRL(jrTotal)}</div>
              <div style={{fontSize:'.7rem',color:'var(--green)',fontWeight:700,marginBottom:8}}>Bônus meu: {fBRL(jrMonthCom*jrLv.bonus)} ({(jrLv.bonus*100).toFixed(0)}%)</div>
              <ProgressBar pct={Math.min(100,(jrTotal/JR_GRADUATION)*100)} className="progress-jr"
                label="JR → SEEK" sub={fBRL(jrTotal)+'/'+fBRL(JR_GRADUATION)}/>
            </div>{i<myJrs.length-1&&<Div/>}</div>;
          })}
        </div>
      </div>}

      {/* My referrals */}
      <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4}}>{MONTHS[sm-1]} {sy} — Indicações</div>
      <div className="nm" style={{padding:'6px 16px'}}>
        {sorted.length===0?<Empty text="Nenhuma indicação no período"/>:sorted.map((r,i,arr)=>(
          <div key={r.id}><div style={{padding:'13px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.87rem'}}>{r.clientName}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600}}>{fDate(r)}</div>
            </div>
            {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:4,display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            {r.status==='aguardando'
              ?<div style={{fontSize:'.72rem',color:'var(--yellow)',marginBottom:6,fontWeight:700}}>⏳ Aguardando confirmação do vendedor</div>
              :<div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>{PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name} · {fBRL(r.productValue)}</div>
            }
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              {r.status!=='aguardando'&&<div style={{fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>}
              <span style={{fontSize:'.7rem',fontWeight:700,padding:'4px 10px',borderRadius:50,background:'var(--bg)',boxShadow:'var(--nm-out)',color:r.status==='aguardando'?'var(--yellow)':r.paid?'var(--green)':'var(--muted)',marginLeft:'auto'}}>
                {r.status==='aguardando'?'Aguardando':r.paid?'Pago':'Pendente'}
              </span>
            </div>
          </div>{i<arr.length-1&&<Div/>}</div>
        ))}
      </div>
      <button className="btn btn-dark btn-full" style={{padding:14,marginTop:12}} onClick={()=>setShowExtrato(true)}>📋 Extrato</button>
    </div>

    {showMemberOffers&&<OffersPanel offers={offers||[]} onClose={()=>setShowMemberOffers(false)} isAdm={false} onAddOffer={()=>{}} onDeleteOffer={()=>{}}/>}
    {showExtrato&&<ExtratoModal role="member" data={{member,referrals:referrals.filter(r=>sameId(r.memberId,member.id)),jrReferrals,seekJrs,spinRewards:(spinRewards||[]).filter(s=>sameId(s.seekId,member.id))}} onClose={()=>setShowExtrato(false)}/>}
    {showAdd&&<Sheet title="Encontrei uma Oportunidade" onClose={()=>setShowAdd(false)}><RefForm onClose={()=>setShowAdd(false)} onSave={onAddReferral}/></Sheet>}
    {showAddJr&&<Sheet title="Cadastrar SEEK JR" onClose={()=>setShowAddJr(false)}><JrForm onClose={()=>setShowAddJr(false)} onSave={onAddJr}/></Sheet>}
    {showPin&&<Sheet title="Alterar Senha" onClose={()=>setShowPin(false)}>
      <form onSubmit={changePin} style={{display:'flex',flexDirection:'column',gap:18}}>
        <Fld label="Senha Atual"><PinInput value={oldPin} onChange={setOldPin} autoFocus/></Fld>
        <Fld label="Nova Senha"><PinInput value={newPin} onChange={setNewPin}/></Fld>
        <Fld label="Confirmar"><PinInput value={cfPin} onChange={setCfPin}/></Fld>
        {pinErr&&<div style={{color:'var(--red)',fontSize:'.78rem',fontWeight:700}}>{pinErr}</div>}
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={()=>setShowPin(false)}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════════
   ADM — DASHBOARD
══════════════════════════════════════════════════════════════════ */
function AdmDashboard({members,referrals,jrReferrals,seekJrs,sm,setSm,sy,setSy,onNav,passReqs,credentials,onDeleteRef,onDeleteJrRef,spinRewards}){
  const curY=new Date().getFullYear();
  const years=Array.from({length:5},(_,i)=>curY-2+i);
  const fil=referrals.filter(r=>r.month===sm&&r.year===sy);
  const jrFil=jrReferrals.filter(r=>r.month===sm&&r.year===sy);
  const totV=([...fil,...jrFil]).reduce((s,r)=>s+r.productValue,0);
  const comAP=([...fil,...jrFil]).filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
  const comP=([...fil,...jrFil]).filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
  const pendReqs=(passReqs||[]).filter(r=>!r.resolved);
  const newSeekRefs=referrals.filter(r=>r.isNew);
  const newJrRefs=jrReferrals.filter(r=>r.isNew);
  const newJrs=seekJrs.filter(j=>j.isNew);
  const allTotV=[...referrals,...jrReferrals].reduce((s,r)=>s+r.productValue,0);

  const [expandedRef,setExpandedRef]=useState(null);

  const rankMap={};
  fil.forEach(r=>{rankMap[r.memberId]=(rankMap[r.memberId]||0)+r.commission;});
  const ranking=Object.entries(rankMap).map(([mid,t])=>({member:members.find(m=>String(m.id)===mid),total:Number(t)})).filter(x=>x.member).sort((a,b)=>b.total-a.total);

  function RefNotifCard({r,isJr}){
    const seek=isJr?seekJrs.find(j=>sameId(j.id,r.jrId)):members.find(m=>sameId(m.id,r.memberId));
    const seekParent=isJr&&seek?members.find(m=>sameId(m.id,seek.seekId)):null;
    const pt=PRODUCT_TYPES.find(p=>p.id===r.productType)||PRODUCT_TYPES[0];
    const digits=(r.whatsapp||'').replace(/\D/g,'');
    const phone=digits?(digits.startsWith('55')&&digits.length>=12?digits:`55${digits}`):'';
    const isExpanded=expandedRef===r.id;
    return(
      <div style={{cursor:'pointer'}} onClick={()=>setExpandedRef(isExpanded?null:r.id)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,paddingTop:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:'1rem',color:'var(--green)',marginBottom:3}}>{r.clientName||'Novo cliente'}</div>
            <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
              {isJr&&<span className="tag-jr">JR</span>}
              {isJr&&seek&&<span>{seek.name}</span>}
              {isJr&&seekParent&&<><span style={{opacity:.5}}>→</span><span>SEEK: {seekParent.name}</span></>}
              {!isJr&&seek&&<span>SEEK: {seek.name}</span>}
            </div>
          </div>
          <div style={{flexShrink:0,display:'flex',gap:6,alignItems:'center'}}>
            {!r.paid&&<button className="btn" style={{padding:'5px 10px',fontSize:'.7rem',color:'var(--red)'}} onClick={e=>{e.stopPropagation();if(window.confirm(`Apagar indicação de "${r.clientName}"?`)){isJr?onDeleteJrRef(r.id):onDeleteRef(r.id);}}}><IcTrash s={13}/>Apagar</button>}
            <span style={{fontSize:'.7rem',color:'var(--muted)'}}>▾</span>
          </div>
        </div>
        {isExpanded&&(
          <div style={{marginTop:10,padding:'12px 14px',borderRadius:14,background:'var(--bg)',boxShadow:'var(--nm-in)',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:'.74rem',fontWeight:700,display:'flex',gap:6,alignItems:'center'}}>{pt.icon} {pt.name} · {fBRL(r.productValue)}</div>
            <div style={{fontSize:'.74rem',fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>Comissão: {fBRL(r.commission)}</div>
            {r.whatsapp&&<div style={{fontSize:'.74rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:6}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{fontSize:'.7rem',color:'var(--muted)'}}>{fDate(r)}</div>
            <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
              {phone&&<a href={`https://wa.me/${phone}`} target="_blank" style={{textDecoration:'none'}}>
                <button className="btn" style={{padding:'8px 14px',fontSize:'.76rem',gap:6,color:'#25D366'}}><IcWA s={15} fill="#25D366"/>WhatsApp</button>
              </a>}
              <button className="btn" style={{padding:'8px 14px',fontSize:'.76rem',color:'var(--yellow)'}} onClick={e=>{e.stopPropagation();onNav('editRef',r);}}><IcEdit s={13}/>Editar</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="page" style={{paddingBottom:110}}>

      {/* Pass requests */}
      {pendReqs.length>0&&<div className="nm" style={{padding:'18px',border:'1.5px solid rgba(192,57,43,.3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <div style={{width:9,height:9,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s ease-in-out infinite'}}/>
          <div style={{fontWeight:800,fontSize:'.86rem',color:'var(--red)'}}>Solicitações de Senha ({pendReqs.length})</div>
        </div>

function AdmMembers({members,referrals,jrReferrals,seekJrs,credentials,onSelect,onAdd,onDelete,onUpdatePin,onDeleteJr}){
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [credM,setCredM]=useState(null);
  const [newPin,setNewPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const sorted=[...members].filter(m=>m.name.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));

  function MemberForm({onCancel,onSave}){
    const [name,setName]=useState('');
    const [wa,setWa]=useState('');
    const [pix,setPix]=useState('');
    const [notes,setNotes]=useState('');
    const [pin,setPin]=useState('0000');
    const [pe,setPe]=useState('');
    function submit(e){e.preventDefault();if(!name.trim())return;if(!/^\d{4}$/.test(pin)){setPe('Deve ter 4 dígitos.');return;}onSave({name:name.trim(),whatsapp:wa,pixKey:pix.trim(),notes:notes.trim(),login:wa,pin});}
    return<form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome Completo"><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Nome" autoFocus/></Fld>
      <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
      <Fld label="Chave PIX"><input className="inp" value={pix} onChange={e=>setPix(e.target.value)} placeholder="CPF, e-mail ou chave"/></Fld>
      <Fld label="Observações"><textarea className="inp" rows={2} value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'vertical'}}/></Fld>
      <div className="nm-in" style={{padding:'14px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontWeight:700,fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)'}}>🔑 Acesso ao App</div>
        <Fld label="Senha inicial">
          <PinInput value={pin} onChange={setPin}/>
          <span style={{fontSize:'.68rem',color:'var(--muted)',marginTop:4,display:'block'}}>Padrão: 0000.</span>
          {pe&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700}}>{pe}</span>}
        </Fld>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onCancel}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Cadastrar</button></div>
    </form>;
  }

  return<>
    <TopBar title="SEEK" right={onAdd?<button className="btn btn-dark" style={{padding:'9px 14px',fontSize:'.74rem',borderRadius:14}} onClick={()=>setShowAdd(true)}><IcPlus s={14} c="#fff"/>Novo</button>:null}/>
    <div className="page" style={{paddingBottom:110}}>
      <div style={{position:'relative'}}><span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><IcSrch s={16}/></span><input className="inp" style={{paddingLeft:42}} placeholder="Buscar membro" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {sorted.length===0?<Empty text="Nenhum membro"/>:sorted.map(m=>{
        const pts=calcPoints(referrals.filter(r=>sameId(r.memberId,m.id)).reduce((s,r)=>s+r.productValue,0));
        const lv=getSeekLevel(pts);
        const myJrs=seekJrs.filter(j=>sameId(j.seekId,m.id));
        const initials=m.name.trim().slice(0,2).toUpperCase();
        const cred=credentials[m.id]||credentials[String(m.id)]||{};
        return<React.Fragment key={m.id}>
        <div className="nm" style={{padding:'13px 16px',display:'flex',flexDirection:'column',gap:0}}>
          <button style={{display:'flex',alignItems:'center',gap:12,flex:1,background:'none',border:'none',cursor:'pointer',minWidth:0,textAlign:'left'}} onClick={()=>onSelect(m)}>
            <div className="member-avatar">{initials}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                <LevelBadge points={pts} small/>
                {myJrs.length>0&&<span className="tag-jr">{myJrs.length} JR</span>}
              </div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>#{String(m.id).padStart(3,'0')} · {pts} pts{cred.login?` · ${maskPhone(cred.login)}`:''}</div>
            </div>
          </button>
          <button className="icon-btn" onClick={()=>{setCredM(m);setNewPin('');setPinErr('');}}><IcKey s={14}/></button>
          <button className="icon-btn" onClick={()=>setConfirmDel(m)}><IcTrash s={14} c="var(--red)"/></button>
        </div>
        {myJrs.length>0&&<div style={{paddingLeft:16,paddingBottom:8,borderTop:'1px solid var(--gray)',marginTop:8}}>
          <div style={{fontSize:'.6rem',fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--muted)',margin:'6px 0 6px'}}>SEEK JR ({myJrs.length})</div>
          {myJrs.map(jr=><div key={jr.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0'}}>
            <div>
              <span style={{fontWeight:700,fontSize:'.82rem'}}>{jr.name}</span>
              <span className="tag-jr" style={{marginLeft:6}}>{jr.id}JR</span>
              <div style={{fontSize:'.66rem',color:'var(--muted)',marginTop:1}}>{maskPhone(jr.whatsapp)}</div>
            </div>
            <button className="icon-btn" style={{width:28,height:28,borderRadius:8}} onClick={()=>onSelect({...jr,_isJr:true,seekMember:m})}><IcEdit s={12}/></button>
            <button className="icon-btn" style={{width:28,height:28,borderRadius:8}} onClick={()=>{if(window.confirm(`Excluir SEEK JR "${jr.name}"?`))onDeleteJr(jr.id);}}><IcTrash s={12} c="var(--red)"/></button>
          </div>)}
        </div>}
        </React.Fragment>;
      })}
    </div>
    {showAdd&&onAdd&&<Sheet title="Novo SEEK" onClose={()=>setShowAdd(false)}><MemberForm onCancel={()=>setShowAdd(false)} onSave={d=>{onAdd(d);setShowAdd(false);}}/></Sheet>}
    {confirmDel&&<Confirm title="Excluir membro" msg={`Excluir "${confirmDel.name}" e todas as indicações?`} onCancel={()=>setConfirmDel(null)} onOk={()=>{onDelete(confirmDel.id);setConfirmDel(null);}}/>}
    {credM&&(()=>{
      const cred=credentials[credM.id]||{login:credM.whatsapp||'',pin:'0000'};
      const phone=cred.login?(cred.login.startsWith('55')&&cred.login.length>=12?cred.login:`55${cred.login}`):'';
      function savePin(){if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}onUpdatePin(credM.id,newPin);setPinErr('');setNewPin('');setCredM(null);}
      function sendWA(){const msg=encodeURIComponent(`Olá ${credM.name}! Credenciais SEEK:\nLogin: ${maskPhone(cred.login)}\nSenha: ${cred.pin}`);window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');}
      return<Sheet title="Credenciais" onClose={()=>setCredM(null)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Login</div><div style={{fontWeight:700}}>{maskPhone(cred.login)||'—'}</div></div>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Senha</div><div style={{fontWeight:900,fontSize:'1.8rem',letterSpacing:'.5em'}}>{cred.pin}</div></div>
          <Fld label="Nova senha"><PinInput value={newPin} onChange={setNewPin} autoFocus/>{pinErr&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700,marginTop:4}}>{pinErr}</span>}</Fld>
          <div style={{display:'flex',gap:10}}><button className="btn btn-full" onClick={()=>setCredM(null)}>Fechar</button><button className="btn btn-dark btn-full" onClick={savePin}>Salvar</button></div>
          {phone&&<button className="btn btn-full" onClick={sendWA} style={{gap:8}}><IcWA s={15}/>WhatsApp</button>}
        </div>
      </Sheet>;
    })()}
  </>;
}

/* Fully controlled "Editar Membro" form. The previous version mixed
   uncontrolled inputs (defaultValue + FormData) with a masked PhoneInput
   that had a no-op onChange, so editing the phone silently did nothing.
   This version controls every field explicitly and saves the phone as
   digits-only via PlainPhoneInput, matching the login format exactly. */
function EditMemberForm({member,onClose,onSave}){
  const [name,setName]=useState(member.name||'');
  const [wa,setWa]=useState((member.whatsapp||'').replace(/\D/g,''));
  const [pix,setPix]=useState(member.pixKey||'');
  const [notes,setNotes]=useState(member.notes||'');
  function submit(e){
    e.preventDefault();
    if(!name.trim())return;
    onSave({name:name.trim(),whatsapp:wa,pixKey:pix.trim(),notes:notes.trim()});
  }
  return(
    <Sheet title="Editar Membro" onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:14}}>
        <Fld label="Nome"><input className="inp" value={name} onChange={e=>setName(e.target.value)} autoFocus/></Fld>
        <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
        <Fld label="PIX"><input className="inp" value={pix} onChange={e=>setPix(e.target.value)}/></Fld>
        <Fld label="Notas"><textarea className="inp" value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{resize:'vertical'}}/></Fld>
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>
  );
}

            {r.isNew&&<span style={{position:'absolute',top:10,right:0,background:'var(--green)',color:'#fff',fontSize:'.58rem',fontWeight:900,borderRadius:99,padding:'2px 8px'}}>NOVA</span>}
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.86rem'}}>{r.clientName}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600}}>{fDate(r)}</div>
            </div>
            {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
              {phone?<a href={`https://wa.me/${phone}`} target="_blank" style={{display:'flex',alignItems:'center',gap:5,color:'#25D366',textDecoration:'none'}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</a>:<span style={{display:'flex',alignItems:'center',gap:5}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</span>}
            </div>}
            <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:8}}>{PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name||'Automóvel'} · {fBRL(r.productValue)}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>
              <div style={{display:'flex',gap:7,alignItems:'center'}}>
                <button className="pill" style={{color:r.paid?'var(--green)':'var(--red)'}} onClick={()=>onTogglePaid(r.id)}>{r.paid?<IcCheck s={11}/>:<IcClock s={11}/>}{r.paid?'Pago':'Pendente'}</button>
                <button className="icon-btn" style={{width:28,height:28,borderRadius:9}} onClick={()=>setEditRef(r)}><IcEdit s={12}/></button>
                <button className="icon-btn" style={{width:28,height:28,borderRadius:9}} onClick={()=>{if(window.confirm(`Apagar "${r.clientName}"?`))onDeleteReferral(r.id);}}><IcTrash s={12} c="var(--red)"/></button>
              </div>
            </div>
          </div>{i<myRefs.length-1&&<Div/>}</div>;
        })}
      </div>
      <button className="btn btn-full" style={{color:'var(--red)',padding:14}} onClick={()=>setDelMember(true)}><IcTrash s={14}/>Excluir membro</button>
    </div>
    {showAdd&&<Sheet title="Nova Indicação" onClose={()=>setShowAdd(false)}><ReferralForm onCancel={()=>setShowAdd(false)} onSave={d=>{onAddReferral(d);setShowAdd(false);}} label="Salvar"/></Sheet>}
    {editRef&&<Sheet title="Editar Indicação" onClose={()=>setEditRef(null)}><ReferralForm initial={editRef} onCancel={()=>setEditRef(null)} onSave={d=>{onUpdateReferral(editRef.id,d);setEditRef(null);}} label="Salvar"/></Sheet>}
    {showEdit&&<EditMemberForm member={member} onClose={()=>setShowEdit(false)} onSave={d=>{onUpdateMember(member.id,d);setShowEdit(false);}}/>}
    {showCreds&&(()=>{
      const phone=cred.login?(cred.login.startsWith('55')&&cred.login.length>=12?cred.login:`55${cred.login}`):'';
      function saveP(){if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}onUpdatePin(member.id,newPin);setPinErr('');setNewPin('');setShowCreds(false);}
      function sendP(){const msg=encodeURIComponent(`Olá ${member.name}! Nova senha SEEK:\nLogin: ${maskPhone(cred.login)}\nSenha: ${newPin||cred.pin}`);window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');}
      return<Sheet title="Credenciais" onClose={()=>setShowCreds(false)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Login</div><div style={{fontWeight:700}}>{maskPhone(cred.login)}</div></div>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Senha</div><div style={{fontWeight:900,fontSize:'1.8rem',letterSpacing:'.5em'}}>{cred.pin}</div></div>
          <Fld label="Nova senha"><PinInput value={newPin} onChange={setNewPin} autoFocus/>{pinErr&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700,marginTop:4}}>{pinErr}</span>}</Fld>
          <div style={{display:'flex',gap:10}}><button className="btn btn-full" onClick={()=>setShowCreds(false)}>Fechar</button><button className="btn btn-dark btn-full" onClick={saveP}>Salvar</button></div>
          {phone&&<button className="btn btn-full" onClick={sendP} style={{gap:8}}><IcWA s={15}/>WhatsApp</button>}
        </div>
      </Sheet>;
    })()}
    {delMember&&<Confirm title="Excluir" msg={`Excluir "${member.name}" e todas as indicações?`} onCancel={()=>setDelMember(false)} onOk={()=>{onDeleteMember(member.id);setDelMember(false);}}/>}
  </>;
}
