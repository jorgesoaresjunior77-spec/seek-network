function Confetti(){
  const pieces=Array.from({length:36},(_,i)=>({
    id:i,
    color:['#E63333','#FF7700','#DDAA00','#22AA44','#2277EE','#8833BB','#FF69B4','#00CCCC'][i%8],
    left:Math.random()*100,
    delay:Math.random()*.8,
    duration:1.4+Math.random()*.8,
    size:5+Math.random()*9,
    isCircle:i%3===0,
  }));
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:10001}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',top:-20,left:`${p.left}%`,
          width:p.size,height:p.size,
          background:p.color,
          borderRadius:p.isCircle?'50%':2,
          animation:`confetti-fall ${p.duration}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function SpinModal({seekerName,pendingCount,onClose,onResult}){
  const [rotation,setRotation]=useState(0);
  const [spinning,setSpinning]=useState(false);
  const [won,setWon]=useState(null);
  const [pendingWin,setPendingWin]=useState(null);

  function handleSpin(){
    if(spinning||won)return;
    const rand=Math.random();
    let cum=0,winner=SPIN_PRIZES[0];
    for(const p of SPIN_PRIZES){cum+=p.prob;if(rand<cum){winner=p;break;}}
    setPendingWin(winner);
    setSpinning(true);
    const mid=winner.start+winner.span/2;
    const finalDeg=(360-mid%360+360)%360;
    setTimeout(()=>setRotation(1800+finalDeg),20);
  }

  function handleTransitionEnd(e){
    if(e.propertyName!=='transform'||!spinning)return;
    setSpinning(false);
    if(pendingWin){setWon(pendingWin);onResult(pendingWin.value);}
  }

  const size=270;
  const R=size/2;
  const conicGrad='conic-gradient('+SPIN_PRIZES.map(p=>`${p.color} ${p.start}deg ${p.start+p.span}deg`).join(',')+')';

  return(
    <div className="spin-overlay">
      {won&&<Confetti/>}
      <div style={{
        background:'#fff',borderRadius:28,padding:'26px 20px 28px',
        maxWidth:340,width:'calc(100% - 32px)',
        display:'flex',flexDirection:'column',alignItems:'center',gap:18,
        position:'relative',zIndex:1,
        boxShadow:'0 24px 64px rgba(0,0,0,.5)',
      }}>
        {!won?(
          <>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.35rem',fontWeight:900,letterSpacing:'.03em',color:'#111',marginBottom:3}}>🎰 ROLETA DA SORTE</div>
              <div style={{fontSize:'.76rem',color:'#888',fontWeight:700}}>Parabéns, {seekerName}! Você tem uma indicação premiada!</div>
              {pendingCount>1&&<div style={{fontSize:'.68rem',color:'#FF7700',fontWeight:800,marginTop:4}}>{pendingCount} chances pendentes — gire uma por vez</div>}
            </div>

            {/* Wheel container */}
            <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
              {/* Pointer */}
              <div style={{
                position:'absolute',top:-14,left:'50%',transform:'translateX(-50%)',
                fontSize:'1.6rem',lineHeight:1,zIndex:3,
                filter:'drop-shadow(0 2px 4px rgba(0,0,0,.6))',
              }}>▼</div>
              {/* Outer ring */}
              <div style={{
                position:'absolute',inset:-6,borderRadius:'50%',
                background:'linear-gradient(135deg,#FFD700,#FF8C00,#E63333,#8833BB,#2277EE,#22AA44)',
                zIndex:0,
              }}/>
              {/* Wheel */}
              <div
                onTransitionEnd={handleTransitionEnd}
                style={{
                  position:'absolute',inset:0,borderRadius:'50%',
                  background:conicGrad,
                  transform:`rotate(${rotation}deg)`,
                  transition:spinning?'transform 4.2s cubic-bezier(0.17,0.67,0.12,0.99)':'none',
                  zIndex:1,
                }}
              >
                {SPIN_PRIZES.map(p=>{
                  const mid=p.start+p.span/2;
                  const rad=mid*Math.PI/180;
                  const r=0.60*R;
                  const x=R+r*Math.sin(rad);
                  const y=R-r*Math.cos(rad);
                  return(
                    <div key={p.value} style={{
                      position:'absolute',left:x,top:y,
                      transform:`translate(-50%,-50%) rotate(${mid}deg)`,
                      color:'#fff',fontWeight:900,fontSize:'.70rem',
                      textShadow:'0 1px 3px rgba(0,0,0,.9)',
                      whiteSpace:'nowrap',pointerEvents:'none',lineHeight:1,
                    }}>
                      {p.label}
                    </div>
                  );
                })}
              </div>
              {/* Center hub */}
              <div style={{
                position:'absolute',top:'50%',left:'50%',
                transform:'translate(-50%,-50%)',
                width:28,height:28,borderRadius:'50%',
                background:'#fff',boxShadow:'0 2px 10px rgba(0,0,0,.5)',zIndex:4,
              }}/>
            </div>

            <button
              onClick={handleSpin}
              disabled={spinning}
              style={{
                padding:'15px 44px',borderRadius:50,border:'none',
                cursor:spinning?'not-allowed':'pointer',
                background:spinning?'#ccc':'linear-gradient(135deg,#FF6B00,#E63333)',
                color:'#fff',fontWeight:900,fontSize:'1.15rem',
                letterSpacing:'.04em',
                boxShadow:spinning?'none':'0 4px 20px rgba(230,51,51,.55)',
                transition:'all .2s',
              }}
            >{spinning?'Girando...':'🎯  GIRAR!'}</button>
          </>
        ):(
          <>
            <div style={{fontSize:'3.2rem',textAlign:'center',animation:'prize-pop .5s ease'}}>🎉</div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'.85rem',fontWeight:700,color:'#888',marginBottom:8}}>Você ganhou</div>
              <div style={{
                fontSize:'3rem',fontWeight:900,lineHeight:1.1,
                background:'linear-gradient(135deg,#FF6B00,#8833BB)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                animation:'prize-pop .5s ease',
              }}>R$ {won.value}</div>
              <div style={{fontSize:'.82rem',color:'#888',fontWeight:600,marginTop:6}}>de Bônus Roleta! 🎰</div>
            </div>
            <button
              onClick={onClose}
              style={{
                padding:'14px 48px',borderRadius:50,border:'none',cursor:'pointer',
                background:'linear-gradient(135deg,#1D7A3A,#22AA44)',
                color:'#fff',fontWeight:900,fontSize:'1rem',
                boxShadow:'0 4px 18px rgba(29,122,58,.45)',
              }}
            >Fechar</button>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const [loading,setLoading]=useState(true);
  const [session,setSession]=useState(null);
  const [adms,setAdms]=useState([]);
  const [members,setMembers]=useState([]);
  const [referrals,setReferrals]=useState([]);
  const [seekJrs,setSeekJrs]=useState([]);
  const [jrReferrals,setJrReferrals]=useState([]);
  const [credentials,setCredentials]=useState({});
  const [passReqs,setPassReqs]=useState([]);
  const [levelNotifs,setLevelNotifs]=useState([]);
  const [offers,setOffers]=useState([]);
  const [spinRewards,setSpinRewards]=useState([]);
  const [pendingSpins,setPendingSpins]=useState([]);

  useEffect(()=>{
    async function boot(){
      cleanupLegacyStorageKeys();
      const [
        {data:mRows,error:e1},{data:rRows},{data:cRows},{data:reqRows},
        {data:jrRows},{data:jrRefRows},{data:notifRows},{data:offerRows},{data:admRows,error:eAdm},
        {data:spinRows},{data:spinPendingRows},
      ]=await Promise.all([
        db.from('members').select('*'),
        db.from('referrals').select('*'),
        db.from('credentials').select('*'),
        db.from('pass_requests').select('*'),
        db.from('seek_jrs').select('*'),
        db.from('jr_referrals').select('*'),
        db.from('level_notifs').select('*'),
        db.from('offers').select('*'),
        db.from('adms').select('*'),
        db.from('spin_rewards').select('*'),
        db.from('spin_pending').select('*'),
      ]);
      if(e1)console.error('[SEEK boot] members error:',e1);
      if(eAdm)console.error('[SEEK boot] ERRO tabela adms — provavelmente migration não rodou:',JSON.stringify(eAdm));
      setMembers((mRows||[]).map(mMember));
      setAdms((admRows||[]).map(mAdm));
      setReferrals((rRows||[]).map(mRef));
      setCredentials(buildCreds(cRows));
      setPassReqs((reqRows||[]).map(mPassReq));
      setSeekJrs((jrRows||[]).map(mSeekJr));
      setJrReferrals((jrRefRows||[]).map(mJrRef));
      setLevelNotifs((notifRows||[]).map(mNotif));
      setOffers((offerRows||[]).map(mOffer));
      setSpinRewards((spinRows||[]).map(mSpin));
      setPendingSpins((spinPendingRows||[]).map(mSpinPending));
      setLoading(false);
    }
    boot();
  },[]);

  function checkLevelUp(memberId,oldRefs,newRefs){
    const oldPts=calcPoints(oldRefs.filter(r=>sameId(r.memberId,memberId)).reduce((s,r)=>s+r.productValue,0));
    const newPts=calcPoints(newRefs.filter(r=>sameId(r.memberId,memberId)).reduce((s,r)=>s+r.productValue,0));
    const oldLv=getSeekLevel(oldPts);
    const newLv=getSeekLevel(newPts);
    if(newLv.id!==oldLv.id&&newLv.min>oldLv.min){
      db.from('level_notifs').insert({member_id:String(memberId),level_id:newLv.id,dismissed:false}).select().single()
        .then(({data})=>{if(data)setLevelNotifs(u=>[...u,mNotif(data)]);});
    }
  }

  async function addMember(data,admId){
    const rawL=(data.whatsapp||data.login||'').replace(/\D/g,'');
    const {data:row,error}=await db.from('members').insert({name:data.name,whatsapp:rawL,pix_key:data.pixKey,notes:data.notes,adm_id:admId||null}).select().single();
    if(error||!row){console.error('[addMember]',error);return;}
    setMembers(u=>[...u,mMember(row)]);
    await db.from('credentials').insert({key:String(row.id),login:rawL,pin:data.pin||'0000'});
    setCredentials(u=>({...u,[String(row.id)]:{login:rawL,pin:data.pin||'0000'}}));
  }

  async function updateMember(mid,data){
    const rawL=(data.whatsapp||'').replace(/\D/g,'');
    await db.from('members').update({name:data.name,whatsapp:rawL,pix_key:data.pixKey,notes:data.notes}).eq('id',mid);
    setMembers(u=>u.map(m=>sameId(m.id,mid)?{...m,...data,whatsapp:rawL}:m));
    if(data.whatsapp!==undefined){
      await db.from('credentials').update({login:rawL}).eq('key',String(mid));
      setCredentials(u=>{const k=Object.keys(u).find(k=>sameId(k,mid));if(!k)return u;return{...u,[k]:{...u[k],login:rawL}};});
    }
  }

  async function deleteMember(mid){
    const midStr=String(mid);
    const jrIds=seekJrs.filter(j=>sameId(j.seekId,mid)).map(j=>String(j.id));
    await Promise.all([
      db.from('referrals').delete().eq('member_id',midStr),
      jrIds.length?db.from('jr_referrals').delete().in('jr_id',jrIds):Promise.resolve(),
      jrIds.length?db.from('seek_jrs').delete().in('id',jrIds):Promise.resolve(),
      db.from('credentials').delete().eq('key',midStr),
      ...jrIds.map(jid=>db.from('credentials').delete().eq('key',`jr_${jid}`)),
      db.from('members').delete().eq('id',mid),
    ]);
    setMembers(u=>u.filter(m=>!sameId(m.id,mid)));
    setSeekJrs(u=>u.filter(j=>!sameId(j.seekId,mid)));
    setReferrals(u=>u.filter(r=>!sameId(r.memberId,mid)));
    setJrReferrals(u=>u.filter(r=>!jrIds.some(jid=>sameId(r.jrId,jid))));
    setCredentials(u=>{const nc={...u};delete nc[midStr];jrIds.forEach(jid=>delete nc[`jr_${jid}`]);return nc;});
  }

  async function deleteSeekJr(jid){
    const jidStr=String(jid);
    await Promise.all([
      db.from('jr_referrals').delete().eq('jr_id',jidStr),
      db.from('credentials').delete().eq('key',`jr_${jidStr}`),
      db.from('seek_jrs').delete().eq('id',jidStr),
    ]);
    setSeekJrs(u=>u.filter(j=>!sameId(j.id,jid)));
    setJrReferrals(u=>u.filter(r=>!sameId(r.jrId,jid)));
    setCredentials(u=>{const nc={...u};delete nc[`jr_${jidStr}`];return nc;});
  }

  async function addAdm(data){
    const rawL=(data.whatsapp||'').replace(/\D/g,'');
    const payload={name:data.name,whatsapp:rawL,pix_key:data.pixKey||null,notes:data.notes||null};
    console.log('[addAdm] INSERT payload=',JSON.stringify(payload));
    const {data:row,error}=await db.from('adms').insert(payload).select().single();
    console.log('[addAdm] resposta Supabase — row=',JSON.stringify(row),'error=',JSON.stringify(error));
    if(error||!row){
      console.error('[addAdm] FALHOU. Código:',error?.code,'Mensagem:',error?.message,'Detalhes:',error?.details);
      window.alert('[SEEK] Erro ao cadastrar vendedor:\n'+(error?.message||'Sem resposta do banco')+(error?.code?'\nCódigo: '+error.code:''));
      return;
    }
    setAdms(u=>[...u,mAdm(row)]);
    const pin=data.pin||'0000';
    const {error:eC}=await db.from('credentials').insert({key:`adm_${row.id}`,login:rawL,pin});
    if(eC)console.error('[addAdm] erro ao salvar credencial:',JSON.stringify(eC));
    setCredentials(u=>({...u,[`adm_${row.id}`]:{login:rawL,pin}}));
    console.log('[addAdm] OK — vendedor id=',row.id);
  }

  async function deleteAdm(admId){
    const admStr=String(admId);
    const admMids=members.filter(m=>sameId(m.admId,admId)).map(m=>String(m.id));
    const admJids=seekJrs.filter(j=>admMids.some(id=>sameId(j.seekId,id))).map(j=>String(j.id));
    await Promise.all([
      admMids.length?db.from('referrals').delete().in('member_id',admMids):Promise.resolve(),
      admJids.length?db.from('jr_referrals').delete().in('jr_id',admJids):Promise.resolve(),
      admJids.length?db.from('seek_jrs').delete().in('id',admJids):Promise.resolve(),
      admMids.length?db.from('credentials').delete().in('key',admMids):Promise.resolve(),
      ...admJids.map(jid=>db.from('credentials').delete().eq('key',`jr_${jid}`)),
      admMids.length?db.from('members').delete().in('id',admMids.map(Number)):Promise.resolve(),
      db.from('credentials').delete().eq('key',`adm_${admStr}`),
      db.from('adms').delete().eq('id',admId),
    ]);
    setAdms(u=>u.filter(a=>!sameId(a.id,admId)));
    setMembers(u=>u.filter(m=>!sameId(m.admId,admId)));
    setSeekJrs(u=>u.filter(j=>!admMids.some(id=>sameId(j.seekId,id))));
    setReferrals(u=>u.filter(r=>!admMids.some(id=>sameId(r.memberId,id))));
    setJrReferrals(u=>u.filter(r=>!admJids.some(id=>sameId(r.jrId,id))));
    setCredentials(u=>{const nc={...u};delete nc[`adm_${admStr}`];admMids.forEach(id=>delete nc[id]);admJids.forEach(jid=>delete nc[`jr_${jid}`]);return nc;});
  }

  async function updatePin(key,pin){
    await db.from('credentials').update({pin}).eq('key',String(key));
    setCredentials(u=>({...u,[key]:{...(u[key]||{}),pin}}));
  }

  async function addReferral(data,memberId){
    const old=[...referrals];
    const mid=String(memberId);
    const hasProduct=(data.productValue||0)>0;
    const refStatus=hasProduct?'a_pagar':'aguardando';
    const {data:saved,error}=await db.from('referrals').insert({member_id:mid,client_name:data.clientName,whatsapp:data.whatsapp||null,product_type:data.productType||'auto',product_value:data.productValue||0,commission:data.commission||0,year:data.year,month:data.month,day:data.day,paid:false,is_new:data.isNew!==false,status:refStatus}).select().single();
    if(error){console.error('[addReferral]',error);return;}
    const nr=mRef(saved);
    const u=[...referrals,nr];setReferrals(u);
    if(mid)checkLevelUp(mid,old,u);
    if(hasProduct&&mid)await addSpinPending(String(mid),null,saved.id);
  }

  async function updateReferral(rid,data){
    await db.from('referrals').update({client_name:data.clientName,whatsapp:data.whatsapp||null,product_type:data.productType,product_value:data.productValue,commission:data.commission,year:data.year,month:data.month,day:data.day}).eq('id',rid);
    setReferrals(u=>u.map(r=>sameId(r.id,rid)?{...r,...data}:r));
  }

  async function togglePaid(rid){
    const ref=referrals.find(r=>sameId(r.id,rid));
    if(!ref)return;
    const newPaid=!ref.paid;
    const newStatus=newPaid?'pago':'a_pagar';
    await db.from('referrals').update({paid:newPaid,status:newStatus}).eq('id',rid);
    setReferrals(u=>u.map(r=>sameId(r.id,rid)?{...r,paid:newPaid,status:newStatus}:r));
  }

  async function deleteReferral(rid){
    await db.from('referrals').delete().eq('id',rid);
    setReferrals(u=>u.filter(r=>!sameId(r.id,rid)));
  }

  async function addSeekJr(data){
    const existing=seekJrs.filter(j=>sameId(j.seekId,data.seekId)).length;
    const jrId=existing===0?`${data.seekId}JR`:`${data.seekId}JR${existing+1}`;
    const rawJL=(data.whatsapp||'').replace(/\D/g,'');
    const {error:je}=await db.from('seek_jrs').insert({id:jrId,name:data.name,whatsapp:rawJL,seek_id:String(data.seekId),pin:data.pin||'0000',is_new:true});
    if(je){console.error('[addSeekJr]',je);return;}
    await db.from('credentials').insert({key:`jr_${jrId}`,login:rawJL||jrId,pin:data.pin||'0000'});
    setSeekJrs(u=>[...u,{id:jrId,name:data.name,whatsapp:rawJL,seekId:String(data.seekId),pin:data.pin||'0000',isNew:true}]);
    setCredentials(u=>({...u,[`jr_${jrId}`]:{login:rawJL||jrId,pin:data.pin||'0000'}}));
  }

  async function addJrReferral(data){
    const hasProduct=(data.productValue||0)>0;
    const refStatus=hasProduct?'a_pagar':'aguardando';
    const {data:saved,error}=await db.from('jr_referrals').insert({jr_id:String(data.jrId),client_name:data.clientName,whatsapp:data.whatsapp||null,product_type:data.productType||'auto',product_value:data.productValue||0,commission:data.commission||0,year:data.year,month:data.month,day:data.day,paid:false,is_new:true,status:refStatus}).select().single();
    if(error){console.error('[addJrReferral]',error);return;}
    setJrReferrals(u=>[...u,mJrRef(saved)]);
    if(hasProduct)await addSpinPending(null,String(data.jrId),saved.id);
  }

  async function markReferralSold(rid,data,isJr){
    if(isJr){
      const ref=jrReferrals.find(r=>sameId(r.id,rid));
      if(!ref)return;
      await db.from('jr_referrals').update({product_type:data.productType,product_value:data.productValue,commission:data.commission,year:data.year,month:data.month,day:data.day,paid:false,status:'a_pagar'}).eq('id',rid);
      setJrReferrals(u=>u.map(r=>sameId(r.id,rid)?{...r,...data,status:'a_pagar',paid:false}:r));
      await addSpinPending(null,String(ref.jrId),String(rid));
    }else{
      const ref=referrals.find(r=>sameId(r.id,rid));
      if(!ref)return;
      const oldRefs=[...referrals];
      await db.from('referrals').update({product_type:data.productType,product_value:data.productValue,commission:data.commission,year:data.year,month:data.month,day:data.day,paid:false,status:'a_pagar'}).eq('id',rid);
      const newRefs=referrals.map(r=>sameId(r.id,rid)?{...r,...data,status:'a_pagar',paid:false}:r);
      setReferrals(newRefs);
      checkLevelUp(ref.memberId,oldRefs,newRefs);
      await addSpinPending(String(ref.memberId),null,String(rid));
    }
  }

  async function updateJrReferral(rid,data){
    await db.from('jr_referrals').update({client_name:data.clientName,whatsapp:data.whatsapp||null,product_type:data.productType,product_value:data.productValue,commission:data.commission,year:data.year,month:data.month,day:data.day}).eq('id',rid);
    setJrReferrals(u=>u.map(r=>sameId(r.id,rid)?{...r,...data}:r));
  }

  async function addSpinPending(seekId,jrId,referralId){
    const{data:saved,error}=await db.from('spin_pending').insert({seek_id:seekId||null,jr_id:jrId||null,referral_id:referralId?String(referralId):null}).select().single();
    if(error){console.error('[addSpinPending]',error);return;}
    setPendingSpins(u=>[...u,mSpinPending(saved)]);
  }

  async function consumeSpinPending(pendingId){
    await db.from('spin_pending').delete().eq('id',pendingId);
    setPendingSpins(u=>u.filter(s=>s.id!==pendingId));
  }

  async function addSpinReward(seekId,jrId,referralId,value){
    const{data:saved,error}=await db.from('spin_rewards').insert({seek_id:seekId||null,jr_id:jrId||null,referral_id:referralId?String(referralId):null,value,used:true}).select().single();
    if(error){console.error('[addSpinReward]',error);return;}
    setSpinRewards(u=>[...u,mSpin(saved)]);
  }

  async function toggleJrPaid(rid){
    const ref=jrReferrals.find(r=>sameId(r.id,rid));
    if(!ref)return;
    const newPaid=!ref.paid;
    const newStatus=newPaid?'pago':'a_pagar';
    await db.from('jr_referrals').update({paid:newPaid,status:newStatus}).eq('id',rid);
    setJrReferrals(u=>u.map(r=>sameId(r.id,rid)?{...r,paid:newPaid,status:newStatus}:r));
  }

  async function deleteJrReferral(rid){
    await db.from('jr_referrals').delete().eq('id',rid);
    setJrReferrals(u=>u.filter(r=>r.id!==rid));
  }

  async function dismissLevelNotif(notifId){
    await db.from('level_notifs').update({dismissed:true}).eq('id',notifId);
    setLevelNotifs(u=>u.map(n=>sameId(n.id,notifId)?{...n,dismissed:true}:n));
  }

  async function addOffer(data){
    const {data:saved,error}=await db.from('offers').insert({url:data.url,caption:data.caption||''}).select().single();
    if(error){console.error('[addOffer]',error);return;}
    setOffers(u=>[...u,mOffer(saved)]);
  }

  async function deleteOffer(id){
    await db.from('offers').delete().eq('id',id);
    setOffers(u=>u.filter(o=>o.id!==id));
  }

  function markRead(id,type){
    if(type==='forgot'){
      db.from('pass_requests').update({resolved:true}).eq('id',id);
      setPassReqs(u=>u.map(r=>sameId(r.id,id)?{...r,resolved:true}:r));
    } else if(type==='jr'){
      db.from('seek_jrs').update({is_new:false}).eq('id',id);
      setSeekJrs(u=>u.map(j=>sameId(j.id,id)?{...j,isNew:false}:j));
    } else {
      db.from('referrals').update({is_new:false}).eq('id',id);
      db.from('jr_referrals').update({is_new:false}).eq('id',id);
      setReferrals(u=>u.map(r=>sameId(r.id,id)?{...r,isNew:false}:r));
      setJrReferrals(u=>u.map(r=>sameId(r.id,id)?{...r,isNew:false}:r));
    }
  }

  if(loading)return<Spinner/>;

  if(!session){
    return<LoginScreen onLogin={s=>{
      console.log('[SEEK route] onLogin received session:',s);
      setSession(s);
    }} credentials={credentials} members={members} seekJrs={seekJrs}/>;
  }

  console.log('[SEEK route] rendering for session:',session);

  if(session.role==='jr'){
    const jr=seekJrs.find(j=>sameId(j.id,session.jrId));
    if(!jr){
      console.error('[SEEK route] JR routing FAILED — no seekJrs entry matches session.jrId.',
        {sessionJrId:session.jrId,availableJrIds:seekJrs.map(j=>j.id)});
      return<div style={{padding:40,textAlign:'center'}}>JR não encontrado. <button className="btn" onClick={()=>setSession(null)}>Sair</button></div>;
    }
    const seekMember=members.find(m=>sameId(m.id,jr.seekId));
    if(!seekMember){
      console.warn('[SEEK route] JR found, but its parent SEEK member was not found — JR panel will render with seekMember=undefined.',
        {jrSeekId:jr.seekId,availableMemberIds:members.map(m=>m.id)});
    } else {
      console.log(`[SEEK route] JR PANEL — jr="${jr.name}" (id=${jr.id}) seekMember="${seekMember.name}" (id=${seekMember.id})`);
    }
    const jrPending=pendingSpins.filter(s=>sameId(s.jrId,jr.id));
    if(jrPending.length>0){
      const first=jrPending[0];
      return<SpinModal seekerName={jr.name} pendingCount={jrPending.length} onResult={v=>addSpinReward(null,String(jr.id),first.referralId,v)} onClose={()=>consumeSpinPending(first.id)}/>;
    }
    return<SeekJrPanel jr={jr} referrals={jrReferrals} seekMember={seekMember} credentials={credentials} onLogout={()=>setSession(null)} onAddReferral={addJrReferral} onChangePin={updatePin} offers={offers} spinRewards={spinRewards}/>;
  }

  if(session.role==='member'){
    const member=members.find(m=>sameId(m.id,session.memberId));
    if(!member){
      console.error('[SEEK route] SEEK routing FAILED — no members entry matches session.memberId.',
        {sessionMemberId:session.memberId,availableMemberIds:members.map(m=>m.id)});
      return<div style={{padding:40,textAlign:'center'}}>Membro não encontrado. <button className="btn" onClick={()=>setSession(null)}>Sair</button></div>;
    }
    console.log(`[SEEK route] SEEK PANEL — member="${member.name}" (id=${member.id})`);
    const memberPending=pendingSpins.filter(s=>sameId(s.seekId,member.id));
    if(memberPending.length>0){
      const first=memberPending[0];
      return<SpinModal seekerName={member.name} pendingCount={memberPending.length} onResult={v=>addSpinReward(String(member.id),null,first.referralId,v)} onClose={()=>consumeSpinPending(first.id)}/>;
    }
    return<MemberPanel member={member} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onLogout={()=>setSession(null)} onAddReferral={data=>addReferral(data,member.id)} onAddJr={addSeekJr} onChangePin={updatePin} levelNotifs={levelNotifs} onDismissNotif={dismissLevelNotif} offers={offers} spinRewards={spinRewards}/>;
  }

  if(session.role==='master'){
    return<MasterPanel adms={adms} members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} offers={offers} passReqs={passReqs} levelNotifs={levelNotifs} onLogout={()=>setSession(null)} onAddAdm={addAdm} onDeleteAdm={deleteAdm} onAddMember={addMember} onUpdateMember={updateMember} onDeleteMember={deleteMember} onUpdatePin={updatePin} onAddReferral={addReferral} onUpdateReferral={updateReferral} onTogglePaid={togglePaid} onDeleteReferral={deleteReferral} onAddSeekJr={addSeekJr} onDeleteSeekJr={deleteSeekJr} onAddJrReferral={addJrReferral} onToggleJrPaid={toggleJrPaid} onDeleteJrReferral={deleteJrReferral} onAddOffer={addOffer} onDeleteOffer={deleteOffer} onMarkRead={markRead} spinRewards={spinRewards} onMarkSold={markReferralSold} onUpdateJrReferral={updateJrReferral}/>;
  }

  if(session.role==='adm'){
    const adm=adms.find(a=>sameId(a.id,session.admId));
    if(!adm)return<div style={{padding:40,textAlign:'center'}}>Vendedor não encontrado. <button className="btn" onClick={()=>setSession(null)}>Sair</button></div>;
    const myMembers=members.filter(m=>sameId(m.admId,adm.id));
    const mySeekJrs=seekJrs.filter(j=>myMembers.some(m=>sameId(m.id,j.seekId)));
    const myReferrals=referrals.filter(r=>myMembers.some(m=>sameId(m.id,r.memberId)));
    const myJrReferrals=jrReferrals.filter(r=>mySeekJrs.some(j=>sameId(j.id,r.jrId)));
    return<VendedorPanel adm={adm} members={myMembers} referrals={myReferrals} jrReferrals={myJrReferrals} seekJrs={mySeekJrs} credentials={credentials} offers={offers} passReqs={passReqs} levelNotifs={levelNotifs} onLogout={()=>setSession(null)} onAddMember={addMember} onUpdateMember={updateMember} onDeleteMember={deleteMember} onUpdatePin={updatePin} onAddReferral={addReferral} onUpdateReferral={updateReferral} onTogglePaid={togglePaid} onDeleteReferral={deleteReferral} onAddSeekJr={addSeekJr} onDeleteSeekJr={deleteSeekJr} onAddJrReferral={addJrReferral} onToggleJrPaid={toggleJrPaid} onDeleteJrReferral={deleteJrReferral} onAddOffer={addOffer} onDeleteOffer={deleteOffer} onMarkRead={markRead} spinRewards={spinRewards} onMarkSold={markReferralSold} onUpdateJrReferral={updateJrReferral}/>;
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>





</body>
</html>
