<style>
:root{
  --bg:#F2F2F2;--bg-up:#F8F8F8;--black:#111111;--gray:#D0D0D0;--white:#FFFFFF;
  --muted:#888888;--green:#1D7A3A;--red:#C0392B;--yellow:#C47700;
  --nm-out:7px 7px 18px rgba(0,0,0,0.26),-7px -7px 18px rgba(255,255,255,0.95);
  --nm-in:inset 5px 5px 12px rgba(0,0,0,0.22),inset -5px -5px 12px rgba(255,255,255,0.92);
  --nm-press:inset 4px 4px 10px rgba(0,0,0,0.22),inset -4px -4px 10px rgba(255,255,255,0.88);
  --r:24px;--rb:18px;--t:0.3s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',-apple-system,'SF Pro Display',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased;}
.nm{background:var(--bg);border-radius:var(--r);box-shadow:var(--nm-out);}
.nm-in{background:var(--bg);border-radius:16px;box-shadow:var(--nm-in);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--rb);box-shadow:var(--nm-out);cursor:pointer;font-family:inherit;font-weight:700;font-size:.84rem;color:var(--black);padding:12px 20px;transition:all var(--t);background:var(--bg);text-shadow:0 1px 2px rgba(0,0,0,.1);}
.btn:active{box-shadow:var(--nm-press);transform:scale(.98);}
.btn-dark{background:var(--black);color:var(--white);box-shadow:4px 4px 14px rgba(0,0,0,.35),-2px -2px 8px rgba(255,255,255,.18);}
.btn-dark:active{box-shadow:2px 2px 8px rgba(0,0,0,.3),-1px -1px 5px rgba(255,255,255,.15);transform:scale(.98);}
.btn-green{background:var(--green);color:var(--white);box-shadow:4px 4px 14px rgba(29,122,58,.35),-2px -2px 8px rgba(255,255,255,.18);}
.btn-full{width:100%;}
.inp{width:100%;background:var(--bg);border:none;border-radius:14px;box-shadow:var(--nm-in);padding:13px 17px;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--black);outline:none;transition:box-shadow var(--t);}
.inp::placeholder{color:var(--muted);font-weight:500;}
.inp:focus{box-shadow:inset 6px 6px 14px rgba(0,0,0,.24),inset -6px -6px 14px rgba(255,255,255,.9);}
.inp:disabled{opacity:.45;cursor:not-allowed;}
.inp option{background:var(--bg-up);color:var(--black);}
.label{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block;}
.section-title{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.top-bar{background:var(--bg);box-shadow:0 4px 20px rgba(0,0,0,.07),0 1px 0 rgba(255,255,255,.9);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.tab-bar{background:var(--bg);box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:10px 16px 20px;display:flex;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:20;max-width:640px;margin:0 auto;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:16px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:.62rem;font-weight:700;letter-spacing:.04em;color:var(--muted);transition:all var(--t);}
.tab.on{background:var(--bg);box-shadow:var(--nm-out);color:var(--black);}
.overlay{position:fixed;inset:0;background:rgba(17,17,17,.4);backdrop-filter:blur(6px);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg);border-radius:32px 32px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.22);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:10px 22px 40px;animation:su .3s cubic-bezier(.32,.72,0,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:38px;height:5px;background:var(--gray);border-radius:99px;margin:0 auto 18px;box-shadow:var(--nm-in);}
.page{padding:18px 16px 100px;display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gray),transparent);margin:2px 0;}
.stat-n{font-size:1.45rem;font-weight:800;letter-spacing:-.02em;text-shadow:1px 1px 2px rgba(0,0,0,.14);line-height:1;}
.new-badge{position:absolute;top:-6px;right:-6px;background:var(--green);color:#fff;font-size:.6rem;font-weight:900;border-radius:99px;padding:2px 7px;box-shadow:2px 2px 6px rgba(0,0,0,.2);}
.icon-btn{width:36px;height:36px;border-radius:12px;background:var(--bg);box-shadow:var(--nm-out);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:all var(--t);}
.icon-btn:active{box-shadow:var(--nm-press);}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:50px;padding:5px 12px;font-size:.72rem;font-weight:700;box-shadow:var(--nm-out);cursor:pointer;transition:all var(--t);border:none;background:var(--bg);}
.pill:active{box-shadow:var(--nm-press);}
.seek-logo{font-size:3.4rem;font-weight:900;letter-spacing:.12em;color:var(--black);text-shadow:0 1px 0 rgba(255,255,255,.7),2px 4px 8px rgba(0,0,0,.3);line-height:1;}
.login-inp{width:100%;background:var(--bg);border:none;border-radius:50px;box-shadow:var(--nm-in);padding:15px 26px;font-family:inherit;font-size:.82rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--black);outline:none;text-align:center;transition:box-shadow var(--t);}
.login-inp::placeholder{color:var(--muted);}
.login-inp:focus{box-shadow:inset 6px 6px 14px rgba(0,0,0,.2),inset -6px -6px 14px rgba(255,255,255,.9);}
.member-avatar{width:46px;height:46px;border-radius:16px;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:var(--white);flex-shrink:0;box-shadow:4px 4px 12px rgba(0,0,0,.28),-2px -2px 8px rgba(255,255,255,.6);}
.print-only{display:none;}
@media print{body *{visibility:hidden;}.print-only,.print-only *{visibility:visible;}.print-only{display:block!important;position:absolute;top:0;left:0;width:100%;}}

/* ── SEEK v2 extras ── */
.level-badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:5px 13px;font-size:.7rem;font-weight:800;letter-spacing:.04em;}
.level-bronze {background:linear-gradient(135deg,#CD7F32,#8B4513);color:#fff;}
.level-silver {background:linear-gradient(135deg,#C0C0C0,#808080);color:#fff;}
.level-gold   {background:linear-gradient(135deg,#FFD700,#B8860B);color:#111;}
.level-diamond{background:linear-gradient(135deg,#B3E5FC,#3A86FF);color:#fff;}
.level-emerald{background:linear-gradient(135deg,#50C878,#1B5E20);color:#fff;}
.progress-bar-wrap{background:var(--bg);border-radius:99px;box-shadow:var(--nm-in);height:11px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:99px;transition:width .7s ease;}
.progress-bronze {background:linear-gradient(90deg,#8B4513,#CD7F32);}
.progress-silver {background:linear-gradient(90deg,#808080,#C8C8C8);}
.progress-gold   {background:linear-gradient(90deg,#B8860B,#FFD700);}
.progress-diamond{background:linear-gradient(90deg,#3A86FF,#B3E5FC);}
.progress-emerald{background:linear-gradient(90deg,#1B5E20,#50C878);}
.progress-jr     {background:linear-gradient(90deg,#444,#AAAAAA);}
.product-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.product-card{border:none;border-radius:18px;padding:14px 8px;text-align:center;cursor:pointer;background:var(--bg);box-shadow:var(--nm-out);transition:all .3s ease;font-family:inherit;}
.product-card.selected{box-shadow:var(--nm-press);}
.product-card-icon{font-size:1.3rem;margin-bottom:5px;}
.product-card-name{font-size:.65rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--black);}
.product-card-rate{font-size:.62rem;font-weight:700;color:var(--muted);margin-top:2px;}
.rem-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray);}
.rem-row:last-child{border-bottom:none;}
.tag-jr{background:linear-gradient(135deg,#444,#888);color:#fff;border-radius:6px;padding:2px 8px;font-size:.58rem;font-weight:900;letter-spacing:.06em;}
.btn-green-opp{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 24px;border:none;border-radius:22px;background:linear-gradient(145deg,#2ECC71,#1a8a47);color:#fff;font-family:inherit;font-size:1rem;font-weight:900;letter-spacing:.04em;cursor:pointer;box-shadow:6px 6px 18px rgba(46,204,113,.4),-3px -3px 8px rgba(255,255,255,.15);transition:all .3s;text-transform:uppercase;}
.btn-green-opp:hover{transform:translateY(-2px);box-shadow:8px 8px 24px rgba(46,204,113,.5),-3px -3px 8px rgba(255,255,255,.15);}
.btn-green-opp:active{transform:scale(.97);box-shadow:inset 3px 3px 8px rgba(0,0,0,.2);}
@keyframes pulse2{0%,100%{box-shadow:6px 6px 18px rgba(46,204,113,.4),-3px -3px 8px rgba(255,255,255,.15),0 0 0 0 rgba(46,204,113,.5)}70%{box-shadow:6px 6px 18px rgba(46,204,113,.4),-3px -3px 8px rgba(255,255,255,.15),0 0 0 12px rgba(46,204,113,0)}}
.btn-green-opp{animation:pulse2 2.5s ease-in-out infinite;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
</style>
</head>

<script type="text/babel" data-presets="env,react">
const {useState,useEffect}=React;

/* ── CONSTANTS ── */
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const SK={
  members:'sk_members',referrals:'sk_referrals',nextId:'sk_nextId',
  credentials:'sk_credentials',passReqs:'sk_passReqs',
  seekJrs:'sk_seekjrs',jrReferrals:'sk_jr_referrals',nextJrId:'sk_nextJrId',
  levelNotifs:'sk_lvnotifs',offers:'sk_offers',
};

/* ── SUPABASE ── */
const db=window.supabase.createClient(
  'https://upgefuunepjtvppybmki.supabase.co',
  'sb_publishable_pOWmpcmw6vqEvYIJyWOjcQ_qtW7AITg'
);
/* DB (snake_case) → app (camelCase) row mappers */
const mMember  =r=>({id:r.id,name:r.name,whatsapp:r.whatsapp,pixKey:r.pix_key,notes:r.notes,admId:r.adm_id?String(r.adm_id):null});
const mRef     =r=>({id:r.id,memberId:String(r.member_id),clientName:r.client_name,whatsapp:r.whatsapp,productType:r.product_type,productValue:Number(r.product_value),commission:Number(r.commission),year:r.year,month:r.month,day:r.day,paid:r.paid,isNew:r.is_new});
const mJrRef   =r=>({id:r.id,jrId:String(r.jr_id),clientName:r.client_name,whatsapp:r.whatsapp,productType:r.product_type,productValue:Number(r.product_value),commission:Number(r.commission),year:r.year,month:r.month,day:r.day,paid:r.paid,isNew:r.is_new});
const mSeekJr  =r=>({id:r.id,name:r.name,whatsapp:r.whatsapp,seekId:String(r.seek_id),pin:r.pin,isNew:r.is_new});

function buildCreds(rows){const o={};(rows||[]).forEach(r=>{o[r.key]={login:r.login,pin:r.pin};});return o;}
const PRODUCT_TYPES=[

];
const JR_LEVELS=[
  {id:'jr1',name:'JR 1',min:0,       max:500000,  bonus:0.05},
  {id:'jr2',name:'JR 2',min:500000,  max:1000000, bonus:0.07},
  {id:'jr3',name:'JR 3',min:1000000, max:1500000, bonus:0.10},
  {id:'jr4',name:'JR 4',min:1500000, max:Infinity,bonus:0.12},
];
const JR_GRADUATION=2000000;
const ADM_PHONE='51996509660';

/* ── HELPERS ── */
function sg(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function sd(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* Compare any two ids (number or string) safely. This is the single source
   of truth for id comparisons across the whole app — never compare ids with
   === directly, since localStorage / form values can silently change a
   number into a string (or vice-versa) depending on which code path wrote
   the data. */
function sameId(a,b){
  if(a===undefined||a===null||b===undefined||b===null)return false;
  return String(a)===String(b);
}

/* ── LEGACY STORAGE CLEANUP ────────────────────────────────────────────────
   Earlier versions of this app used different localStorage key names for
   the same data (sk_m, sk_c, sk_creds, sk_r, sk_n, sk_jr, sk_jrs, sk_reqs,
   sk_pass_requests). The current version only ever reads/writes the
   canonical keys in SK below.

   IMPORTANT: this function only DELETES those old keys — it never merges
   their contents back into the canonical storage. An earlier version of
   this cleanup used to merge legacy data back in on every app load, which
   caused a serious bug: any record a user deleted could reappear, because
   a stray copy left under an old key name kept getting re-merged in every
   single time the app started. Deleting (and never reading) the legacy
   keys is the correct, permanent fix — once they're gone, this function
   has nothing left to do on every subsequent boot.
─────────────────────────────────────────────────────────────────────────── */
function cleanupLegacyStorageKeys(){
  const legacyKeys=['sk_m','sk_c','sk_creds','sk_r','sk_n','sk_jr','sk_jrs','sk_reqs','sk_pass_requests'];
  let removed=[];
  legacyKeys.forEach(k=>{
    if(localStorage.getItem(k)!==null){
      localStorage.removeItem(k);
      removed.push(k);
    }
  });
  if(removed.length){
    console.log('[SEEK cleanup] removed obsolete legacy keys (data was NOT merged back, by design):',removed);
  }
}
const fBRL=v=>Number.isFinite(v)?v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'R$ 0,00';
const fCD=n=>n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function fDate(r){if(r.day)return`${String(r.day).padStart(2,'0')}/${String(r.month).padStart(2,'0')}/${r.year}`;return`${MONTHS[(r.month||1)-1].slice(0,3)}/${r.year}`;}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

/* Phone format: (DD)XXXXX-XXXX — DDD in parens, no space */
function maskPhone(raw){
  const d=(raw||'').replace(/\D/g,'').slice(0,11);
  if(!d)return'';
  if(d.length<=2)return`(${d}`;
  if(d.length<=6)return`(${d.slice(0,2)})${d.slice(2)}`;
  if(d.length<=10)return`(${d.slice(0,2)})${d.slice(2,6)}-${d.slice(6)}`;
  return`(${d.slice(0,2)})${d.slice(2,7)}-${d.slice(7)}`;
}

function calcPoints(total){return Math.floor(total/100000);}
function getSeekLevel(pts){return SEEK_LEVELS.find(l=>pts>=l.min&&pts<=l.max)||SEEK_LEVELS[0];}
function getJrLevel(vol){return JR_LEVELS.find(l=>vol>=l.min&&vol<l.max)||JR_LEVELS[0];}
function levelProgress(pts){
  const lv=getSeekLevel(pts);
  if(lv.id==='elite')return 100;
  return Math.min(100,Math.round(((pts-lv.min)/(lv.max-lv.min+1))*100));
}
function calcCommission(val,prodId,level){
  const pt=PRODUCT_TYPES.find(p=>p.id===prodId)||PRODUCT_TYPES[0];
  return val*pt.rate*(1+level.bonus);
}

/* S-shape medal
/* S-shape medal for each level */
function SMedal({levelId,size=52,lit}){
  const cols={
    start:{g1:'#7A5C3A',g2:'#C8924E',g3:'#F0B870',sh:'rgba(140,90,40,0.6)'},
    one:  {g1:'#505050',g2:'#B0B0B0',g3:'#E8E8E8',sh:'rgba(80,80,80,0.6)'},
    plus: {g1:'#8A6800',g2:'#D4A800',g3:'#FFE040',sh:'rgba(180,140,0,0.6)'},
    pro:  {g1:'#0A3A8A',g2:'#1E78E5',g3:'#90C8F9',sh:'rgba(20,80,200,0.6)'},
    elite:{g1:'#0A4A20',g2:'#1A8A40',g3:'#70E890',sh:'rgba(15,110,50,0.6)'},
  };
  const c=lit?(cols[levelId]||cols.start):{g1:'#888',g2:'#B8B8B8',g3:'#D8D8D8',sh:'rgba(0,0,0,0.2)'};
  const uid=`sm_${levelId}_${size}`;
  return(
    <svg width={size} height={size} viewBox="0 0 60 72" fill="none">
      <defs>
        <linearGradient id={`${uid}a`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor={c.g1}/>
          <stop offset="40%"  stopColor={c.g2}/>
          <stop offset="70%"  stopColor={c.g3}/>
          <stop offset="100%" stopColor={c.g1}/>
        </linearGradient>
        <linearGradient id={`${uid}h`} x1="0%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%"   stopColor="#FFFFFF" stopOpacity={lit?"0.7":"0.3"}/>
          <stop offset="100%" stopColor="#FFFFFF" stopOpacity="0"/>
        </linearGradient>
        <filter id={`${uid}d`}><feDropShadow dx="1" dy="2" stdDeviation="2" floodColor={c.sh} floodOpacity="0.9"/></filter>
        {lit&&<filter id={`${uid}g`}><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>}
      </defs>
      {/* S path scaled to medal size */}
      <path
        d="M42 10 C42 10 50 10 50 19 C50 28 42 31 32 32 C22 33 12 34 12 43 C12 52 20 55 30 55 C37 55 43 52 47 48"
        fill="none" stroke={`url(#${uid}a)`} strokeWidth="11" strokeLinecap="round"
        filter={`url(#${uid}d)`} opacity={lit?1:0.3}
      />
      <path
        d="M42 10 C42 10 50 10 50 19 C50 28 42 31 32 32 C22 33 12 34 12 43 C12 52 20 55 30 55 C37 55 43 52 47 48"
        fill="none" stroke={`url(#${uid}h)`} strokeWidth="5.5" strokeLinecap="round" opacity={lit?0.8:0.2}
        filter={lit?`url(#${uid}g)`:undefined}
      />
      {/* Top cap */}
      <path d="M42 10 C36 6 22 6 16 11 C12 15 11 20 16 24"
        fill="none" stroke={`url(#${uid}a)`} strokeWidth="10" strokeLinecap="round"
        filter={`url(#${uid}d)`} opacity={lit?1:0.3}/>
      <path d="M42 10 C36 6 22 6 16 11 C12 15 11 20 16 24"
        fill="none" stroke={`url(#${uid}h)`} strokeWidth="5" strokeLinecap="round" opacity={lit?0.8:0.2}/>
      {/* Bottom cap */}
      <path d="M14 51 C20 57 38 57 44 51 C48 47 49 42 44 38"
        fill="none" stroke={`url(#${uid}a)`} strokeWidth="10" strokeLinecap="round"
        filter={`url(#${uid}d)`} opacity={lit?1:0.3}/>
      <path d="M14 51 C20 57 38 57 44 51 C48 47 49 42 44 38"
        fill="none" stroke={`url(#${uid}h)`} strokeWidth="5" strokeLinecap="round" opacity={lit?0.8:0.2}/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════════
   LOGIN SCREEN — single unified login
══════════════════════════════════════════════════════════════════ */
function LoginScreen({onLogin,credentials,members,seekJrs}){
  const [phone,setPhone]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [solicitarSenha,setSolicitarSenha]=useState(false);
  const [solPhone,setSolPhone]=useState('');
  const [solErr,setSolErr]=useState('');
  const [solOk,setSolOk]=useState(false);

  function handleSubmit(e){
    e.preventDefault();setErr('');
    const digits=phone.replace(/\D/g,'');
    const pin=pass.trim();
    console.log(`[SEEK login] attempt — phoneDigits="${digits}" pinLength=${pin.length}`);
    if(!digits||!pin){setErr('Preencha telefone e senha.');console.log('[SEEK login] aborted: empty phone or pin');return;}

    // 1) MASTER — hardcoded constant, independent of any stored data.
    if(digits===ADM_PHONE&&pin===ADM_PIN){
      console.log('[SEEK login] matched MASTER');
      onLogin({role:'master'});return;
    }

    // 1.5) ADM vendedores
    for(const [k,c] of Object.entries(credentials)){
      if(!String(k).startsWith('adm_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){const admId=k.replace('adm_','');onLogin({role:'adm',admId});return;}
    }

    // 2) SEEK
    for(const [k,c] of Object.entries(credentials)){
      if(String(k).startsWith('jr_')||String(k).startsWith('adm_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){onLogin({role:'member',memberId:k});return;}
    }
    for(const mb of members){
      const wa=(mb.whatsapp||'').replace(/\D/g,'');
      if(wa!==digits)continue;
      const cred=credentials[String(mb.id)]||{pin:'0000'};
      if(cred.pin===pin){onLogin({role:'member',memberId:String(mb.id)});return;}
    }
    // 3) JR
    for(const [k,c] of Object.entries(credentials)){
      if(!String(k).startsWith('jr_'))continue;
      const stored=(c.login||'').replace(/\D/g,'');
      if(stored===digits&&c.pin===pin){const jrId=k.replace('jr_','');onLogin({role:'jr',jrId});return;}
    }
    for(const jr of seekJrs){
      const wa=(jr.whatsapp||'').replace(/\D/g,'');
      if(wa!==digits)continue;
      const cred=credentials[`jr_${jr.id}`]||{pin:'0000'};
      if(cred.pin===pin){onLogin({role:'jr',jrId:jr.id});return;}
    }
    setErr('Telefone ou senha incorretos.');
  }

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:'32px 22px'}}>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',alignItems:'center',gap:26}}>

        <SeekNetworkLogo/>

        {/* Login form — single unified entry, phone digits only, no mode tabs.
            The system figures out automatically whether the phone+pin belongs
            to the ADM, a SEEK, or a SEEK JR. */}
        <form onSubmit={handleSubmit} style={{width:'100%',display:'flex',flexDirection:'column',gap:13}}>
          <input className="login-inp" type="tel" inputMode="numeric"
            value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,11))}
            placeholder="TELEFONE (SOMENTE NÚMEROS)" autoFocus/>
          <div style={{position:'relative'}}>
            <input className="login-inp" type={showPass?'text':'password'}
              value={pass} onChange={e=>setPass(e.target.value.replace(/\D/g,'').slice(0,4))}
              placeholder="SENHA (4 DÍGITOS)" inputMode="numeric" maxLength={4}
              style={{paddingRight:52}}/>
            <button type="button" onClick={()=>setShowPass(!showPass)}
              style={{position:'absolute',right:18,top:'50%',transform:'translateY(-50%)',
                      background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}>
              {showPass?<IcEyeOff s={17}/>:<IcEye s={17}/>}
            </button>
          </div>
          {err&&<p style={{textAlign:'center',fontSize:'.76rem',fontWeight:700,color:'var(--red)',padding:'4px 8px',borderRadius:10,background:'rgba(192,57,43,0.07)'}}>{err}</p>}
          <button type="submit" className="btn btn-dark btn-full"
            style={{padding:16,fontSize:'.84rem',letterSpacing:'.1em',borderRadius:50,marginTop:4}}>
            Entrar
          </button>
        </form>

        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:10}}>

                {solErr&&<div style={{color:'var(--red)',fontSize:'.76rem',fontWeight:700}}>{solErr}</div>}
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-full" onClick={()=>setSolicitarSenha(false)}>Cancelar</button>
                  <button className="btn btn-dark btn-full" onClick={()=>{
                    const d=solPhone.replace(/\D/g,'');
                    if(!d){setSolErr('Digite seu telefone.');return;}
                    // Save request to localStorage
                    db.from('pass_requests').insert({phone:d,type:'forgot',resolved:false})
                      .then(({error})=>{
                        if(error){setSolErr('Erro ao enviar. Tente novamente.');}
                        else{setSolOk(true);}
                      });
                  }}>Solicitar</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   SEEK JR PANEL
══════════════════════════════════════════════════════════════════ */
function SeekJrPanel({jr,referrals,seekMember,credentials,onLogout,onAddReferral,onChangePin,offers}){
  const now=new Date();
  const [sm,setSm]=useState(now.getMonth()+1);
  const [sy,setSy]=useState(now.getFullYear());
  const [showAdd,setShowAdd]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [showJrOffers,setShowJrOffers]=useState(false);

  const [oldPin,setOldPin]=useState('');
  const [newPin,setNewPin]=useState('');
  const [cfPin,setCfPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const credKey=`jr_${jr.id}`;
  const cred=credentials[credKey]||{pin:'0000'};
  const curY=now.getFullYear();
  const years=Array.from({length:3},(_,i)=>curY-1+i);

  const myRefs=referrals.filter(r=>sameId(r.jrId,jr.id));
  const monthRefs=myRefs.filter(r=>r.month===sm&&r.year===sy);
  const monthVol=monthRefs.reduce((s,r)=>s+r.productValue,0);
  const monthCom=monthRefs.reduce((s,r)=>s+r.commission,0);
  const totalVol=myRefs.reduce((s,r)=>s+r.productValue,0);
  const gradPct=Math.min(100,(totalVol/JR_GRADUATION)*100);
  const graduated=totalVol>=JR_GRADUATION;
  const jrLv=getJrLevel(totalVol);
  const jrLvIdx=JR_LEVELS.findIndex(l=>l.id===jrLv.id);
  const jrLvPct=jrLv.max===Infinity?100:Math.min(100,Math.round(((totalVol-jrLv.min)/(jrLv.max-jrLv.min))*100));
  const initials=jr.name.trim().slice(0,2).toUpperCase();

  function changePin(e){
    e.preventDefault();setPinErr('');
    if(oldPin!==cred.pin){setPinErr('Senha atual incorreta.');return;}
    if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}
    if(newPin!==cfPin){setPinErr('Senhas não coincidem.');return;}
    onChangePin(credKey,newPin);setOldPin('');setNewPin('');setCfPin('');setShowPin(false);alert('Senha alterada!');
  }

  function RefForm({onClose,onSave}){
    const [cn,setCn]=useState('');
    const [wa,setWa]=useState('');
    const [prodType,setProdType]=useState('auto');
    const [val,setVal]=useState(0);
    const today=todayISO();
    function save(e){
      e.preventDefault();if(!cn.trim()||val<=0)return;
      const pt=PRODUCT_TYPES.find(p=>p.id===prodType);
      const commission=val*pt.rate;
      const parts=today.split('-').map(Number);
      onSave({clientName:cn.trim(),whatsapp:wa,productType:prodType,productValue:val,commission,year:parts[0],month:parts[1],day:parts[2],isNew:true,jrId:jr.id});
      onClose();
    }
    const pt=PRODUCT_TYPES.find(p=>p.id===prodType)||PRODUCT_TYPES[0];
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Cliente"><input className="inp" value={cn} onChange={e=>setCn(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="WhatsApp"><PhoneInput value={wa} onChange={setWa}/></Fld>
      <Fld label="Tipo de Produto"><ProductSelect value={prodType} onChange={setProdType}/></Fld>
      <Fld label="Valor do Negócio"><CurrencyInput value={val} onChange={setVal}/></Fld>
      <div className="nm-in" style={{padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'.8rem',color:'var(--muted)',fontWeight:600}}>Sua comissão ({pt.name})</span>
        <span style={{fontWeight:800,fontSize:'1rem',color:'var(--green)'}}>{fBRL(val*pt.rate)}</span>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Confirmar</button></div>
    </form>;
  }

  const sorted=[...monthRefs].sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));

  return<div style={{maxWidth:640,margin:'0 auto',minHeight:'100vh'}}>
    <TopBar logo="SEEK NETWORK" right={<button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>}/>
    <div className="page" style={{paddingBottom:30}}>

      {/* Identity card */}
      <div className="nm" style={{padding:'22px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div className="member-avatar" style={{width:52,height:52,borderRadius:18,fontSize:'1rem'}}>{initials}</div>
          <div>
            <div style={{fontWeight:800,fontSize:'1rem'}}>{jr.name}</div>
            <div style={{fontSize:'.72rem',color:'var(--muted)',fontWeight:600,marginTop:3}}>
              ID: <b style={{color:'var(--black)'}}>{jr.id}JR</b>
            </div>
            {seekMember&&<div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>
              SEEK: <b style={{color:'var(--black)'}}>#{String(seekMember.id).padStart(3,'0')}</b> · {seekMember.name}
            </div>}
          </div>
        </div>

        {/* Period */}
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
          <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[['Indicações Mês',monthRefs.length,null],['Valor Mês',fBRL(monthVol),null],['Comissão Mês',fBRL(monthCom),'var(--green)'],['Total Acumulado',fBRL(totalVol),null]].map(([l,v,c])=>(
            <div key={l} className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:6}}>{l}</div><div style={{fontWeight:800,fontSize:'.9rem',color:c||'var(--black)'}}>{v}</div></div>
          ))}
        </div>

        {/* Graduation bar */}
        {graduated&&<div style={{marginBottom:10,padding:'8px 14px',borderRadius:12,background:'rgba(29,122,58,0.1)',fontSize:'.76rem',fontWeight:800,color:'var(--green)',textAlign:'center'}}>🎓 Graduado para SEEK!</div>}
        <ProgressBar pct={gradPct} className="progress-jr" label="Progresso para SEEK" sub={`${fBRL(totalVol)} / ${fBRL(JR_GRADUATION)}`}/>

        {/* JR level bars */}
        <div style={{marginTop:14}}>
          <div style={{fontSize:'.68rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8,display:'flex',justifyContent:'space-between'}}>
            <span>Nível JR → bônus do SEEK</span>
            <span style={{color:'var(--green)',fontWeight:900}}>{jrLv.name} — {(jrLv.bonus*100).toFixed(0)}%</span>
          </div>
          <div style={{display:'flex',gap:5,marginBottom:8}}>
            {JR_LEVELS.map((lv,i)=>(
              <div key={lv.id} style={{flex:1,textAlign:'center'}}>
                <div style={{height:8,borderRadius:99,background:i<=jrLvIdx?'var(--green)':'var(--gray)',marginBottom:4,transition:'all .5s',boxShadow:i<=jrLvIdx?'0 0 6px rgba(29,122,58,.4)':'none'}}/>
                <div style={{fontSize:'.54rem',fontWeight:800,color:i<=jrLvIdx?'var(--green)':'var(--muted)'}}>{lv.name}</div>
                <div style={{fontSize:'.5rem',color:'var(--muted)'}}>{(lv.bonus*100).toFixed(0)}%</div>
              </div>
            ))}
          </div>
          <ProgressBar pct={jrLvPct} className="progress-emerald"
            label={`Progresso ${jrLv.name}`}
            sub={jrLv.max===Infinity?'Máximo!':fBRL(jrLv.max-totalVol)+' para próx.'}
          />
        </div>
      </div>

      {/* Big green opportunity button */}
      <button className="btn-green-opp" onClick={()=>setShowAdd(true)}>
        <IcPlus s={22} c="#fff"/>
        Encontrei uma Oportunidade
      </button>

      <button className="btn btn-full" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={15}/>Alterar Senha</button>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>setShowJrOffers(true)}>Ofertas do Mês 🏷️</button>

      {/* Referrals */}
      <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4}}>{MONTHS[sm-1]} {sy} — Indicações</div>
      <div className="nm" style={{padding:'6px 16px'}}>
        {sorted.length===0?<Empty text="Nenhuma indicação no período"/>:sorted.map((r,i,arr)=>(
          <div key={r.id}><div style={{padding:'13px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.87rem'}}>{r.clientName}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600}}>{fDate(r)}</div>
            </div>
            {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:4,display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>{PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name} · {fBRL(r.productValue)}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>
              <span style={{fontSize:'.7rem',fontWeight:700,padding:'4px 10px',borderRadius:50,background:'var(--bg)',boxShadow:'var(--nm-out)',color:r.paid?'var(--green)':'var(--muted)'}}>{r.paid?'Pago':'Pendente'}</span>
            </div>
          </div>{i<arr.length-1&&<Div/>}</div>
        ))}
      </div>
    </div>
    {showAdd&&<Sheet title="Nova Indicação" onClose={()=>setShowAdd(false)}><RefForm onClose={()=>setShowAdd(false)} onSave={onAddReferral}/></Sheet>}
    {showJrOffers&&<OffersPanel offers={offers||[]} onClose={()=>setShowJrOffers(false)} isAdm={false} onAddOffer={()=>{}} onDeleteOffer={()=>{}}/>}
    {showPin&&<Sheet title="Alterar Senha" onClose={()=>setShowPin(false)}>
      <form onSubmit={changePin} style={{display:'flex',flexDirection:'column',gap:18}}>
        <Fld label="Senha Atual"><PinInput value={oldPin} onChange={setOldPin} autoFocus/></Fld>
        <Fld label="Nova Senha"><PinInput value={newPin} onChange={setNewPin}/></Fld>
        <Fld label="Confirmar"><PinInput value={cfPin} onChange={setCfPin}/></Fld>
        {pinErr&&<div style={{color:'var(--red)',fontSize:'.78rem',fontWeight:700}}>{pinErr}</div>}
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={()=>setShowPin(false)}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>}
  </div>;
}

  const [showJrOffers,setShowJrOffers]=useState(false);

  const [pinErr,setPinErr]=useState('');
  const cred=credentials[member.id]||credentials[String(member.id)]||{pin:'0000'};
  const curY=now.getFullYear();
  const years=Array.from({length:3},(_,i)=>curY-1+i);

  const myRefs=referrals.filter(r=>sameId(r.memberId,member.id));
  const monthRefs=myRefs.filter(r=>r.month===sm&&r.year===sy);
  const totalSales=myRefs.reduce((s,r)=>s+r.productValue,0);
  const points=calcPoints(totalSales);
  const level=getSeekLevel(points);
  const lvPct=levelProgress(points);

  const myJrs=seekJrs.filter(j=>sameId(j.seekId,member.id));
  const myJrRefs=jrReferrals.filter(r=>myJrs.some(j=>sameId(j.id,r.jrId)));

  // Per-product breakdown for month
  const prodBreakdown=PRODUCT_TYPES.map(pt=>{
    const refs=monthRefs.filter(r=>r.productType===pt.id);
    return{...pt,count:refs.length,volume:refs.reduce((s,r)=>s+r.productValue,0),commission:refs.reduce((s,r)=>s+r.commission,0)};
  });

  const monthCom=monthRefs.reduce((s,r)=>s+r.commission,0);
  const monthComPaid=monthRefs.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
  const monthComDue=monthRefs.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
  const jrBonus=myJrs.reduce((total,jr)=>{
    const jrTotalVol=myJrRefs.filter(r=>sameId(r.jrId,jr.id)).reduce((s,r)=>s+r.productValue,0);
    const jrLv=getJrLevel(jrTotalVol);
    const jrComm=myJrRefs.filter(r=>sameId(r.jrId,jr.id)&&r.month===sm&&r.year===sy).reduce((s,r)=>s+r.commission,0);
    return total+(jrComm*jrLv.bonus);

  const initials=member.name.trim().slice(0,2).toUpperCase();

  function shareCard(){

    window.open(`https://wa.me/?text=${msg}`,'_blank');
  }

  function RefForm({onClose,onSave}){
    const [cn,setCn]=useState('');
    const [wa,setWa]=useState('');

    function save(e){

      onSave({clientName:cn.trim(),whatsapp:wa,productType:prodType,productValue:val,commission,year:parts[0],month:parts[1],day:parts[2],isNew:true});
      onClose();
    }
    const preview=val>0?calcCommission(val,prodType,level):0;
    const pt=PRODUCT_TYPES.find(p=>p.id===prodType)||PRODUCT_TYPES[0];
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Cliente"><input className="inp" value={cn} onChange={e=>setCn(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="WhatsApp"><PhoneInput value={wa} onChange={setWa}/></Fld>
      <Fld label="Tipo de Produto"><ProductSelect value={prodType} onChange={setProdType}/></Fld>
      <Fld label="Valor do Negócio"><CurrencyInput value={val} onChange={setVal}/></Fld>
      <div className="nm-in" style={{padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600}}>Comissão + bônus {level.name}</div>
          <div style={{fontSize:'.66rem',color:'var(--muted)'}}>Base {(pt.rate*100).toFixed(1)}% + {(level.bonus*100).toFixed(0)}% bônus</div>
        </div>
        <span style={{fontWeight:800,fontSize:'1.1rem',color:'var(--green)'}}>{fBRL(preview)}</span>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Confirmar</button></div>
    </form>;
  }

  function JrForm({onClose,onSave}){
    const [name,setName]=useState('');
    const [wa,setWa]=useState('');
    const [pin,setPin]=useState('0000');
    const [pe,setPe]=useState('');
    function save(e){e.preventDefault();if(!name.trim()||!wa)return;if(!/^\d{4}$/.test(pin)){setPe('Deve ter 4 dígitos.');return;}onSave({name:name.trim(),whatsapp:wa,pin,seekId:member.id});onClose();}
    return<form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do SEEK JR"><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
      <div className="nm-in" style={{padding:'14px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontWeight:700,fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)'}}>🔑 Acesso</div>
        <Fld label="Senha inicial (4 dígitos)">
          <PinInput value={pin} onChange={setPin}/>
          <span style={{fontSize:'.68rem',color:'var(--muted)',marginTop:4,display:'block'}}>Padrão: 0000. JR pode alterar.</span>
          {pe&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700}}>{pe}</span>}
        </Fld>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Cadastrar JR</button></div>
    </form>;
  }

  const sorted=[...monthRefs].sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));

  return<div style={{maxWidth:640,margin:'0 auto',minHeight:'100vh'}}>
    {myLevelNotif&&<LevelUpModal level={getSeekLevel(points)} onClose={()=>onDismissNotif(myLevelNotif.id)}/>}
    <TopBar logo="SEEK NETWORK" right={<button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>}/>
    <div className="page" style={{paddingBottom:30}}>

      {/* Identity + level */}
      <div className="nm" style={{padding:'22px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div className="member-avatar" style={{width:52,height:52,borderRadius:18,fontSize:'1rem'}}>{initials}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:'1rem'}}>{member.name}</div>
            <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>ID #<b style={{color:'var(--black)'}}>{String(member.id).padStart(3,'0')}</b></div>
          </div>
          <LevelBadge points={points}/>
        </div>

        {/* Seek progress bar */}
        <div style={{marginBottom:16}}>
          <ProgressBar
            pct={lvPct}
            className={level.progressClass}
            label={`${points} pts · ${level.name} — ${lvPct}% do nível`}
            sub={nextLevel?`${nextLevel.min-points} pts para ${nextLevel.name}`:'Nível Máximo!'}
          />
        </div>

        {/* Period filter */}
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
          <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>

        {/* Per-product breakdown */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:'.6rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Indicações por Produto — {MONTHS[sm-1]} {sy}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
            {prodBreakdown.map(p=>(
              <div key={p.id} className="nm-in" style={{padding:'10px 8px',textAlign:'center'}}>
                <div style={{fontSize:'1.1rem',marginBottom:4}}>{p.icon}</div>
                <div style={{fontSize:'.58rem',fontWeight:800,textTransform:'uppercase',color:'var(--muted)',marginBottom:5}}>{p.name.replace('Empresariais','Empresar.')}</div>
                <div style={{fontWeight:900,fontSize:'1rem',color:'var(--black)'}}>{p.count}</div>
                <div style={{fontSize:'.64rem',color:'var(--muted)',marginTop:2}}>{fBRL(p.volume)}</div>
                <div style={{fontSize:'.66rem',color:'var(--green)',fontWeight:800,marginTop:1}}>{fBRL(p.commission)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Commission summary */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['Comissão Total',fBRL(monthCom),'var(--green)'],['Bônus JR',fBRL(jrBonus),'var(--green)'],['A Receber',fBRL(monthComDue),'var(--red)'],['Recebido',fBRL(monthComPaid),'var(--green)']].map(([l,v,c])=>(
            <div key={l} className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:6}}>{l}</div><div style={{fontWeight:800,fontSize:'.9rem',color:c}}>{v}</div></div>
          ))}
        </div>
      </div>

      {/* Medals showcase */}
      <MedalsShowcase points={points}/>

      {/* Big green opportunity button */}
      <button className="btn-green-opp" onClick={()=>setShowAdd(true)}>
        <IcPlus s={22} c="#fff"/>
        Encontrei uma Oportunidade
      </button>

      {/* Actions */}
      <button className="btn btn-dark btn-full" style={{padding:14,marginTop:4}} onClick={()=>setShowAddJr(true)}>
        <IcPlus s={18} c="#fff"/>Cadastrar SEEK JR
      </button>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <button className="btn" style={{padding:12}} onClick={shareCard}><IcShare s={14}/>Cartão</button>
        <button className="btn" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={14}/>Senha</button>
      </div>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>{setShowPin(true);setOldPin('');setNewPin('');setCfPin('');setPinErr('')}}><IcKey s={14}/>Alterar Senha</button>
      <button className="btn btn-full" style={{padding:12}} onClick={()=>setShowMemberOffers(true)}>Ofertas do Mês 🏷️</button>

      {/* My JRs */}
      {myJrs.length>0&&<div>
        <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4,marginBottom:10}}>Meus SEEK JR ({myJrs.length})</div>
        <div className="nm" style={{padding:'6px 16px'}}>
          {myJrs.map((jr,i)=>{
            const jrTotal=myJrRefs.filter(r=>sameId(r.jrId,jr.id)).reduce((s,r)=>s+r.productValue,0);
            const jrMonthRefs=myJrRefs.filter(r=>sameId(r.jrId,jr.id)&&r.month===sm&&r.year===sy);
            const jrMonthCom=jrMonthRefs.reduce((s,r)=>s+r.commission,0);
            const jrLv=getJrLevel(jrTotal);
            return<div key={jr.id}><div style={{padding:'12px 0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                <div>
                  <div style={{fontWeight:700,fontSize:'.86rem'}}>{jr.name}</div>
                  <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>ID: {jr.id}JR · {jrLv.name}</div>
                </div>
                <span className="tag-jr">JR</span>
              </div>
              <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>Mês: {fBRL(jrMonthRefs.reduce((s,r)=>s+r.productValue,0))} · Total: {fBRL(jrTotal)}</div>
              <div style={{fontSize:'.7rem',color:'var(--green)',fontWeight:700,marginBottom:8}}>Bônus meu: {fBRL(jrMonthCom*jrLv.bonus)} ({(jrLv.bonus*100).toFixed(0)}%)</div>
              <ProgressBar pct={Math.min(100,(jrTotal/JR_GRADUATION)*100)} className="progress-jr"
                label="JR → SEEK" sub={fBRL(jrTotal)+'/'+fBRL(JR_GRADUATION)}/>
            </div>{i<myJrs.length-1&&<Div/>}</div>;
          })}
        </div>
      </div>}

      {/* My referrals */}
      <div style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--muted)',paddingLeft:4}}>{MONTHS[sm-1]} {sy} — Indicações</div>
      <div className="nm" style={{padding:'6px 16px'}}>
        {sorted.length===0?<Empty text="Nenhuma indicação no período"/>:sorted.map((r,i,arr)=>(
          <div key={r.id}><div style={{padding:'13px 0'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.87rem'}}>{r.clientName}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600}}>{fDate(r)}</div>
            </div>
            {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:4,display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6}}>{PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name} · {fBRL(r.productValue)}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>
              <span style={{fontSize:'.7rem',fontWeight:700,padding:'4px 10px',borderRadius:50,background:'var(--bg)',boxShadow:'var(--nm-out)',color:r.paid?'var(--green)':'var(--muted)'}}>{r.paid?'Pago':'Pendente'}</span>
            </div>
          </div>{i<arr.length-1&&<Div/>}</div>
        ))}
      </div>
    </div>

    {showMemberOffers&&<OffersPanel offers={offers||[]} onClose={()=>setShowMemberOffers(false)} isAdm={false} onAddOffer={()=>{}} onDeleteOffer={()=>{}}/> }
    {showAdd&&<Sheet title="Encontrei uma Oportunidade" onClose={()=>setShowAdd(false)}><RefForm onClose={()=>setShowAdd(false)} onSave={onAddReferral}/></Sheet>}
    {showAddJr&&<Sheet title="Cadastrar SEEK JR" onClose={()=>setShowAddJr(false)}><JrForm onClose={()=>setShowAddJr(false)} onSave={onAddJr}/></Sheet>}
    {showPin&&<Sheet title="Alterar Senha" onClose={()=>setShowPin(false)}>
      <form onSubmit={changePin} style={{display:'flex',flexDirection:'column',gap:18}}>
        <Fld label="Senha Atual"><PinInput value={oldPin} onChange={setOldPin} autoFocus/></Fld>
        <Fld label="Nova Senha"><PinInput value={newPin} onChange={setNewPin}/></Fld>
        <Fld label="Confirmar"><PinInput value={cfPin} onChange={setCfPin}/></Fld>
        {pinErr&&<div style={{color:'var(--red)',fontSize:'.78rem',fontWeight:700}}>{pinErr}</div>}
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={()=>setShowPin(false)}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════════
   ADM — DASHBOARD
══════════════════════════════════════════════════════════════════ */
function AdmDashboard({members,referrals,jrReferrals,seekJrs,sm,setSm,sy,setSy,onNav,passReqs,credentials,onDeleteRef,onDeleteJrRef}){
  const curY=new Date().getFullYear();
  const years=Array.from({length:5},(_,i)=>curY-2+i);
  const fil=referrals.filter(r=>r.month===sm&&r.year===sy);
  const jrFil=jrReferrals.filter(r=>r.month===sm&&r.year===sy);
  const totV=([...fil,...jrFil]).reduce((s,r)=>s+r.productValue,0);
  const comAP=([...fil,...jrFil]).filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
  const comP=([...fil,...jrFil]).filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
  const pendReqs=(passReqs||[]).filter(r=>!r.resolved);
  const newSeekRefs=referrals.filter(r=>r.isNew);
  const newJrRefs=jrReferrals.filter(r=>r.isNew);
  const newJrs=seekJrs.filter(j=>j.isNew);
  const allTotV=[...referrals,...jrReferrals].reduce((s,r)=>s+r.productValue,0);

  const [expandedRef,setExpandedRef]=useState(null);

  const rankMap={};
  fil.forEach(r=>{rankMap[r.memberId]=(rankMap[r.memberId]||0)+r.commission;});
  const ranking=Object.entries(rankMap).map(([mid,t])=>({member:members.find(m=>String(m.id)===mid),total:Number(t)})).filter(x=>x.member).sort((a,b)=>b.total-a.total);

  function RefNotifCard({r,isJr}){
    const seek=isJr?seekJrs.find(j=>sameId(j.id,r.jrId)):members.find(m=>sameId(m.id,r.memberId));
    const seekParent=isJr&&seek?members.find(m=>sameId(m.id,seek.seekId)):null;
    const pt=PRODUCT_TYPES.find(p=>p.id===r.productType)||PRODUCT_TYPES[0];
    const digits=(r.whatsapp||'').replace(/\D/g,'');
    const phone=digits?(digits.startsWith('55')&&digits.length>=12?digits:`55${digits}`):'';
    const isExpanded=expandedRef===r.id;
    return(
      <div style={{cursor:'pointer'}} onClick={()=>setExpandedRef(isExpanded?null:r.id)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,paddingTop:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:'1rem',color:'var(--green)',marginBottom:3}}>{r.clientName||'Novo cliente'}</div>
            <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
              {isJr&&<span className="tag-jr">JR</span>}
              {isJr&&seek&&<span>{seek.name}</span>}
              {isJr&&seekParent&&<><span style={{opacity:.5}}>→</span><span>SEEK: {seekParent.name}</span></>}
              {!isJr&&seek&&<span>SEEK: {seek.name}</span>}
            </div>
          </div>
          <div style={{flexShrink:0,display:'flex',gap:6,alignItems:'center'}}>
            {!r.paid&&<button className="btn" style={{padding:'5px 10px',fontSize:'.7rem',color:'var(--red)'}} onClick={e=>{e.stopPropagation();if(window.confirm(`Apagar indicação de "${r.clientName}"?`)){isJr?onDeleteJrRef(r.id):onDeleteRef(r.id);}}}><IcTrash s={13}/>Apagar</button>}
            <span style={{fontSize:'.7rem',color:'var(--muted)'}}>▾</span>
          </div>
        </div>
        {isExpanded&&(
          <div style={{marginTop:10,padding:'12px 14px',borderRadius:14,background:'var(--bg)',boxShadow:'var(--nm-in)',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:'.74rem',fontWeight:700,display:'flex',gap:6,alignItems:'center'}}>{pt.icon} {pt.name} · {fBRL(r.productValue)}</div>
            <div style={{fontSize:'.74rem',fontWeight:800,color:r.paid?'var(--green)':'var(--red)'}}>Comissão: {fBRL(r.commission)}</div>
            {r.whatsapp&&<div style={{fontSize:'.74rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:6}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{fontSize:'.7rem',color:'var(--muted)'}}>{fDate(r)}</div>
            <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
              {phone&&<a href={`https://wa.me/${phone}`} target="_blank" style={{textDecoration:'none'}}>
                <button className="btn" style={{padding:'8px 14px',fontSize:'.76rem',gap:6,color:'#25D366'}}><IcWA s={15} fill="#25D366"/>WhatsApp</button>
              </a>}
              <button className="btn" style={{padding:'8px 14px',fontSize:'.76rem',color:'var(--yellow)'}} onClick={e=>{e.stopPropagation();onNav('editRef',r);}}><IcEdit s={13}/>Editar</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return<>
    <TopBar logo="SEEK NETWORK"/>
    <div className="page" style={{paddingBottom:110}}>

      {/* Pass requests */}
      {pendReqs.length>0&&<div className="nm" style={{padding:'18px',border:'1.5px solid rgba(192,57,43,.3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <div style={{width:9,height:9,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s ease-in-out infinite'}}/>
          <div style={{fontWeight:800,fontSize:'.86rem',color:'var(--red)'}}>Solicitações de Senha ({pendReqs.length})</div>
        </div>
        {pendReqs.map((req,i,arr)=>{
          const m=members.find(x=>sameId(x.id,req.memberId));
          const c=credentials[req.memberId]||{};
          return<div key={req.id}><div style={{padding:'8px 0'}}>
            <div style={{fontWeight:700,fontSize:'.86rem',marginBottom:4}}>{m?m.name:`#${req.memberId}`}</div>
            <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:8}}>{maskPhone(c.login)} · Senha atual: {c.pin}</div>
          </div>{i<arr.length-1&&<Div/>}</div>;
        })}
      </div>}

      {/* Notifications: see bell button */}

      {/* Period selector */}
      <div className="nm" style={{padding:'14px 16px'}}>
        <div style={{display:'flex',gap:10}}>
          <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
          <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <StatCard label="Qtde Vendas" value={fil.length+jrFil.length}/>
        <StatCard label="Valor Total" value={fBRL(totV)}/>
        <StatCard label="A Pagar" value={fBRL(comAP)} color="var(--red)"/>
        <StatCard label="Pago" value={fBRL(comP)} color="var(--green)"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[['A Pagar',[...referrals,...jrReferrals].filter(r=>!r.paid).length,'var(--red)','pending',IcClock],['Pagas',[...referrals,...jrReferrals].filter(r=>r.paid).length,'var(--green)','paid',IcCheck]].map(([l,v,c,dest,Ico])=>(
          <button key={l} className="nm" style={{padding:'16px 14px',textAlign:'left',border:'none',cursor:'pointer',background:'var(--bg)'}} onClick={()=>onNav(dest)}>
            <div className="section-title" style={{marginBottom:8,display:'flex',alignItems:'center',gap:4}}><Ico s={11} c={c}/>{l}</div>
            <div className="stat-n" style={{fontSize:'1.1rem',color:c}}>{v}</div>
          </button>
        ))}
      </div>
      <div className="nm" style={{padding:'18px'}}>
        <div className="section-title" style={{marginBottom:12,display:'flex',alignItems:'center',gap:6}}><IcStar s={13}/>Minha Comissão ADM (0,5%)</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="nm-in" style={{padding:'12px'}}><div className="section-title" style={{marginBottom:4}}>{MONTHS[sm-1].slice(0,3)} {sy}</div><div style={{fontWeight:800,color:'var(--green)'}}>{fBRL(([...fil,...jrFil]).reduce((s,r)=>s+r.productValue,0)*0.005)}</div></div>
          <div className="nm-in" style={{padding:'12px'}}><div className="section-title" style={{marginBottom:4}}>Total Geral</div><div style={{fontWeight:800,color:'var(--green)'}}>{fBRL(allTotV*0.005)}</div></div>
        </div>
      </div>
      {ranking.length>0&&<div>
        <div className="section-title" style={{paddingLeft:4,marginBottom:10}}>Ranking {MONTHS[sm-1]} {sy}</div>
        <div className="nm" style={{padding:'6px 16px'}}>
          {ranking.map((item,i)=>{
            const pts=calcPoints(referrals.filter(r=>sameId(r.memberId,item.member.id)).reduce((s,r)=>s+r.productValue,0));
            return<div key={item.member.id}><div style={{display:'flex',alignItems:'center',gap:14,padding:'12px 0'}}>
              <div style={{width:34,height:34,borderRadius:12,background:'var(--bg)',boxShadow:'var(--nm-out)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'.8rem',flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.member.name}</div>
                <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                  <span>#{String(item.member.id).padStart(3,'0')}</span><LevelBadge points={pts} small/>
                </div>
              </div>
              <div style={{fontWeight:800,color:'var(--green)',flexShrink:0}}>{fBRL(item.total)}</div>
            </div>{i<ranking.length-1&&<Div/>}</div>;
          })}
        </div>
      </div>}
    </div>
  </>;
}

        const pts=calcPoints(referrals.filter(r=>sameId(r.memberId,m.id)).reduce((s,r)=>s+r.productValue,0));
        const lv=getSeekLevel(pts);
        const myJrs=seekJrs.filter(j=>sameId(j.seekId,m.id));
        const initials=m.name.trim().slice(0,2).toUpperCase();
        const cred=credentials[m.id]||credentials[String(m.id)]||{};
        return<React.Fragment key={m.id}>
        <div className="nm" style={{padding:'13px 16px',display:'flex',flexDirection:'column',gap:0}}>

            </div>
          </button>
          <button className="icon-btn" onClick={()=>{setCredM(m);setNewPin('');setPinErr('');}}><IcKey s={14}/></button>
          <button className="icon-btn" onClick={()=>setConfirmDel(m)}><IcTrash s={14} c="var(--red)"/></button>
        </div>
        {myJrs.length>0&&<div style={{paddingLeft:16,paddingBottom:8,borderTop:'1px solid var(--gray)',marginTop:8}}>

  </>;

/* Fully controlled "Editar Membro" form. The previous version mixed
   uncontrolled inputs (defaultValue + FormData) with a masked PhoneInput
   that had a no-op onChange, so editing the phone silently did nothing.
   This version controls every field explicitly and saves the phone as
   digits-only via PlainPhoneInput, matching the login format exactly. */
function EditMemberForm({member,onClose,onSave}){
  const [name,setName]=useState(member.name||'');
  const [wa,setWa]=useState((member.whatsapp||'').replace(/\D/g,''));
  const [pix,setPix]=useState(member.pixKey||'');
  const [notes,setNotes]=useState(member.notes||'');
  function submit(e){
    e.preventDefault();
    if(!name.trim())return;
    onSave({name:name.trim(),whatsapp:wa,pixKey:pix.trim(),notes:notes.trim()});
  }
  return(
    <Sheet title="Editar Membro" onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:14}}>
        <Fld label="Nome"><input className="inp" value={name} onChange={e=>setName(e.target.value)} autoFocus/></Fld>
        <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
        <Fld label="PIX"><input className="inp" value={pix} onChange={e=>setPix(e.target.value)}/></Fld>
        <Fld label="Notas"><textarea className="inp" value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{resize:'vertical'}}/></Fld>
        <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Salvar</button></div>
      </form>
    </Sheet>
  );
}

          {member.whatsapp&&<div style={{fontSize:'.8rem',fontWeight:600,display:'flex',gap:8,alignItems:'center'}}><IcWA s={14} fill="#25D366"/>{maskPhone(member.whatsapp)}</div>}
          {member.pixKey&&<div style={{fontSize:'.8rem',fontWeight:600}}><span style={{fontSize:'.6rem',fontWeight:800,color:'var(--muted)',marginRight:6}}>PIX</span>{member.pixKey}</div>}

function BellPanel({members,referrals,jrReferrals,seekJrs,onClose,onEditRef,onDeleteRef,onDeleteJrRef,onMarkRead,passReqs}){
  const allRefs=[...referrals.filter(r=>r.isNew),...jrReferrals.filter(r=>r.isNew)];

  const forgotReqs=(passReqs||[]).filter(r=>r.type==='forgot'&&!r.resolved);
  const total=allRefs.length+newJrs.length+forgotReqs.length;
  const [expanded,setExpanded]=useState(null);

  function RefCard({r,isJr,idx}){
    const seek=isJr?seekJrs.find(j=>j.id===r.jrId):members.find(m=>sameId(m.id,r.memberId));
    const seekParent=isJr&&seek?members.find(m=>sameId(m.id,seek.seekId)):null;
    const pt=PRODUCT_TYPES.find(p=>p.id===r.productType)||PRODUCT_TYPES[0];
    const digits=(r.whatsapp||'').replace(/\D/g,'');
    const phone=digits?(digits.startsWith('55')&&digits.length>=12?digits:`55${digits}`):'';
    const isExp=expanded===r.id;
    const bg=idx%2===0?'#FFFFFF':'#F4F4F4';
    return(
      <div style={{background:bg,borderRadius:12,marginBottom:4,padding:'10px 12px',cursor:'pointer'}} onClick={()=>setExpanded(isExp?null:r.id)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
          <div style={{flex:1}}>
            {isJr?(
              <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:2}}>
                <span style={{fontWeight:900,fontSize:'.95rem'}}>{seek?seek.name:'?'}</span>
                <span style={{fontWeight:900,fontSize:'.82rem',color:'#1565C0'}}> JR</span>
              </div>
            ):(
              <div style={{fontWeight:900,fontSize:'.95rem',marginBottom:2}}>{seek?seek.name:'?'}</div>
            )}
            {isJr&&seekParent&&(
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginBottom:2}}>
                Padrinho: <b style={{color:'var(--black)'}}>{seekParent.name}</b>
              </div>
            )}
            <div style={{fontWeight:700,fontSize:'.88rem',color:'var(--green)'}}>{r.clientName||'—'}</div>
            <div style={{fontSize:'.68rem',color:'var(--muted)',marginTop:2}}>{pt.icon} {pt.name} · {fDate(r)}</div>
          </div>
          <span style={{fontSize:'.7rem',color:'var(--muted)'}}>{isExp?'▴':'▾'}</span>
        </div>
        {isExp&&(
          <div style={{marginTop:8,padding:'12px',borderRadius:12,background:'rgba(0,0,0,0.04)',display:'flex',flexDirection:'column',gap:8}}>
            {r.productValue>0&&<div style={{fontSize:'.82rem',fontWeight:700}}>
              {fBRL(r.productValue)} · <span style={{color:'var(--green)'}}>{fBRL(r.commission)}</span>
            </div>}
            {r.whatsapp&&<div style={{fontSize:'.76rem',display:'flex',alignItems:'center',gap:5}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {phone&&<a href={`https://wa.me/${phone}`} target="_blank" style={{textDecoration:'none'}}>
                <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',gap:5,color:'#25D366'}} onClick={e=>e.stopPropagation()}>
                  <IcWA s={14} fill="#25D366"/>WhatsApp
                </button>
              </a>}
              <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--yellow)'}}
                onClick={e=>{e.stopPropagation();onEditRef(r);onClose();}}>
                <IcEdit s={13}/>Editar
              </button>
              {!r.paid&&<button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--red)'}}
                onClick={e=>{e.stopPropagation();if(window.confirm(`Apagar "${r.clientName}"?`)){isJr?onDeleteJrRef(r.id):onDeleteRef(r.id);}}}>
                <IcTrash s={13}/>Apagar
              </button>}
              <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--muted)'}}
                onClick={e=>{e.stopPropagation();onMarkRead(r.id,isJr);}}>
                ✓ Lido
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh'}}>
        <div className="handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <IcBell s={18} c="var(--black)"/>
            <span style={{fontWeight:900,fontSize:'1rem'}}>Notificações</span>
            {total>0&&<span style={{background:'var(--red)',color:'#fff',fontSize:'.62rem',fontWeight:900,borderRadius:99,padding:'2px 8px'}}>{total}</span>}
          </div>
          <button className="icon-btn" onClick={onClose}><IcX s={17} c="var(--muted)"/></button>
        </div>

        {total===0&&<Empty text="Nenhuma notificação nova"/>}

        {/* Forgot password requests */}
        {forgotReqs.length>0&&<div style={{marginBottom:14}}>
          <div className="label" style={{marginBottom:8}}>🔐 Solicitações de Nova Senha</div>
          {forgotReqs.map((req,i)=>{
            const digits=req.phone;
            const mb=members.find(m=>(m.whatsapp||'').replace(/\D/g,'')===digits);
            const jrObj=seekJrs.find(j=>(j.whatsapp||'').replace(/\D/g,'')===digits);
            const name=mb?mb.name:jrObj?jrObj.name:`Tel: ${maskPhone(digits)}`;
            const bg=i%2===0?'#FFFFFF':'#F4F4F4';
            return<div key={req.id} style={{background:bg,borderRadius:12,padding:'10px 12px',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.88rem',marginBottom:4}}>{name}</div>
              <div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:8}}>{maskPhone(digits)} · Esqueceu a senha</div>
              <button className="btn btn-dark" style={{padding:'7px 14px',fontSize:'.76rem',gap:6}}
                onClick={()=>onMarkRead(req.id,'forgot')}>
                <IcCheck s={13} c="#fff"/>Resolvido
              </button>
            </div>;
          })}
        </div>}

        {/* New JRs */}
        {newJrs.length>0&&<div style={{marginBottom:14}}>
          <div className="label" style={{marginBottom:8}}>Novos SEEK JR</div>
          {newJrs.map((jr,i)=>{
            const seek=members.find(m=>sameId(m.id,jr.seekId));
            const bg=i%2===0?'#FFFFFF':'#F4F4F4';
            return<div key={jr.id} style={{background:bg,borderRadius:12,padding:'10px 12px',marginBottom:4}}>
              <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:2}}>
                <span style={{fontWeight:900,fontSize:'.95rem'}}>{jr.name}</span>
                <span style={{fontWeight:900,fontSize:'.82rem',color:'#1565C0'}}> JR</span>
              </div>
              {seek&&<div style={{fontSize:'.68rem',color:'var(--muted)',marginBottom:2}}>Padrinho: <b style={{color:'var(--black)'}}>{seek.name}</b></div>}
              <div style={{fontSize:'.7rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(jr.whatsapp)}</div>
              <button className="btn" style={{padding:'5px 10px',fontSize:'.72rem',marginTop:8,color:'var(--muted)'}}
                onClick={()=>onMarkRead(jr.id,'jr')}>✓ Lido</button>
            </div>;
          })}
        </div>}

        {/* All referrals */}
        {allRefs.length>0&&<div>
          <div className="label" style={{marginBottom:8}}>Indicações ({allRefs.length})</div>
          {allRefs.map((r,i)=>{
            const isJr=!!r.jrId;
            return<RefCard key={r.id} r={r} isJr={isJr} idx={i}/>;
          })}
        </div>}
      </div>
    </div>
  );
}



/* ══════════════════════════════════════════════════════════════════
   OFFERS PANEL (shared between ADM, SEEK, JR)
══════════════════════════════════════════════════════════════════ */
function OffersPanel({offers,onClose,isAdm,onAddOffer,onDeleteOffer}){
  const [showAdd,setShowAdd]=useState(false);
  const [imgUrl,setImgUrl]=useState('');
  const [caption,setCaption]=useState('');
  const [fileErr,setFileErr]=useState('');
  const [lightbox,setLightbox]=useState(null);

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){setFileErr('Selecione uma imagem.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{setImgUrl(ev.target.result);setFileErr('');};
    reader.readAsDataURL(file);
  }
  function saveOffer(){
    if(!imgUrl){setFileErr('Selecione uma imagem.');return;}
    onAddOffer({id:Date.now(),url:imgUrl,caption:caption.trim()});
    setImgUrl('');setCaption('');setShowAdd(false);
  }
  function shareOffer(offer){
    const msg=[
      '🔥 *Se liga nessa oferta!*',
      '',
      offer.caption?`_${offer.caption}_`:'',
      '',
      'Entre em contato com o Consultor de Vendas Volkswagen Motomecânica:',
      '',
      '👤 *Junior Soares*',
      '📱 (51) 99650-9660',
      'https://wa.me/5551996509660',
    ].filter((l,i,a)=>!(l===''&&a[i-1]==='')&&l!==undefined).join('\n');
    // Note: WhatsApp Web can't send images via URL, only text.
    // User should manually attach the photo shown on screen.
    window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  }

  return(
    <div className="overlay" onClick={lightbox?undefined:onClose}>
      {lightbox&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.93)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}
          onClick={()=>setLightbox(null)}>
          <img src={lightbox.url} style={{maxWidth:'100%',maxHeight:'78vh',borderRadius:14,objectFit:'contain'}} alt={lightbox.caption||'Oferta'}/>
          {lightbox.caption&&<div style={{color:'#fff',fontWeight:700,fontSize:'.9rem',marginTop:14,textAlign:'center'}}>{lightbox.caption}</div>}
          <div style={{display:'flex',alignItems:'center',gap:16,marginTop:18}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <button className="btn" style={{padding:'10px 18px',fontSize:'.8rem',gap:6,color:'#25D366'}}
                onClick={()=>shareOffer(lightbox)}>
                <IcWA s={16} fill="#25D366"/>Enviar no WhatsApp
              </button>
              <span style={{color:'rgba(255,255,255,0.55)',fontSize:'.64rem',fontWeight:700,textAlign:'center'}}>💡 Salve a imagem e anexe no WhatsApp</span>
            </div>
            <span style={{color:'rgba(255,255,255,0.55)',fontSize:'.7rem',fontWeight:600,flexShrink:0}}>Compartilhe com os clientes</span>
            {isAdm&&<button className="icon-btn" style={{width:34,height:34,borderRadius:10}}
              onClick={()=>{if(window.confirm('Remover esta oferta?')){onDeleteOffer(lightbox.id);setLightbox(null);}}}>
              <IcTrash s={14} c="var(--red)"/>
            </button>}
          </div>
          <button style={{marginTop:18,background:'none',border:'none',color:'rgba(255,255,255,0.55)',fontSize:'.82rem',cursor:'pointer',fontFamily:'inherit',fontWeight:700}} onClick={()=>setLightbox(null)}>Fechar ✕</button>
        </div>
      )}

      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'90vh'}}>
        <div className="handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:'1.1rem'}}>🏷️</span>
            <span style={{fontWeight:900,fontSize:'1rem'}}>Ofertas do Mês</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {isAdm&&<button className="btn btn-dark" style={{padding:'8px 14px',fontSize:'.74rem',gap:5}} onClick={()=>setShowAdd(!showAdd)}>
              <IcPlus s={13} c="#fff"/>Adicionar
            </button>}
            <button className="icon-btn" onClick={onClose}><IcX s={17} c="var(--muted)"/></button>
          </div>
        </div>

        {showAdd&&isAdm&&(
          <div className="nm-in" style={{padding:'16px',marginBottom:16,display:'flex',flexDirection:'column',gap:12}}>
            <label style={{display:'flex',flexDirection:'column',gap:6,cursor:'pointer'}}>
              <span className="label">Imagem da Oferta</span>
              <div style={{borderRadius:14,background:'var(--bg)',boxShadow:'var(--nm-in)',padding:imgUrl?0:'28px 20px',textAlign:'center',border:'2px dashed var(--gray)',cursor:'pointer',overflow:'hidden'}}>
                {imgUrl?(
                  <img src={imgUrl} style={{width:'100%',maxHeight:240,objectFit:'cover',display:'block',borderRadius:12}} alt="preview"/>
                ):(
                  <div>
                    <div style={{fontSize:'2rem',marginBottom:8}}>📷</div>
                    <div style={{fontSize:'.78rem',color:'var(--muted)',fontWeight:600}}>Toque para selecionar imagem</div>
                    <div style={{fontSize:'.68rem',color:'var(--muted)',marginTop:4}}>Proporção ideal: 9:16</div>
                  </div>
                )}
                <input type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
              </div>
            </label>
            {fileErr&&<div style={{color:'var(--red)',fontSize:'.76rem',fontWeight:700}}>{fileErr}</div>}
            <Fld label="Legenda (opcional)">
              <input className="inp" value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Descrição da oferta..." style={{textTransform:'none'}}/>
            </Fld>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-full" onClick={()=>{setShowAdd(false);setImgUrl('');setCaption('');}}>Cancelar</button>
              <button className="btn btn-dark btn-full" onClick={saveOffer}>Publicar</button>
            </div>
          </div>
        )}

        {offers.length===0?(
          <Empty text={isAdm?"Nenhuma oferta. Toque em Adicionar!":"Nenhuma oferta disponível no momento."}/>
        ):(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:10}}>
              {offers.map(offer=>(
                <div key={offer.id}
                  style={{cursor:'pointer',borderRadius:10,overflow:'hidden',position:'relative',aspectRatio:'9/14',boxShadow:'3px 3px 8px rgba(0,0,0,0.14),-2px -2px 6px rgba(255,255,255,0.9)'}}
                  onClick={()=>setLightbox(offer)}>
                  <img src={offer.url} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt={offer.caption||'Oferta'}/>
                  {offer.caption&&(
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,0.72))',padding:'14px 4px 4px',fontSize:'.48rem',color:'#fff',fontWeight:700,lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {offer.caption}
                    </div>
                  )}
                </div>
              ))}
            </div>
            <div style={{fontSize:'.64rem',color:'var(--muted)',textAlign:'center',fontWeight:600,letterSpacing:'.04em'}}>
              Toque em uma imagem para ampliar e compartilhar
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

          <span style={{fontSize:'1.1rem',lineHeight:1}}>🏷️</span>

        </button>
