/* ══════════════════════════════════════════════════════════════════
   BELL NOTIFICATIONS PANEL
══════════════════════════════════════════════════════════════════ */
function BellPanel({members,referrals,jrReferrals,seekJrs,onClose,onEditRef,onDeleteRef,onDeleteJrRef,onMarkRead,passReqs}){
  const allRefs=[...referrals.filter(r=>r.isNew),...jrReferrals.filter(r=>r.isNew)];
  const newJrs=seekJrs.filter(j=>j.isNew);
  const forgotReqs=(passReqs||[]).filter(r=>r.type==='forgot'&&!r.resolved);
  const total=allRefs.length+newJrs.length+forgotReqs.length;
  const [expanded,setExpanded]=useState(null);

  function RefCard({r,isJr,idx}){
    const seek=isJr?seekJrs.find(j=>j.id===r.jrId):members.find(m=>sameId(m.id,r.memberId));
    const seekParent=isJr&&seek?members.find(m=>sameId(m.id,seek.seekId)):null;
    const pt=PRODUCT_TYPES.find(p=>p.id===r.productType)||PRODUCT_TYPES[0];
    const digits=(r.whatsapp||'').replace(/\D/g,'');
    const phone=digits?(digits.startsWith('55')&&digits.length>=12?digits:`55${digits}`):'';
    const isExp=expanded===r.id;
    const bg=idx%2===0?'#FFFFFF':'#F4F4F4';
    return(
      <div style={{background:bg,borderRadius:12,marginBottom:4,padding:'10px 12px',cursor:'pointer'}} onClick={()=>setExpanded(isExp?null:r.id)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
          <div style={{flex:1}}>
            {isJr?(
              <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:2}}>
                <span style={{fontWeight:900,fontSize:'.95rem'}}>{seek?seek.name:'?'}</span>
                <span style={{fontWeight:900,fontSize:'.82rem',color:'#1565C0'}}> JR</span>
              </div>
            ):(
              <div style={{fontWeight:900,fontSize:'.95rem',marginBottom:2}}>{seek?seek.name:'?'}</div>
            )}
            {isJr&&seekParent&&(
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginBottom:2}}>
                Padrinho: <b style={{color:'var(--black)'}}>{seekParent.name}</b>
              </div>
            )}
            <div style={{fontWeight:700,fontSize:'.88rem',color:'var(--green)'}}>{r.clientName||'—'}</div>
            <div style={{fontSize:'.68rem',color:'var(--muted)',marginTop:2}}>{pt.icon} {pt.name} · {fDate(r)}</div>
          </div>
          <span style={{fontSize:'.7rem',color:'var(--muted)'}}>{isExp?'▴':'▾'}</span>
        </div>
        {isExp&&(
          <div style={{marginTop:8,padding:'12px',borderRadius:12,background:'rgba(0,0,0,0.04)',display:'flex',flexDirection:'column',gap:8}}>
            {r.productValue>0&&<div style={{fontSize:'.82rem',fontWeight:700}}>
              {fBRL(r.productValue)} · <span style={{color:'var(--green)'}}>{fBRL(r.commission)}</span>
            </div>}
            {r.whatsapp&&<div style={{fontSize:'.76rem',display:'flex',alignItems:'center',gap:5}}><IcWA s={14} fill="#25D366"/>{maskPhone(r.whatsapp)}</div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {phone&&<a href={`https://wa.me/${phone}`} target="_blank" style={{textDecoration:'none'}}>
                <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',gap:5,color:'#25D366'}} onClick={e=>e.stopPropagation()}>
                  <IcWA s={14} fill="#25D366"/>WhatsApp
                </button>
              </a>}
              <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--yellow)'}}
                onClick={e=>{e.stopPropagation();onEditRef(r);onClose();}}>
                <IcEdit s={13}/>Editar
              </button>
              {!r.paid&&<button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--red)'}}
                onClick={e=>{e.stopPropagation();if(window.confirm(`Apagar "${r.clientName}"?`)){isJr?onDeleteJrRef(r.id):onDeleteRef(r.id);}}}>
                <IcTrash s={13}/>Apagar
              </button>}
              <button className="btn" style={{padding:'7px 12px',fontSize:'.75rem',color:'var(--muted)'}}
                onClick={e=>{e.stopPropagation();onMarkRead(r.id,isJr);}}>
                ✓ Lido
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh'}}>
        <div className="handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <IcBell s={18} c="var(--black)"/>
            <span style={{fontWeight:900,fontSize:'1rem'}}>Notificações</span>
            {total>0&&<span style={{background:'var(--red)',color:'#fff',fontSize:'.62rem',fontWeight:900,borderRadius:99,padding:'2px 8px'}}>{total}</span>}
          </div>
          <button className="icon-btn" onClick={onClose}><IcX s={17} c="var(--muted)"/></button>
        </div>

        {total===0&&<Empty text="Nenhuma notificação nova"/>}

        {/* Forgot password requests */}
        {forgotReqs.length>0&&<div style={{marginBottom:14}}>
          <div className="label" style={{marginBottom:8}}>🔐 Solicitações de Nova Senha</div>
          {forgotReqs.map((req,i)=>{
            const digits=req.phone;
            const mb=members.find(m=>(m.whatsapp||'').replace(/\D/g,'')===digits);
            const jrObj=seekJrs.find(j=>(j.whatsapp||'').replace(/\D/g,'')===digits);
            const name=mb?mb.name:jrObj?jrObj.name:`Tel: ${maskPhone(digits)}`;
            const bg=i%2===0?'#FFFFFF':'#F4F4F4';
            return<div key={req.id} style={{background:bg,borderRadius:12,padding:'10px 12px',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:'.88rem',marginBottom:4}}>{name}</div>
              <div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:8}}>{maskPhone(digits)} · Esqueceu a senha</div>
              <button className="btn btn-dark" style={{padding:'7px 14px',fontSize:'.76rem',gap:6}}
                onClick={()=>onMarkRead(req.id,'forgot')}>
                <IcCheck s={13} c="#fff"/>Resolvido
              </button>
            </div>;
          })}
        </div>}

        {/* New JRs */}
        {newJrs.length>0&&<div style={{marginBottom:14}}>
          <div className="label" style={{marginBottom:8}}>Novos SEEK JR</div>
          {newJrs.map((jr,i)=>{
            const seek=members.find(m=>sameId(m.id,jr.seekId));
            const bg=i%2===0?'#FFFFFF':'#F4F4F4';
            return<div key={jr.id} style={{background:bg,borderRadius:12,padding:'10px 12px',marginBottom:4}}>
              <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:2}}>
                <span style={{fontWeight:900,fontSize:'.95rem'}}>{jr.name}</span>
                <span style={{fontWeight:900,fontSize:'.82rem',color:'#1565C0'}}> JR</span>
              </div>
              {seek&&<div style={{fontSize:'.68rem',color:'var(--muted)',marginBottom:2}}>Padrinho: <b style={{color:'var(--black)'}}>{seek.name}</b></div>}
              <div style={{fontSize:'.7rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:5}}><IcWA s={13} fill="#25D366"/>{maskPhone(jr.whatsapp)}</div>
              <button className="btn" style={{padding:'5px 10px',fontSize:'.72rem',marginTop:8,color:'var(--muted)'}}
                onClick={()=>onMarkRead(jr.id,'jr')}>✓ Lido</button>
            </div>;
          })}
        </div>}

        {/* All referrals */}
        {allRefs.length>0&&<div>
          <div className="label" style={{marginBottom:8}}>Indicações ({allRefs.length})</div>
          {allRefs.map((r,i)=>{
            const isJr=!!r.jrId;
            return<RefCard key={r.id} r={r} isJr={isJr} idx={i}/>;
          })}
        </div>}
      </div>
    </div>
  );
}



/* ══════════════════════════════════════════════════════════════════
   OFFERS PANEL (shared between ADM, SEEK, JR)
══════════════════════════════════════════════════════════════════ */
function OffersPanel({offers,onClose,isAdm,onAddOffer,onDeleteOffer}){
  const [showAdd,setShowAdd]=useState(false);
  const [imgUrl,setImgUrl]=useState('');
  const [caption,setCaption]=useState('');
  const [fileErr,setFileErr]=useState('');
  const [lightbox,setLightbox]=useState(null);

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){setFileErr('Selecione uma imagem.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{setImgUrl(ev.target.result);setFileErr('');};
    reader.readAsDataURL(file);
  }
  function saveOffer(){
    if(!imgUrl){setFileErr('Selecione uma imagem.');return;}
    onAddOffer({id:Date.now(),url:imgUrl,caption:caption.trim()});
    setImgUrl('');setCaption('');setShowAdd(false);
  }
  function shareOffer(offer){
    const msg=[
      '🔥 *Se liga nessa oferta!*',
      '',
      offer.caption?`_${offer.caption}_`:'',
      '',
      'Entre em contato com o Consultor de Vendas Volkswagen Motomecânica:',
      '',
      '👤 *Junior Soares*',
      '📱 (51) 99650-9660',
      'https://wa.me/5551996509660',
    ].filter((l,i,a)=>!(l===''&&a[i-1]==='')&&l!==undefined).join('\n');
    // Note: WhatsApp Web can't send images via URL, only text.
    // User should manually attach the photo shown on screen.
    window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  }

  return(
    <div className="overlay" onClick={lightbox?undefined:onClose}>
      {lightbox&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.93)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}
          onClick={()=>setLightbox(null)}>
          <img src={lightbox.url} style={{maxWidth:'100%',maxHeight:'78vh',borderRadius:14,objectFit:'contain'}} alt={lightbox.caption||'Oferta'}/>
          {lightbox.caption&&<div style={{color:'#fff',fontWeight:700,fontSize:'.9rem',marginTop:14,textAlign:'center'}}>{lightbox.caption}</div>}
          <div style={{display:'flex',alignItems:'center',gap:16,marginTop:18}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <button className="btn" style={{padding:'10px 18px',fontSize:'.8rem',gap:6,color:'#25D366'}}
                onClick={()=>shareOffer(lightbox)}>
                <IcWA s={16} fill="#25D366"/>Enviar no WhatsApp
              </button>
              <span style={{color:'rgba(255,255,255,0.55)',fontSize:'.64rem',fontWeight:700,textAlign:'center'}}>💡 Salve a imagem e anexe no WhatsApp</span>
            </div>
            <span style={{color:'rgba(255,255,255,0.55)',fontSize:'.7rem',fontWeight:600,flexShrink:0}}>Compartilhe com os clientes</span>
            {isAdm&&<button className="icon-btn" style={{width:34,height:34,borderRadius:10}}
              onClick={()=>{if(window.confirm('Remover esta oferta?')){onDeleteOffer(lightbox.id);setLightbox(null);}}}>
              <IcTrash s={14} c="var(--red)"/>
            </button>}
          </div>
          <button style={{marginTop:18,background:'none',border:'none',color:'rgba(255,255,255,0.55)',fontSize:'.82rem',cursor:'pointer',fontFamily:'inherit',fontWeight:700}} onClick={()=>setLightbox(null)}>Fechar ✕</button>
        </div>
      )}

      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'90vh'}}>
        <div className="handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:'1.1rem'}}>🏷️</span>
            <span style={{fontWeight:900,fontSize:'1rem'}}>Ofertas do Mês</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {isAdm&&<button className="btn btn-dark" style={{padding:'8px 14px',fontSize:'.74rem',gap:5}} onClick={()=>setShowAdd(!showAdd)}>
              <IcPlus s={13} c="#fff"/>Adicionar
            </button>}
            <button className="icon-btn" onClick={onClose}><IcX s={17} c="var(--muted)"/></button>
          </div>
        </div>

        {showAdd&&isAdm&&(
          <div className="nm-in" style={{padding:'16px',marginBottom:16,display:'flex',flexDirection:'column',gap:12}}>
            <label style={{display:'flex',flexDirection:'column',gap:6,cursor:'pointer'}}>
              <span className="label">Imagem da Oferta</span>
              <div style={{borderRadius:14,background:'var(--bg)',boxShadow:'var(--nm-in)',padding:imgUrl?0:'28px 20px',textAlign:'center',border:'2px dashed var(--gray)',cursor:'pointer',overflow:'hidden'}}>
                {imgUrl?(
                  <img src={imgUrl} style={{width:'100%',maxHeight:240,objectFit:'cover',display:'block',borderRadius:12}} alt="preview"/>
                ):(
                  <div>
                    <div style={{fontSize:'2rem',marginBottom:8}}>📷</div>
                    <div style={{fontSize:'.78rem',color:'var(--muted)',fontWeight:600}}>Toque para selecionar imagem</div>
                    <div style={{fontSize:'.68rem',color:'var(--muted)',marginTop:4}}>Proporção ideal: 9:16</div>
                  </div>
                )}
                <input type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
              </div>
            </label>
            {fileErr&&<div style={{color:'var(--red)',fontSize:'.76rem',fontWeight:700}}>{fileErr}</div>}
            <Fld label="Legenda (opcional)">
              <input className="inp" value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Descrição da oferta..." style={{textTransform:'none'}}/>
            </Fld>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-full" onClick={()=>{setShowAdd(false);setImgUrl('');setCaption('');}}>Cancelar</button>
              <button className="btn btn-dark btn-full" onClick={saveOffer}>Publicar</button>
            </div>
          </div>
        )}

        {offers.length===0?(
          <Empty text={isAdm?"Nenhuma oferta. Toque em Adicionar!":"Nenhuma oferta disponível no momento."}/>
        ):(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:10}}>
              {offers.map(offer=>(
                <div key={offer.id}
                  style={{cursor:'pointer',borderRadius:10,overflow:'hidden',position:'relative',aspectRatio:'9/14',boxShadow:'3px 3px 8px rgba(0,0,0,0.14),-2px -2px 6px rgba(255,255,255,0.9)'}}
                  onClick={()=>setLightbox(offer)}>
                  <img src={offer.url} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt={offer.caption||'Oferta'}/>
                  {offer.caption&&(
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,0.72))',padding:'14px 4px 4px',fontSize:'.48rem',color:'#fff',fontWeight:700,lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {offer.caption}
                    </div>
                  )}
                </div>
              ))}
            </div>
            <div style={{fontSize:'.64rem',color:'var(--muted)',textAlign:'center',fontWeight:600,letterSpacing:'.04em'}}>
              Toque em uma imagem para ampliar e compartilhar
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



/* ══════════════════════════════════════════════════════════════════
   ADM TAB BAR
══════════════════════════════════════════════════════════════════ */
function AdmTabBar({view,setView,badge,onBell,onOffers}){
  const tabs=[{id:'dashboard',l:'Painel',I:IcGrid},{id:'members',l:'SEEK',I:IcUsers},{id:'remuneracao',l:'Regras',I:IcBook}];
  const active=view==='memberDetail'?'members':['pending','paid'].includes(view)?'dashboard':view;
  return(
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:640,zIndex:20}}>
      <div className="tab-bar">
        {tabs.map(({id,l,I})=>(
          <button key={id} className={`tab${active===id?' on':''}`} onClick={()=>setView(id)}>
            <div style={{position:'relative'}}>
              <I s={20} c={active===id?'var(--black)':'var(--muted)'}/>
            </div>
            <span>{l}</span>
          </button>
        ))}
        <button className="tab" onClick={onBell} style={{position:'relative'}}>
          <div style={{position:'relative'}}>
            {badge>0&&<span style={{position:'absolute',top:-5,right:-8,background:'var(--red)',color:'#fff',fontSize:'.52rem',fontWeight:900,borderRadius:99,padding:'1px 5px'}}>{badge}</span>}
            <IcBell s={20} c="var(--muted)"/>
          </div>
          <span>Avisos</span>
        </button>
        <button className="tab" onClick={onOffers}>
          <span style={{fontSize:'1.1rem',lineHeight:1}}>🏷️</span>
          <span>Ofertas</span>
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   ADM LEDGER
══════════════════════════════════════════════════════════════════ */
function AdmLedger({title,referrals,members,paid,onBack,onTogglePaid}){
  const fil=[...referrals].filter(r=>r.paid===paid).sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));
  return(
    <>
      <TopBar title={title} left={<button className="icon-btn" onClick={onBack}><IcLeft s={18}/></button>}/>
      <div className="page">
        <StatCard label={paid?'Total Pago':'Total a Pagar'} value={fBRL(fil.reduce((s,r)=>s+r.commission,0))} color={paid?'var(--green)':'var(--red)'}/>
        <div className="nm" style={{padding:'6px 16px'}}>
          {fil.length===0?<Empty text={paid?'Nenhuma paga.':'Tudo em dia!'}/>:fil.map((r,i)=>{
            const m=members.find(x=>sameId(x.id,r.memberId));
            return(
              <div key={r.id}>
                <div style={{padding:'12px 0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:4}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'.86rem'}}>{m?m.name:'?'}</div>
                      <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>{r.clientName}</div>
                    </div>
                    <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,flexShrink:0}}>{fDate(r)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{fontWeight:800,color:paid?'var(--green)':'var(--red)'}}>{fBRL(r.commission)}</div>
                    <button className="pill" style={{color:paid?'var(--red)':'var(--green)'}} onClick={()=>onTogglePaid(r.id)}>
                      {paid?<IcClock s={11}/>:<IcCheck s={11}/>}{paid?'Pendente':'Pago'}
                    </button>
                  </div>
                </div>
                {i<fil.length-1&&<Div/>}
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════════════════════════
   MASTER — DASHBOARD
══════════════════════════════════════════════════════════════════ */
function MasterDashboard({adms,members,referrals,jrReferrals,seekJrs,sm,setSm,sy,setSy,onNav,passReqs,onSelectAdm,spinRewards}){
  const curY=new Date().getFullYear();
  const years=Array.from({length:5},(_,i)=>curY-2+i);
  const fil=referrals.filter(r=>r.month===sm&&r.year===sy);
  const jrFil=jrReferrals.filter(r=>r.month===sm&&r.year===sy);
  const allFil=[...fil,...jrFil];
  const totV=allFil.reduce((s,r)=>s+r.productValue,0);
  const comAP=allFil.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
  const comP=allFil.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
  const allTotV=[...referrals,...jrReferrals].reduce((s,r)=>s+r.productValue,0);
  const pendReqs=(passReqs||[]).filter(r=>!r.resolved);
  const admStats=adms.map(adm=>{
    const mids=members.filter(m=>sameId(m.admId,adm.id)).map(m=>String(m.id));
    const jids=seekJrs.filter(j=>mids.some(id=>sameId(j.seekId,id))).map(j=>String(j.id));
    const ar=fil.filter(r=>mids.some(id=>sameId(r.memberId,id)));
    const jr=jrFil.filter(r=>jids.some(id=>sameId(r.jrId,id)));
    const vol=[...ar,...jr].reduce((s,r)=>s+r.productValue,0);
    const comm=[...ar,...jr].reduce((s,r)=>s+r.commission,0);
    return{adm,vol,comm,seeks:mids.length};
  }).sort((a,b)=>b.vol-a.vol);
  return<div className="page" style={{paddingTop:8,paddingBottom:110}}>
    {pendReqs.length>0&&<div className="nm" style={{padding:'12px 16px',border:'1.5px solid rgba(192,57,43,.3)'}}>
      <div style={{fontWeight:800,fontSize:'.8rem',color:'var(--red)'}}>🔐 {pendReqs.length} solicitação(ões) de senha pendente(s)</div>
    </div>}
    <div className="nm" style={{padding:'14px 16px'}}>
      <div style={{display:'flex',gap:10}}>
        <select className="inp" style={{flex:1}} value={sm} onChange={e=>setSm(Number(e.target.value))}>{MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}</select>
        <select className="inp" style={{width:90}} value={sy} onChange={e=>setSy(Number(e.target.value))}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <StatCard label="Vendas no Mês" value={fil.length+jrFil.length}/>
      <StatCard label="Volume" value={fBRL(totV)}/>
      <StatCard label="A Pagar" value={fBRL(comAP)} color="var(--red)"/>
      <StatCard label="Pago" value={fBRL(comP)} color="var(--green)"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      {[['A Pagar',[...referrals,...jrReferrals].filter(r=>!r.paid).length,'var(--red)','pending',IcClock],['Pagas',[...referrals,...jrReferrals].filter(r=>r.paid).length,'var(--green)','paid',IcCheck]].map(([l,v,c,dest,Ico])=>(
        <button key={l} className="nm" style={{padding:'16px 14px',textAlign:'left',border:'none',cursor:'pointer',background:'var(--bg)'}} onClick={()=>onNav(dest)}>
          <div className="section-title" style={{marginBottom:8,display:'flex',alignItems:'center',gap:4}}><Ico s={11} c={c}/>{l}</div>
          <div className="stat-n" style={{fontSize:'1.1rem',color:c}}>{v}</div>
        </button>
      ))}
    </div>
    {(spinRewards||[]).length>0&&<StatCard label="🎰 Bônus Roleta Total (todos os SEEKs)" value={fBRL((spinRewards||[]).reduce((s,r)=>s+r.value,0))} color="#8833BB"/>}
    {admStats.length>0&&<>
      <div className="section-title" style={{paddingLeft:4}}>Ranking Vendedores — {MONTHS[sm-1]} {sy}</div>
      <div className="nm" style={{padding:'6px 16px'}}>
        {admStats.map((item,i)=><div key={item.adm.id}>
          <button style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',width:'100%',background:'none',border:'none',cursor:'pointer',textAlign:'left'}} onClick={()=>onSelectAdm(item.adm)}>
            <div style={{width:34,height:34,borderRadius:12,background:'var(--bg)',boxShadow:'var(--nm-out)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'.78rem',flexShrink:0}}>{i+1}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.adm.name}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',marginTop:1}}>{item.seeks} SEEK{item.seeks!==1?'s':''} · {fBRL(item.vol)}</div>
            </div>
            <div style={{fontWeight:800,color:'var(--green)',flexShrink:0,fontSize:'.84rem'}}>{fBRL(item.comm)}</div>
          </button>
          {i<admStats.length-1&&<div className="divider"/>}
        </div>)}
      </div>
    </>}
    {admStats.length===0&&<Empty text="Nenhum vendedor cadastrado ainda"/>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════════
   MASTER — VENDEDORES (gestão de ADMs)
══════════════════════════════════════════════════════════════════ */
function MasterVendedores({adms,members,referrals,jrReferrals,seekJrs,credentials,onAdd,onDelete,onSelect,onUpdatePin}){
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [credAdm,setCredAdm]=useState(null);
  const [newPin,setNewPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const filtered=[...adms].filter(a=>a.name.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));

  function AdmForm({onCancel,onSave}){
    const [name,setName]=useState('');
    const [wa,setWa]=useState('');
    const [pix,setPix]=useState('');
    const [pin,setPin]=useState('0000');
    const [pe,setPe]=useState('');
    function submit(e){e.preventDefault();if(!name.trim())return;if(!/^\d{4}$/.test(pin)){setPe('Deve ter 4 dígitos.');return;}onSave({name:name.trim(),whatsapp:wa,pixKey:pix.trim(),pin});}
    return<form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Vendedor"><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Nome completo" autoFocus/></Fld>
      <Fld label="Telefone (Login — somente números)"><PlainPhoneInput value={wa} onChange={setWa}/></Fld>
      <Fld label="Chave PIX"><input className="inp" value={pix} onChange={e=>setPix(e.target.value)} placeholder="CPF, e-mail ou chave"/></Fld>
      <div className="nm-in" style={{padding:'14px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontWeight:700,fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)'}}>🔑 Acesso ao App</div>
        <Fld label="Senha inicial"><PinInput value={pin} onChange={setPin}/>{pe&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700}}>{pe}</span>}</Fld>
      </div>
      <div style={{display:'flex',gap:12}}><button type="button" className="btn btn-full" onClick={onCancel}>Cancelar</button><button type="submit" className="btn btn-dark btn-full">Cadastrar</button></div>
    </form>;
  }

  return<>
    <TopBar title="Vendedores" right={<button className="btn btn-dark" style={{padding:'9px 14px',fontSize:'.74rem',borderRadius:14}} onClick={()=>setShowAdd(true)}><IcPlus s={14} c="#fff"/>Novo</button>}/>
    <div className="page" style={{paddingBottom:110}}>
      <div style={{position:'relative'}}><span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><IcSrch s={16}/></span><input className="inp" style={{paddingLeft:42}} placeholder="Buscar vendedor" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {filtered.length===0?<Empty text="Nenhum vendedor cadastrado"/>:filtered.map(adm=>{
        const admMembers=members.filter(m=>sameId(m.admId,adm.id));
        const cred=credentials[`adm_${adm.id}`]||{};
        const initials=adm.name.trim().slice(0,2).toUpperCase();
        return<div key={adm.id} className="nm" style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:10}}>
          <button style={{display:'flex',alignItems:'center',gap:12,flex:1,background:'none',border:'none',cursor:'pointer',minWidth:0,textAlign:'left'}} onClick={()=>onSelect(adm)}>
            <div className="member-avatar">{initials}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:'.88rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{adm.name}</div>
              <div style={{fontSize:'.68rem',color:'var(--muted)',fontWeight:600,marginTop:2}}>{admMembers.length} SEEK{admMembers.length!==1?'s':''}{cred.login?` · ${maskPhone(cred.login)}`:''}</div>
            </div>
          </button>
          <button className="icon-btn" onClick={()=>{setCredAdm(adm);setNewPin('');setPinErr('');}}><IcKey s={14}/></button>
          <button className="icon-btn" onClick={()=>setConfirmDel(adm)}><IcTrash s={14} c="var(--red)"/></button>
        </div>;
      })}
    </div>
    {showAdd&&<Sheet title="Novo Vendedor" onClose={()=>setShowAdd(false)}><AdmForm onCancel={()=>setShowAdd(false)} onSave={d=>{onAdd(d);setShowAdd(false);}}/></Sheet>}
    {confirmDel&&<Confirm title="Excluir vendedor" msg={`Excluir "${confirmDel.name}" e todos os seus dados?`} onCancel={()=>setConfirmDel(null)} onOk={()=>{onDelete(confirmDel.id);setConfirmDel(null);}}/>}
    {credAdm&&(()=>{
      const cred=credentials[`adm_${credAdm.id}`]||{login:credAdm.whatsapp||'',pin:'0000'};
      const rawL=(cred.login||'').replace(/\D/g,'');
      const waPhone=rawL.startsWith('55')&&rawL.length>=12?rawL:`55${rawL}`;
      function savePin(){if(!/^\d{4}$/.test(newPin)){setPinErr('Deve ter 4 dígitos.');return;}onUpdatePin(`adm_${credAdm.id}`,newPin);setPinErr('');setNewPin('');setCredAdm(null);}
      function sendWA(){const msg=encodeURIComponent(`Olá ${credAdm.name}! Credenciais SEEK:\nLogin: ${maskPhone(rawL)}\nSenha: ${cred.pin}`);window.open(`https://wa.me/${waPhone}?text=${msg}`,'_blank');}
      return<Sheet title="Credenciais Vendedor" onClose={()=>setCredAdm(null)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Login</div><div style={{fontWeight:700}}>{maskPhone(rawL)||'—'}</div></div>
          <div className="nm-in" style={{padding:'12px 14px'}}><div className="section-title" style={{marginBottom:3}}>Senha atual</div><div style={{fontWeight:900,fontSize:'1.8rem',letterSpacing:'.5em'}}>{cred.pin}</div></div>
          <Fld label="Nova senha"><PinInput value={newPin} onChange={setNewPin} autoFocus/>{pinErr&&<span style={{color:'var(--red)',fontSize:'.74rem',fontWeight:700,marginTop:4}}>{pinErr}</span>}</Fld>
          <div style={{display:'flex',gap:10}}><button className="btn btn-full" onClick={()=>setCredAdm(null)}>Fechar</button><button className="btn btn-dark btn-full" onClick={savePin}>Salvar</button></div>
          {rawL&&<button className="btn btn-full" onClick={sendWA} style={{gap:8}}><IcWA s={15} fill="var(--green)"/>Enviar por WhatsApp</button>}
        </div>
      </Sheet>;
    })()}
  </>;
}

/* ══════════════════════════════════════════════════════════════════
   MASTER PANEL
══════════════════════════════════════════════════════════════════ */
function MasterPanel({adms,members,referrals,jrReferrals,seekJrs,credentials,offers,passReqs,levelNotifs,onLogout,onAddAdm,onDeleteAdm,onAddMember,onUpdateMember,onDeleteMember,onUpdatePin,onAddReferral,onUpdateReferral,onTogglePaid,onDeleteReferral,onAddSeekJr,onDeleteSeekJr,onAddJrReferral,onToggleJrPaid,onDeleteJrReferral,onAddOffer,onDeleteOffer,onMarkRead,spinRewards,onMarkSold,onUpdateJrReferral}){
  const [view,setView]=useState('dashboard');
  const [selAdm,setSelAdm]=useState(null);
  const [selMember,setSelMember]=useState(null);
  const [editRefDirect,setEditRefDirect]=useState(null);
  const [showBell,setShowBell]=useState(false);
  const [showOffers,setShowOffers]=useState(false);
  const [showExtrato,setShowExtrato]=useState(false);
  const now=new Date();
  const [sm,setSm]=useState(now.getMonth()+1);
  const [sy,setSy]=useState(now.getFullYear());

  const pendReqs=(passReqs||[]).filter(r=>!r.resolved);
  const newRefs=[...referrals,...jrReferrals].filter(r=>r.isNew);
  const newJrs=seekJrs.filter(j=>j.isNew);
  const badge=pendReqs.length+newRefs.length+newJrs.length;
  const allRefs=[...referrals,...jrReferrals];

  const scopeMembers=selAdm?members.filter(m=>sameId(m.admId,selAdm.id)):members;
  const scopeJrs=selAdm?seekJrs.filter(j=>scopeMembers.some(m=>sameId(m.id,j.seekId))):seekJrs;
  const scopeRefs=selAdm?referrals.filter(r=>scopeMembers.some(m=>sameId(m.id,r.memberId))):referrals;
  const scopeJrRefs=selAdm?jrReferrals.filter(r=>scopeJrs.some(j=>sameId(j.id,r.jrId))):jrReferrals;
  const curMember=selMember?scopeMembers.find(m=>sameId(m.id,selMember.id))??selMember:null;

  function nav(dest,payload){if(dest==='editRef'){setEditRefDirect(payload);setView('editRef');}else setView(dest);}
  function goAdm(adm){setSelAdm(adm);setView('vendedorDetail');}

  const masterTabs=[{id:'dashboard',l:'Painel',I:IcGrid},{id:'vendedores',l:'Vendedores',I:IcUsers},{id:'membros',l:'SEEK',I:IcBook},{id:'remuneracao',l:'Regras',I:IcStar}];
  const activeTab=view==='memberDetail'?'membros':view==='vendedorDetail'?'vendedores':['pending','paid'].includes(view)?'dashboard':view;
  const inSubView=['memberDetail','pending','paid','editRef','vendedorDetail'].includes(view);

  return(
    <div style={{'--bg':'var(--bg-master)',background:'var(--bg-master)',minHeight:'100vh',maxWidth:640,margin:'0 auto',position:'relative'}}>
      <TopBar logo="SEEK NETWORK" right={
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button style={{position:'relative'}} className="icon-btn" onClick={()=>setShowBell(true)}>
            {badge>0&&<span style={{position:'absolute',top:-4,right:-4,background:'var(--red)',color:'#fff',fontSize:'.5rem',fontWeight:900,borderRadius:99,padding:'1px 4px'}}>{badge}</span>}
            <IcBell s={18} c="var(--muted)"/>
          </button>
          <button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>
        </div>
      }/>
      <div style={{padding:'4px 16px 8px',textAlign:'center'}}>
        <span style={{fontSize:'0.55rem',fontWeight:900,color:'var(--black)',letterSpacing:'.06em'}}>MASTER</span>
      </div>

      {view==='dashboard'&&<MasterDashboard adms={adms} members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} sm={sm} setSm={setSm} sy={sy} setSy={setSy} onNav={nav} passReqs={passReqs} onSelectAdm={goAdm} spinRewards={spinRewards}/>}
      {view==='vendedores'&&<MasterVendedores adms={adms} members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onAdd={onAddAdm} onDelete={onDeleteAdm} onSelect={goAdm} onUpdatePin={onUpdatePin}/>}
      {view==='vendedorDetail'&&selAdm&&<>
        <div style={{padding:'5px 16px 0',textAlign:'center'}}>
          <span style={{fontSize:'.76rem',fontWeight:800}}>{selAdm.name}</span>
        </div>
        <AdmDashboard members={scopeMembers} referrals={scopeRefs} jrReferrals={scopeJrRefs} seekJrs={scopeJrs} sm={sm} setSm={setSm} sy={sy} setSy={setSy} onNav={nav} passReqs={passReqs} credentials={credentials} onDeleteRef={onDeleteReferral} onDeleteJrRef={onDeleteJrReferral} spinRewards={spinRewards}/>
      </>}
      {view==='membros'&&<AdmMembers members={scopeMembers} referrals={scopeRefs} jrReferrals={scopeJrRefs} seekJrs={scopeJrs} credentials={credentials} onSelect={m=>{setSelMember(m);setView('memberDetail');}} onAdd={selAdm?d=>onAddMember(d,selAdm.id):null} onDelete={onDeleteMember} onUpdatePin={onUpdatePin} onDeleteJr={onDeleteSeekJr}/>}
      {view==='memberDetail'&&curMember&&<AdmMemberDetail member={curMember} referrals={scopeRefs} jrReferrals={scopeJrRefs} seekJrs={scopeJrs} credentials={credentials} onBack={()=>{setSelMember(null);setView(selAdm?'vendedorDetail':'membros');}} onAddReferral={d=>onAddReferral(d,curMember.id)} onUpdateReferral={onUpdateReferral} onTogglePaid={onTogglePaid} onDeleteReferral={onDeleteReferral} onDeleteMember={id=>{onDeleteMember(id);setSelMember(null);setView(selAdm?'vendedorDetail':'membros');}} onUpdateMember={onUpdateMember} onUpdatePin={onUpdatePin} spinRewards={spinRewards}/>}
      {view==='pending'&&<AdmLedger title="A Pagar" referrals={allRefs} members={members} paid={false} onBack={()=>setView('dashboard')} onTogglePaid={onTogglePaid}/>}
      {view==='paid'&&<AdmLedger title="Comissões Pagas" referrals={allRefs} members={members} paid={true} onBack={()=>setView('dashboard')} onTogglePaid={onTogglePaid}/>}
      {view==='editRef'&&editRefDirect&&<AdmMemberDetail member={members.find(m=>sameId(m.id,editRefDirect.memberId))||{id:0,name:'?'}} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onBack={()=>{setEditRefDirect(null);setView('dashboard');}} onAddReferral={d=>onAddReferral(d,editRefDirect.memberId)} onUpdateReferral={onUpdateReferral} onTogglePaid={onTogglePaid} onDeleteReferral={onDeleteReferral} onDeleteMember={onDeleteMember} onUpdateMember={onUpdateMember} onUpdatePin={onUpdatePin} spinRewards={spinRewards}/>}
      {view==='remuneracao'&&<RemuneracaoPanel/>}

      {!inSubView&&(
        <div style={{position:'fixed',bottom:74,left:'50%',transform:'translateX(-50%)',width:'calc(100% - 32px)',maxWidth:576,zIndex:19,padding:0}}>
          <button className="btn btn-dark btn-full" style={{padding:14}} onClick={()=>setShowExtrato(true)}>📋 Extrato</button>
        </div>
      )}
      {!inSubView&&(
        <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:640,zIndex:20}}>
          <div className="tab-bar">
            {masterTabs.map(({id,l,I})=>(
              <button key={id} className={`tab${activeTab===id?' on':''}`} onClick={()=>{setView(id);setSelAdm(null);setSelMember(null);}}>
                <I s={20} c={activeTab===id?'var(--black)':'var(--muted)'}/>
                <span>{l}</span>
              </button>
            ))}
            <button className="tab" onClick={()=>setShowOffers(true)}><span style={{fontSize:'1.1rem',lineHeight:1}}>🏷️</span><span>Ofertas</span></button>
          </div>
        </div>
      )}
      {view==='vendedorDetail'&&selAdm&&(
        <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:640,zIndex:20}}>
          <div className="tab-bar">
            <button className="btn" style={{flex:1,padding:'10px'}} onClick={()=>{setSelAdm(null);setSelMember(null);setView('vendedores');}}><IcLeft s={16}/>Voltar</button>
            <button className="btn" style={{flex:1,padding:'10px'}} onClick={()=>setView('membros')}><IcUsers s={15}/>SEEK</button>
          </div>
        </div>
      )}

      {showBell&&<BellPanel members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} onClose={()=>setShowBell(false)} onEditRef={r=>{setEditRefDirect(r);setView('editRef');}} onDeleteRef={onDeleteReferral} onDeleteJrRef={onDeleteJrReferral} passReqs={passReqs} onMarkRead={onMarkRead}/>}
      {showOffers&&<OffersPanel offers={offers} onClose={()=>setShowOffers(false)} isAdm={true} onAddOffer={onAddOffer} onDeleteOffer={onDeleteOffer}/>}
      {showExtrato&&<ExtratoModal role="master" data={{adms,members,referrals,jrReferrals,seekJrs,spinRewards}} onClose={()=>setShowExtrato(false)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   VENDEDOR — TELA DE NOTIFICAÇÕES (sino completo)
══════════════════════════════════════════════════════════════════ */
function VendedorNotifScreen({members,referrals,jrReferrals,seekJrs,passReqs,onBack,onMarkSold,onUpdateRef,onMarkRead,spinRewards}){
  const [tab,setTab]=useState('aguardando');
  const [selling,setSelling]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showRelatorio,setShowRelatorio]=useState(false);

  function getStatus(r){if(r.status)return r.status;if(r.paid)return'pago';if((r.productValue||0)>0)return'a_pagar';return'aguardando';}

  const allCombined=[
    ...referrals.map(r=>({...r,_isJr:false})),
    ...jrReferrals.map(r=>({...r,_isJr:true})),
  ].sort((a,b)=>new Date(b.year,(b.month||1)-1,b.day||1)-new Date(a.year,(a.month||1)-1,a.day||1));

  const byStatus={
    aguardando:allCombined.filter(r=>getStatus(r)==='aguardando'),
    a_pagar:allCombined.filter(r=>getStatus(r)==='a_pagar'),
    pago:allCombined.filter(r=>getStatus(r)==='pago'),
  };
  const tabData=byStatus[tab]||[];
  const forgotReqs=(passReqs||[]).filter(r=>r.type==='forgot'&&!r.resolved);

  function buildRelatorio(){
    const d=new Date();
    const ds=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    function line(r){
      const who=r._isJr?(seekJrs.find(j=>sameId(j.id,r.jrId))||{name:'JR'}).name+' JR':(members.find(m=>sameId(m.id,r.memberId))||{name:'SEEK'}).name;
      const val=r.productValue>0?` · ${fBRL(r.productValue)} · ${fBRL(r.commission)}`:'';
      return`• ${r.clientName||'?'} (${who})${val} — ${fDate(r)}`;
    }
    return[
      `*SEEK NETWORK — NOTIFICAÇÕES VENDEDOR*`,`Data: ${ds}`,``,
      `📋 AGUARDANDO (${byStatus.aguardando.length})`,
      ...byStatus.aguardando.map(line),``,
      `💰 A PAGAR (${byStatus.a_pagar.length})`,
      ...byStatus.a_pagar.map(line),``,
      `✅ PAGO (${byStatus.pago.length})`,
      ...byStatus.pago.map(line),``,
      `Total a pagar: ${fBRL(byStatus.a_pagar.reduce((s,r)=>s+r.commission,0))}`,
      (spinRewards||[]).length>0?`🎰 Bônus Roleta pago: ${fBRL((spinRewards||[]).reduce((s,r)=>s+r.value,0))}`:'',
    ].filter(l=>l!==undefined).join('\n');
  }

  function SaleForm({ref:r,onCancel,onSave}){
    const [prodType,setProdType]=useState('auto');
    const [val,setVal]=useState(0);
    const [date,setDate]=useState(todayISO());
    function submit(e){
      e.preventDefault();if(val<=0)return;
      const pt=PRODUCT_TYPES.find(p=>p.id===prodType)||PRODUCT_TYPES[0];
      const commission=val*pt.rate;
      const parts=date.split('-').map(Number);
      onSave({productType:prodType,productValue:val,commission,year:parts[0],month:parts[1],day:parts[2]});
    }
    const commission=val>0?(val*(PRODUCT_TYPES.find(p=>p.id===prodType)||PRODUCT_TYPES[0]).rate):0;
    return<form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="nm-in" style={{padding:'12px 14px',marginBottom:4}}>
        <div style={{fontWeight:800,fontSize:'.92rem'}}>{r.clientName}</div>
        <div style={{fontSize:'.72rem',color:'var(--muted)',marginTop:4}}>
          {r._isJr?(seekJrs.find(j=>sameId(j.id,r.jrId))||{name:'JR'}).name+' JR':(members.find(m=>sameId(m.id,r.memberId))||{name:'SEEK'}).name}
        </div>
      </div>
      <Fld label="Tipo de Produto"><ProductSelect value={prodType} onChange={setProdType}/></Fld>
      <Fld label="Valor do Negócio"><CurrencyInput value={val} onChange={setVal}/></Fld>
      <Fld label="Data da Venda"><input className="inp" type="date" value={date} onChange={e=>setDate(e.target.value)}/></Fld>
      <div className="nm-in" style={{padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'.8rem',color:'var(--muted)',fontWeight:600}}>Comissão do SEEK</span>
        <span style={{fontWeight:800,fontSize:'1rem',color:'var(--green)'}}>{fBRL(commission)}</span>
      </div>
      <div style={{display:'flex',gap:12}}>
        <button type="button" className="btn btn-full" onClick={onCancel}>Cancelar</button>
        <button type="submit" className="btn btn-dark btn-full" disabled={val<=0}>✅ Confirmar Venda</button>
      </div>
    </form>;
  }

  function EditRefForm({ref:r,onCancel,onSave}){
    const [cn,setCn]=useState(r.clientName||'');
    const [wa,setWa]=useState(r.whatsapp||'');
    const [prodType,setProdType]=useState(r.productType||'auto');
    const [val,setVal]=useState(r.productValue||0);
    const [date,setDate]=useState(r.year&&r.month?`${r.year}-${String(r.month).padStart(2,'0')}-${String(r.day||1).padStart(2,'0')}`:todayISO());
    function submit(e){
      e.preventDefault();if(!cn.trim())return;
      const pt=PRODUCT_TYPES.find(p=>p.id===prodType)||PRODUCT_TYPES[0];
      const commission=val>0?val*pt.rate:0;
      const parts=date.split('-').map(Number);
      onSave({clientName:cn.trim(),whatsapp:wa,productType:prodType,productValue:val,commission,year:parts[0],month:parts[1],day:parts[2]});
    }
    return<form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
      <Fld label="Nome do Cliente"><input className="inp" value={cn} onChange={e=>setCn(e.target.value)} autoFocus/></Fld>
      <Fld label="WhatsApp"><PhoneInput value={wa} onChange={setWa}/></Fld>
      <Fld label="Tipo de Produto"><ProductSelect value={prodType} onChange={setProdType}/></Fld>
      <Fld label="Valor do Negócio"><CurrencyInput value={val} onChange={setVal}/></Fld>
      <Fld label="Data"><input className="inp" type="date" value={date} onChange={e=>setDate(e.target.value)}/></Fld>
      <div style={{display:'flex',gap:12}}>
        <button type="button" className="btn btn-full" onClick={onCancel}>Cancelar</button>
        <button type="submit" className="btn btn-dark btn-full">Salvar</button>
      </div>
    </form>;
  }

  const relatorioText=buildRelatorio();
  const tabColors={aguardando:'var(--yellow)',a_pagar:'var(--red)',pago:'var(--green)'};
  const tabLabels={aguardando:'Aguardando',a_pagar:'A Pagar',pago:'Pago'};

  return<div style={{maxWidth:640,margin:'0 auto',minHeight:'100vh'}}>
    <TopBar title="Notificações"
      left={<button className="icon-btn" onClick={onBack}><IcLeft s={18}/></button>}
      right={<button className="btn" style={{padding:'8px 12px',fontSize:'.72rem',gap:5}} onClick={()=>setShowRelatorio(true)}>📋 Relatório</button>}
    />

    {forgotReqs.length>0&&<div style={{margin:'8px 16px 0',padding:'10px 14px',borderRadius:14,background:'var(--bg)',boxShadow:'var(--nm-out)',border:'1.5px solid rgba(192,57,43,.3)'}}>
      <div style={{fontWeight:800,fontSize:'.78rem',color:'var(--red)',marginBottom:6}}>🔐 {forgotReqs.length} solicitação(ões) de senha</div>
      {forgotReqs.map(req=>{
        const mb=members.find(m=>(m.whatsapp||'').replace(/\D/g,'')===req.phone);
        const jrObj=seekJrs.find(j=>(j.whatsapp||'').replace(/\D/g,'')===req.phone);
        const name=mb?mb.name:jrObj?jrObj.name:maskPhone(req.phone);
        return<div key={req.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0'}}>
          <div style={{fontSize:'.8rem',fontWeight:700}}>{name}</div>
          <button className="btn btn-dark" style={{padding:'5px 12px',fontSize:'.7rem',gap:4}} onClick={()=>onMarkRead(req.id,'forgot')}>
            <IcCheck s={11} c="#fff"/>Resolvido
          </button>
        </div>;
      })}
    </div>}

    <div style={{display:'flex',gap:8,padding:'10px 16px 2px'}}>
      {['aguardando','a_pagar','pago'].map(id=>(
        <button key={id} onClick={()=>setTab(id)} style={{
          flex:1,padding:'9px 4px',borderRadius:12,border:'none',cursor:'pointer',
          fontFamily:'inherit',fontWeight:800,fontSize:'.7rem',
          background:tab===id?'var(--black)':'var(--bg)',
          color:tab===id?'#fff':tabColors[id],
          boxShadow:tab===id?'4px 4px 14px rgba(0,0,0,.3),-2px -2px 8px rgba(255,255,255,.15)':'var(--nm-out)',
          transition:'all .2s',
        }}>
          {tabLabels[id]}
          {byStatus[id].length>0&&<span style={{
            marginLeft:5,padding:'1px 6px',borderRadius:99,fontSize:'.6rem',
            background:tab===id?'rgba(255,255,255,0.25)':tabColors[id],color:'#fff',
          }}>{byStatus[id].length}</span>}
        </button>
      ))}
    </div>

    <div className="page" style={{paddingBottom:30,paddingTop:10}}>
      {tabData.length===0?<Empty text="Nenhuma indicação nesta categoria"/>:tabData.map(r=>{
        const isJr=r._isJr;
        const seek=isJr?seekJrs.find(j=>sameId(j.id,r.jrId)):members.find(m=>sameId(m.id,r.memberId));
        const seekParent=isJr&&seek?members.find(m=>sameId(m.id,seek.seekId)):null;
        const digits=(r.whatsapp||'').replace(/\D/g,'');
        const phone=digits?(digits.startsWith('55')&&digits.length>=12?digits:`55${digits}`):'';
        const st=getStatus(r);
        const stColor=tabColors[st]||'var(--muted)';
        const stLabel=tabLabels[st]||st;
        return<div key={r.id} className="nm" style={{padding:'14px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:'.94rem',marginBottom:3}}>{r.clientName||'—'}</div>
              <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600,display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                {isJr&&<span className="tag-jr">JR</span>}
                {seek&&<span>{seek.name}</span>}
                {isJr&&seekParent&&<><span style={{opacity:.4}}>→</span><span>SEEK: {seekParent.name}</span></>}
              </div>
            </div>
            <span style={{fontSize:'.66rem',fontWeight:800,padding:'3px 10px',borderRadius:50,background:'var(--bg)',boxShadow:'var(--nm-out)',color:stColor,flexShrink:0}}>
              {stLabel}
            </span>
          </div>
          {r.productValue>0&&<div style={{fontSize:'.74rem',color:'var(--muted)',marginBottom:6}}>
            {PRODUCT_TYPES.find(p=>p.id===r.productType)?.icon} {PRODUCT_TYPES.find(p=>p.id===r.productType)?.name} · {fBRL(r.productValue)} · <span style={{color:'var(--green)',fontWeight:700}}>{fBRL(r.commission)}</span>
          </div>}
          {r.whatsapp&&<div style={{fontSize:'.7rem',color:'var(--muted)',marginBottom:6,display:'flex',alignItems:'center',gap:5}}>
            <IcWA s={13} fill="#25D366"/>{maskPhone(r.whatsapp)}
          </div>}
          <div style={{fontSize:'.66rem',color:'var(--muted)',marginBottom:10}}>{fDate(r)}</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {phone&&<a href={`https://wa.me/${phone}`} target="_blank" style={{textDecoration:'none'}}>
              <button className="btn" style={{padding:'7px 11px',fontSize:'.72rem',gap:4,color:'#25D366'}}><IcWA s={13} fill="#25D366"/>WhatsApp</button>
            </a>}
            <button className="btn" style={{padding:'7px 11px',fontSize:'.72rem',gap:4,color:'var(--yellow)'}} onClick={()=>setEditing({ref:r,isJr})}>
              <IcEdit s={13}/>Editar
            </button>
            {st==='aguardando'&&<button style={{
              padding:'7px 14px',borderRadius:12,border:'none',cursor:'pointer',
              background:'linear-gradient(135deg,#1D7A3A,#22AA44)',
              color:'#fff',fontFamily:'inherit',fontWeight:800,fontSize:'.74rem',
              boxShadow:'3px 3px 10px rgba(29,122,58,.4)',
            }} onClick={()=>setSelling({ref:r,isJr})}>
              ✅ Marcar como Vendido
            </button>}
          </div>
        </div>;
      })}
    </div>

    {selling&&<Sheet title="Confirmar Venda" onClose={()=>setSelling(null)}>
      <SaleForm ref={selling.ref} onCancel={()=>setSelling(null)} onSave={async data=>{
        await onMarkSold(selling.ref.id,data,selling.isJr);
        setSelling(null);
      }}/>
    </Sheet>}

    {editing&&<Sheet title="Editar Indicação" onClose={()=>setEditing(null)}>
      <EditRefForm ref={editing.ref} onCancel={()=>setEditing(null)} onSave={async data=>{
        await onUpdateRef(editing.ref.id,data,editing.isJr);
        setEditing(null);
      }}/>
    </Sheet>}

    {showRelatorio&&<Sheet title="Relatório de Notificações" onClose={()=>setShowRelatorio(false)}>
      <div className="nm-in" style={{padding:'14px',fontFamily:'monospace',fontSize:'.72rem',whiteSpace:'pre-wrap',lineHeight:1.7,maxHeight:'56vh',overflowY:'auto',borderRadius:16,marginBottom:14}}>
        {relatorioText}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-full" style={{gap:6,color:'#25D366'}} onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(relatorioText)}`,'_blank')}>
          <IcWA s={15} fill="#25D366"/>WhatsApp
        </button>
        <button className="btn btn-full" style={{gap:6}} onClick={()=>{
          const div=document.createElement('div');div.className='print-only';
          div.style.cssText='font-family:monospace;white-space:pre-wrap;font-size:13px;padding:28px;color:#111;line-height:1.8;';
          div.textContent=relatorioText;document.body.appendChild(div);window.print();document.body.removeChild(div);
        }}>🖨️ Imprimir</button>
      </div>
    </Sheet>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════════
   VENDEDOR PANEL (ADM role — dados filtrados por adm_id)
══════════════════════════════════════════════════════════════════ */
function VendedorPanel({adm,members,referrals,jrReferrals,seekJrs,credentials,offers,passReqs,levelNotifs,onLogout,onAddMember,onUpdateMember,onDeleteMember,onUpdatePin,onAddReferral,onUpdateReferral,onTogglePaid,onDeleteReferral,onAddSeekJr,onDeleteSeekJr,onAddJrReferral,onToggleJrPaid,onDeleteJrReferral,onAddOffer,onDeleteOffer,onMarkRead,spinRewards,onMarkSold,onUpdateJrReferral}){
  const [view,setView]=useState('dashboard');
  const [selMember,setSelMember]=useState(null);
  const [editRefDirect,setEditRefDirect]=useState(null);
  const [showOffers,setShowOffers]=useState(false);
  const [showExtrato,setShowExtrato]=useState(false);
  const now=new Date();
  const [sm,setSm]=useState(now.getMonth()+1);
  const [sy,setSy]=useState(now.getFullYear());

  const pendReqs=(passReqs||[]).filter(r=>!r.resolved);
  const aguardando=[...referrals,...jrReferrals].filter(r=>r.status==='aguardando'||(r.status==null&&(r.productValue||0)===0&&!r.paid));
  const newJrs=seekJrs.filter(j=>j.isNew);
  const badge=pendReqs.length+aguardando.length+newJrs.length;
  const allRefs=[...referrals,...jrReferrals];
  const curMember=selMember?members.find(m=>sameId(m.id,selMember.id))??selMember:null;
  const inSubView=['memberDetail','pending','paid','editRef','notificacoes'].includes(view);

  function nav(dest,payload){if(dest==='editRef'){setEditRefDirect(payload);setView('editRef');}else setView(dest);}
  function updateRef(rid,data,isJr){return isJr?onUpdateJrReferral(rid,data):onUpdateReferral(rid,data);}

  return(
    <div style={{background:'var(--bg)',minHeight:'100vh',maxWidth:640,margin:'0 auto',position:'relative'}}>
      {view!=='notificacoes'&&<>
        <TopBar logo="SEEK NETWORK" right={
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button style={{position:'relative'}} className="icon-btn" onClick={()=>setView('notificacoes')}>
              {badge>0&&<span style={{position:'absolute',top:-4,right:-4,background:'var(--red)',color:'#fff',fontSize:'.5rem',fontWeight:900,borderRadius:99,padding:'1px 4px'}}>{badge}</span>}
              <IcBell s={18} c="var(--muted)"/>
            </button>
            <button className="icon-btn" onClick={onLogout}><IcOut s={17} c="var(--muted)"/></button>
          </div>
        }/>
        <div style={{padding:'4px 16px 8px',textAlign:'center'}}>
          <span style={{fontSize:'0.55rem',fontWeight:900,color:'var(--black)',letterSpacing:'.02em'}}>{adm.name}</span>
        </div>
      </>}

      {view==='notificacoes'&&<VendedorNotifScreen members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} passReqs={passReqs} onBack={()=>setView('dashboard')} onMarkSold={onMarkSold} onUpdateRef={updateRef} onMarkRead={onMarkRead} spinRewards={spinRewards}/>}
      {view==='dashboard'&&<AdmDashboard members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} sm={sm} setSm={setSm} sy={sy} setSy={setSy} onNav={nav} passReqs={passReqs} credentials={credentials} onDeleteRef={onDeleteReferral} onDeleteJrRef={onDeleteJrReferral} spinRewards={spinRewards}/>}
      {view==='members'&&<AdmMembers members={members} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onSelect={m=>{setSelMember(m);setView('memberDetail');}} onAdd={d=>onAddMember(d,adm.id)} onDelete={onDeleteMember} onUpdatePin={onUpdatePin} onDeleteJr={onDeleteSeekJr}/>}
      {view==='memberDetail'&&curMember&&<AdmMemberDetail member={curMember} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onBack={()=>{setSelMember(null);setView('members');}} onAddReferral={d=>onAddReferral(d,curMember.id)} onUpdateReferral={onUpdateReferral} onTogglePaid={onTogglePaid} onDeleteReferral={onDeleteReferral} onDeleteMember={id=>{onDeleteMember(id);setSelMember(null);setView('members');}} onUpdateMember={onUpdateMember} onUpdatePin={onUpdatePin} spinRewards={spinRewards}/>}
      {view==='pending'&&<AdmLedger title="A Pagar" referrals={allRefs} members={members} paid={false} onBack={()=>setView('dashboard')} onTogglePaid={onTogglePaid}/>}
      {view==='paid'&&<AdmLedger title="Comissões Pagas" referrals={allRefs} members={members} paid={true} onBack={()=>setView('dashboard')} onTogglePaid={onTogglePaid}/>}
      {view==='editRef'&&editRefDirect&&<AdmMemberDetail member={members.find(m=>sameId(m.id,editRefDirect.memberId))||{id:0,name:'?'}} referrals={referrals} jrReferrals={jrReferrals} seekJrs={seekJrs} credentials={credentials} onBack={()=>{setEditRefDirect(null);setView('dashboard');}} onAddReferral={d=>onAddReferral(d,editRefDirect.memberId)} onUpdateReferral={onUpdateReferral} onTogglePaid={onTogglePaid} onDeleteReferral={onDeleteReferral} onDeleteMember={onDeleteMember} onUpdateMember={onUpdateMember} onUpdatePin={onUpdatePin} spinRewards={spinRewards}/>}
      {view==='remuneracao'&&<RemuneracaoPanel/>}

      {!inSubView&&(
        <div style={{position:'fixed',bottom:74,left:'50%',transform:'translateX(-50%)',width:'calc(100% - 32px)',maxWidth:576,zIndex:19,padding:0}}>
          <button className="btn btn-dark btn-full" style={{padding:14}} onClick={()=>setShowExtrato(true)}>📋 Extrato</button>
        </div>
      )}
      {!inSubView&&<AdmTabBar view={view} setView={v=>{setView(v);setSelMember(null);}} badge={badge} onBell={()=>setView('notificacoes')} onOffers={()=>setShowOffers(true)}/>}
      {showOffers&&<OffersPanel offers={offers} onClose={()=>setShowOffers(false)} isAdm={true} onAddOffer={onAddOffer} onDeleteOffer={onDeleteOffer}/>}
      {showExtrato&&<ExtratoModal role="adm" data={{adm,members,referrals,jrReferrals,seekJrs,spinRewards}} onClose={()=>setShowExtrato(false)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   EXTRATO MODAL — relatório completo para WhatsApp / Impressão
══════════════════════════════════════════════════════════════════ */
function ExtratoModal({role,data,onClose}){
  const now=new Date();
  const dateStr=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;

  function buildText(){
    if(role==='master'){
      const {adms,members,referrals,jrReferrals,seekJrs,spinRewards=[]}=data;
      const allRefs=[...referrals,...jrReferrals];
      const totVol=allRefs.reduce((s,r)=>s+r.productValue,0);
      const totCom=allRefs.reduce((s,r)=>s+r.commission,0);
      const pago=allRefs.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
      const apagar=allRefs.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
      const admRank=adms.map(adm=>{
        const mids=members.filter(m=>sameId(m.admId,adm.id)).map(m=>String(m.id));
        const jids=seekJrs.filter(j=>mids.some(id=>sameId(j.seekId,id))).map(j=>String(j.id));
        const vol=[...referrals.filter(r=>mids.some(id=>sameId(r.memberId,id))),...jrReferrals.filter(r=>jids.some(id=>sameId(r.jrId,id)))].reduce((s,r)=>s+r.productValue,0);
        return{name:adm.name,vol,seeks:mids.length};
      }).sort((a,b)=>b.vol-a.vol);
      return [
        `*SEEK NETWORK — EXTRATO MASTER*`,`Data: ${dateStr}`,``,

        `📊 CONSOLIDADO GERAL`,
        `Vendedores: ${adms.length}  |  SEEKs: ${members.length}  |  JRs: ${seekJrs.length}`,
        `Total Indicações: ${allRefs.length}`,``,
        `💰 COMISSÕES`,
        `Volume Total: ${fBRL(totVol)}`,
        `Comissão Total: ${fBRL(totCom)}`,
        `Pago: ${fBRL(pago)}  |  A Pagar: ${fBRL(apagar)}`,
        `Comissão Master (0,5%): ${fBRL(totVol*0.005)}`,
        spinRewards.length>0?`🎰 Bônus Roleta Total: ${fBRL(spinRewards.reduce((s,r)=>s+r.value,0))}`:'',``,
        `🏆 RANKING VENDEDORES`,
        ...admRank.map((a,i)=>`${i+1}. ${a.name} — ${fBRL(a.vol)} (${a.seeks} SEEK${a.seeks!==1?'s':''})`),
      ].join('\n');
    }
    if(role==='adm'){
      const {adm,members,referrals,jrReferrals,seekJrs,spinRewards=[]}=data;
      const allRefs=[...referrals,...jrReferrals];
      const totVol=allRefs.reduce((s,r)=>s+r.productValue,0);
      const totCom=allRefs.reduce((s,r)=>s+r.commission,0);
      const pago=allRefs.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
      const apagar=allRefs.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
      const mRank=members.map(m=>{
        const jids=seekJrs.filter(j=>sameId(j.seekId,m.id)).map(j=>String(j.id));
        const vol=[...referrals.filter(r=>sameId(r.memberId,m.id)),...jrReferrals.filter(r=>jids.some(id=>sameId(r.jrId,id)))].reduce((s,r)=>s+r.productValue,0);
        const pts=calcPoints(referrals.filter(r=>sameId(r.memberId,m.id)).reduce((s,r)=>s+r.productValue,0));
        return{name:m.name,vol,lv:getSeekLevel(pts)};
      }).sort((a,b)=>b.vol-a.vol);
      return [
        `*SEEK NETWORK — EXTRATO VENDEDOR*`,
        `${adm.name}  |  Data: ${dateStr}`,``,
        `📊 RESUMO`,
        `SEEKs: ${members.length}  |  JRs: ${seekJrs.length}  |  Indicações: ${allRefs.length}`,``,
        `💰 COMISSÕES`,
        `Volume Total: ${fBRL(totVol)}`,
        `Comissão Total: ${fBRL(totCom)}`,
        `Pago: ${fBRL(pago)}  |  A Pagar: ${fBRL(apagar)}`,
        spinRewards.length>0?`🎰 Bônus Roleta Total: ${fBRL(spinRewards.reduce((s,r)=>s+r.value,0))}`:'',``,
        `🏆 RANKING SEEKs`,
        ...mRank.map((m,i)=>`${i+1}. ${m.name} (${m.lv.name}) — ${fBRL(m.vol)}`),
      ].join('\n');
    }
    if(role==='member'){
      const {member,referrals,jrReferrals,seekJrs,spinRewards=[]}=data;
      const totVol=referrals.reduce((s,r)=>s+r.productValue,0);
      const pts=calcPoints(totVol);
      const lv=getSeekLevel(pts);
      const totCom=referrals.reduce((s,r)=>s+r.commission,0);
      const pago=referrals.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
      const apagar=referrals.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
      const nextLv=lv.id==='elite'?null:SEEK_LEVELS[SEEK_LEVELS.findIndex(l=>l.id===lv.id)+1];
      const myJrs=seekJrs.filter(j=>sameId(j.seekId,member.id));
      return [
        `*SEEK NETWORK — EXTRATO SEEK*`,
        `${member.name}  |  #${String(member.id).padStart(3,'0')}`,
        `Data: ${dateStr}`,``,
        `🎖️ NÍVEL: ${lv.name.toUpperCase()}`,
        `Pontos: ${pts} pts  |  Bônus: +${(lv.bonus*100).toFixed(0)}%`,
        nextLv?`Próximo nível: ${nextLv.name} (faltam ${nextLv.min-pts} pts)`:`✅ Nível Máximo!`,``,
        `💰 COMISSÕES`,
        `Total Indicações: ${referrals.length}  |  Volume Total: ${fBRL(totVol)}`,
        `Comissão Total: ${fBRL(totCom)}`,
        `Pago: ${fBRL(pago)}  |  A Pagar: ${fBRL(apagar)}`,
        spinRewards.length>0?`🎰 Bônus Roleta: ${fBRL(spinRewards.reduce((s,r)=>s+r.value,0))}`:null,
        myJrs.length>0?`\n👥 SEEK JRs (${myJrs.length})`:null,
        ...myJrs.map(jr=>{
          const jrVol=jrReferrals.filter(r=>sameId(r.jrId,jr.id)).reduce((s,r)=>s+r.productValue,0);
          return`• ${jr.name} — ${fBRL(jrVol)}`;
        }),
      ].filter(l=>l!=null).join('\n');
    }
    if(role==='jr'){
      const {jr,referrals,seekMember,spinRewards=[]}=data;
      const totVol=referrals.reduce((s,r)=>s+r.productValue,0);
      const totCom=referrals.reduce((s,r)=>s+r.commission,0);
      const pago=referrals.filter(r=>r.paid).reduce((s,r)=>s+r.commission,0);
      const apagar=referrals.filter(r=>!r.paid).reduce((s,r)=>s+r.commission,0);
      const jrLv=getJrLevel(totVol);
      const gradPct=Math.min(100,(totVol/JR_GRADUATION)*100).toFixed(1);
      return [
        `*SEEK NETWORK — EXTRATO SEEK JR*`,
        `${jr.name}  |  ID: ${jr.id}JR`,
        `Data: ${dateStr}`,``,
        seekMember?`👤 Padrinho SEEK: ${seekMember.name}`:null,
        ``,
        `📊 DESEMPENHO`,
        `Total Indicações: ${referrals.length}`,
        `Volume Total: ${fBRL(totVol)}`,
        `Nível JR: ${jrLv.name}  |  Bônus para SEEK: ${(jrLv.bonus*100).toFixed(0)}%`,
        `Progresso para SEEK: ${gradPct}% de ${fBRL(JR_GRADUATION)}`,``,
        `💰 COMISSÕES`,
        `Total: ${fBRL(totCom)}`,
        `Pago: ${fBRL(pago)}  |  A Pagar: ${fBRL(apagar)}`,
        spinRewards.length>0?`🎰 Bônus Roleta: ${fBRL(spinRewards.reduce((s,r)=>s+r.value,0))}`:null,
      ].filter(l=>l!=null).join('\n');
    }
    return '';
  }

  const text=buildText();

  function sendWhatsApp(){
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');
  }
  function handlePrint(){
    const div=document.createElement('div');
    div.className='print-only';
    div.style.cssText='font-family:monospace;white-space:pre-wrap;font-size:13px;padding:28px;color:#111;line-height:1.8;';
    div.textContent=text;
    document.body.appendChild(div);
    window.print();
    document.body.removeChild(div);
  }

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'92vh'}}>
        <div className="handle"/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <span style={{fontWeight:900,fontSize:'1rem'}}>📋 Extrato</span>
          <button className="icon-btn" onClick={onClose}><IcX s={17} c="var(--muted)"/></button>
        </div>
        <div className="nm-in" style={{padding:'16px',marginBottom:16,fontFamily:'monospace',fontSize:'.74rem',whiteSpace:'pre-wrap',lineHeight:1.75,maxHeight:'58vh',overflowY:'auto',borderRadius:16,color:'var(--black)'}}>
          {text}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-full" style={{gap:6,color:'#25D366'}} onClick={sendWhatsApp}>
            <IcWA s={15} fill="#25D366"/>WhatsApp
          </button>
          <button className="btn btn-full" style={{gap:6}} onClick={handlePrint}>
            🖨️ Imprimir
          </button>
        </div>
      </div>
    </div>
  );
}
